<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="title-section">
    <div class="game-title">2048</div>
    <div class="game-subtitle">Merge to Win</div>
  </div>
  <div class="scores">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-value" id="bestScore">0</div>
    </div>
  </div>
</div>

<!-- ACTION BAR -->
<div class="action-bar">
  <div class="action-buttons">
    <button class="btn btn-icon" id="btnUndo" title="Undo">↩️</button>
    <button class="btn btn-icon" id="btnShuffle" title="Shuffle">🔀</button>
    <button class="btn btn-icon" id="btnStats" title="Stats">📊</button>
    <button class="btn btn-icon" id="btnTheme" title="Theme">🌙</button>
    <button class="btn btn-primary" id="btnRestart">🔄</button>
  </div>
</div>

<!-- GAME GRID -->
<div class="game-container">
  <div class="grid-wrapper" id="gridWrapper">
    <div class="grid" id="grid">
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
    </div>
    <div class="tile-layer" id="tileLayer"></div>

    <!-- GAME OVER -->
    <div class="overlay" id="gameOverOverlay">
      <div class="overlay-title">Game Over 😵</div>
      <div class="overlay-subtitle" id="gameOverScore">Score: 0</div>
      <div class="overlay-buttons">
        <button class="btn btn-primary" id="btnRestartOverlay">Main Lagi</button>
      </div>
    </div>

    <!-- WIN -->
    <div class="overlay" id="winOverlay">
      <div class="overlay-title">🎉 You Win!</div>
      <div class="overlay-subtitle" id="winScore">Score: 0</div>
      <div class="overlay-buttons">
        <button class="btn" id="btnContinue">▶️ Lanjut</button>
        <button class="btn btn-primary" id="btnRestartWin">🔄 Ulang</button>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="swipe-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    Geser untuk memindahkan tile
  </div>
</div>

<!-- STATS PANEL -->
<div class="stats-backdrop" id="statsBackdrop"></div>
<div class="stats-panel" id="statsPanel">
  <div class="stats-header">
    <div class="stats-title">📊 Statistik</div>
    <button class="btn btn-icon" id="btnCloseStats">✕</button>
  </div>
  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-value" id="statGames">0</div>
      <div class="stat-label">Games Played</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statWins">0</div>
      <div class="stat-label">Wins</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statHighest">0</div>
      <div class="stat-label">Highest Tile</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statTotalScore">0</div>
      <div class="stat-label">Total Score</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statMoves">0</div>
      <div class="stat-label">Total Moves</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statMerges">0</div>
      <div class="stat-label">Total Merges</div>
    </div>
  </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
