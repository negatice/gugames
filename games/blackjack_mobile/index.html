<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blackjack 21</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="balance-box">
      <span class="icon">💰</span>
      <span class="amount" id="balance-display">1000</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="stats-btn" onclick="toggleStats()">📊 Stats</button>
      <button class="sound-btn" id="sound-btn" onclick="toggleSound()">🔊</button>
    </div>
  </div>

  <!-- BET AREA -->
  <div class="bet-area" id="bet-area">
    <br>
    <br>
    <br>
    <br>
    <div class="bet-label">Place Your Bet</div>
    <br>
    <div class="chip-row">
      <div class="chip chip-100 selected" data-value="100" onclick="selectBet(this, 100)">100</div>
      <div class="chip chip-500" data-value="500" onclick="selectBet(this, 500)">500</div>
      <div class="chip chip-1000" data-value="1000" onclick="selectBet(this, 1000)">1K</div>
      <div class="chip chip-all" data-value="all" onclick="selectBet(this, 'all')">ALL</div>
    </div>
    <br>
    <div class="bet-display" id="bet-display">💰 100</div>
    <br>
    <button class="deal-btn" id="deal-btn" onclick="startRound()">DEAL</button>
  </div>

  <!-- DEALER -->
  <div class="dealer-section">
    <div class="section-label">Dealer</div>
    <div class="score-badge" id="dealer-score">0</div>
    <div class="cards-area" id="dealer-cards"></div>
  </div>

  <div class="divider"></div>

  <!-- PLAYER -->
  <div class="player-section">
    <div class="cards-area" id="player-cards"></div>
    <div class="score-badge" id="player-score">0</div>
    <div class="section-label">You</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-area">
    <div class="controls-row" id="game-controls" style="display:none;">
      <button class="ctrl-btn btn-hit" onclick="playerHit()">
        <span class="btn-icon">📥</span>
        HIT
      </button>
      <button class="ctrl-btn btn-stand" onclick="playerStand()">
        <span class="btn-icon">✋</span>
        STAND
      </button>
      <button class="ctrl-btn btn-double" onclick="playerDouble()">
        <span class="btn-icon">⚡</span>
        DOUBLE
      </button>
    </div>
  </div>

  <!-- RESULT OVERLAY — pointer-events: none by default, tombol Play Again di dalamnya -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-amount" id="result-amount"></div>
    <!-- Tombol Play Again dipindahkan ke dalam overlay dengan pointer-events: auto -->
    <button class="result-play-again-btn" id="play-again-btn" onclick="resetForNewRound()">
      🔄 PLAY AGAIN
    </button>
  </div>

  <!-- STATS PANEL -->
  <div class="stats-panel" id="stats-panel">
    <div class="stats-title">📊 Statistics</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-wins">0</div>
        <div class="stat-label">Wins</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-losses">0</div>
        <div class="stat-label">Losses</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-draws">0</div>
        <div class="stat-label">Draws</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-bj">0</div>
        <div class="stat-label">Blackjacks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-profit">0</div>
        <div class="stat-label">Profit</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>
    <button class="close-stats" onclick="toggleStats()">Close</button>
  </div>

  <!-- GAME OVER -->
  <div class="gameover-overlay" id="gameover-overlay">
    <div class="gameover-text">💸 BROKE!</div>
    <div class="gameover-sub">You ran out of coins.</div>
    <button class="restart-btn" onclick="restartGame()">🔄 Restart (1000 coins)</button>
  </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
