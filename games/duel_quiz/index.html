<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuelQuiz - Math Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen">
        <div class="bg-grid"></div>
        <div class="floating-symbols">
            <span>+</span><span>×</span><span>−</span><span>÷</span><span>+</span><span>×</span>
        </div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>

        <div class="start-content">
            <div class="logo-section">
                <div class="logo-badge">LOCAL MULTIPLAYER</div>
                <h1 class="game-title">QUIZ<span class="highlight"> DUEL</span></h1>
                <p class="subtitle">Math Battle Arena • 2 Players</p>
                <div class="title-divider"></div>
            </div>

            <div class="mode-select">
                <button class="mode-card mode-points" onclick="startGame('first10')">
                    <div class="mode-icon">🏆</div>
                    <div class="mode-info">
                        <h3>First to 10</h3>
                        <p>Race to the top! Fast & accurate wins.</p>
                    </div>
                    <div class="mode-arrow">→</div>
                </button>
                
                <button class="mode-card mode-time" onclick="startGame('time60')">
                    <div class="mode-icon">⏱️</div>
                    <div class="mode-info">
                        <h3>60s Blitz</h3>
                        <p>Survive the clock! Max points in 1 min.</p>
                    </div>
                    <div class="mode-arrow">→</div>
                </button>
            </div>

            <div class="start-footer">
                <p>Tap a mode to begin • Best of luck!</p>
            </div>
        </div>
    </div>

    <!-- ✨ Countdown Overlay -->
    <div id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
        <div class="countdown-subtitle" id="countdownSubtitle">Get Ready!</div>
    </div>

    <!-- Game Container -->
    <div id="gameContainer">
        <!-- Race Track Center -->
        <div id="raceTrack">
            <div class="finish-line"></div>
            <div id="lane2" class="race-lane">
                <div id="racer2" class="racer">
                    <span class="racer-flag">🏳️</span>
                </div>
            </div>
            <div id="lane1" class="race-lane">
                <div id="racer1" class="racer">
                    <span class="racer-flag">🏴</span>
                </div>
            </div>
            <div id="globalTimer" class="global-timer">60s</div>
        </div>
        
        <!-- Player 2 (Top - Red) -->
        <div id="player2Area" class="player-area">
            <div class="player-info-side hidden">
                <div class="player-name">PLAYER 2</div>
                <div class="player-score" id="score2">0</div>
            </div>
            <div class="player-content">
                <div class="question-box">
                    <div class="question" id="question2">3 + 5 = ?</div>
                    <div class="question-timer-track">
                        <div class="question-timer-fill" id="timerFill2" style="width: 100%"></div>
                    </div>
                    <div class="timer-info" id="timerText2">5.0s</div>
                    <div class="status-text" id="statusText2"></div>
                </div>
            </div>
            <div class="answers" id="answers2"></div>
        </div>

        <!-- Player 1 (Bottom - Blue) -->
        <div id="player1Area" class="player-area">
            <div class="player-info-side">
                <div class="player-name">PLAYER 1</div>
                <div class="player-score" id="score1">0</div>
            </div>
            <div class="player-content">
                <div class="question-box">
                    <div class="question" id="question1">3 + 5 = ?</div>
                    <div class="question-timer-track">
                        <div class="question-timer-fill" id="timerFill1" style="width: 100%"></div>
                    </div>
                    <div class="timer-info" id="timerText1">5.0s</div>
                    <div class="status-text" id="statusText1"></div>
                </div>
            </div>
            <div class="answers" id="answers1"></div>
        </div>
    </div>

    <!-- ✨ End Screen - Victory Celebration -->
    <div id="endScreen">
        <!-- Confetti Container -->
        <div id="confettiContainer"></div>
        
        <!-- Background Glow Effects -->
        <div class="end-glow glow-1"></div>
        <div class="end-glow glow-2"></div>
        
        <!-- Main Content -->
        <div class="end-content">
            <!-- Winner Badge -->
            <div class="winner-badge" id="winnerBadge">
                <span class="trophy-icon">🏆</span>
            </div>
            
            <!-- Winner Title -->
            <h1 class="winner-title" id="winnerText">Player 1 Wins!</h1>
            <p class="winner-subtitle">Champion of the Arena</p>
            
            <!-- Score Cards -->
            <div class="score-cards">
                <div class="score-card player1-card" id="endScore1">
                    <div class="card-header">
                        <span class="card-flag">🏴</span>
                        <span class="card-label">PLAYER 1</span>
                    </div>
                    <div class="card-score" id="finalScore1">0</div>
                    <div class="card-status" id="status1">Points</div>
                </div>
                
                <div class="score-card player2-card" id="endScore2">
                    <div class="card-header">
                        <span class="card-flag">🏳️</span>
                        <span class="card-label">PLAYER 2</span>
                    </div>
                    <div class="card-score" id="finalScore2">0</div>
                    <div class="card-status" id="status2">Points</div>
                </div>
            </div>
            
            <!-- Stats Summary (Optional) -->
            <div class="stats-summary" id="statsSummary">
                <div class="stat-item">
                    <span class="stat-icon">⚡</span>
                    <span class="stat-label">Best Round</span>
                    <span class="stat-value" id="bestRound">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-label">Accuracy</span>
                    <span class="stat-value" id="accuracy">-</span>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="end-actions">
                <button class="btn-play-again" onclick="location.reload()">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Play Again</span>
                </button>
            </div>
        </div>
    </div>
    <div class="home-return-btn" id="homeReturnBtn">
        <div class="home-return-progress"></div>
        <span class="home-return-icon">❌</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
