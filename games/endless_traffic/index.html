<!DOCTYPE html>
<html lang="id">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Endless Traffic Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', 'Arial', sans-serif;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #ui-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: none;
    z-index: 20;
  }
  #hud .hud-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 6px;
  }
  .hud-score-box {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px 12px;
    backdrop-filter: blur(4px);
  }
  .hud-score-box .label {
    font-size: 9px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
  .hud-score-box .value {
    font-size: 18px; font-weight: 800;
    color: #fff;
  }
  .hud-score-box .value.score-val { color: #ffd700; }
  .hud-score-box .value.high-val { color: #00e5ff; font-size: 12px; }
  #fuel-container {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px 12px;
    backdrop-filter: blur(4px);
    min-width: 100px;
  }
  #fuel-container .label {
    font-size: 9px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  #fuel-bar-bg {
    width: 100%; height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  #fuel-bar {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff6b00, #ffaa00, #00ff88);
    border-radius: 4px;
    transition: width 0.1s;
  }
  #speed-indicator {
    position: absolute;
    bottom: 80px; right: 14px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px 12px;
    backdrop-filter: blur(4px);
    display: none;
    z-index: 20;
  }
  #speed-indicator .label {
    font-size: 9px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
  #speed-indicator .value {
    font-size: 16px; font-weight: 800; color: #ff4444;
  }
  #near-miss-popup {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px; font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
    opacity: 0;
    pointer-events: none;
    z-index: 30;
    letter-spacing: 2px;
  }
  .screen-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    pointer-events: auto;
    z-index: 50;
  }
  #start-screen {
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(10,10,30,0.95) 100%);
  }
  #gameover-screen {
    background: rgba(0,0,0,0.88);
    display: none;
  }
  .game-title {
    font-size: 36px; font-weight: 900;
    background: linear-gradient(135deg, #ff4444, #ff8800, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    text-align: center;
    line-height: 1.1;
  }
  .game-subtitle {
    font-size: 13px; color: rgba(255,255,255,0.5);
    margin-bottom: 30px;
    text-align: center;
  }
  .btn {
    padding: 14px 48px;
    font-size: 18px; font-weight: 800;
    border: none; border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.2s;
    pointer-events: auto;
  }
  .btn-play {
    background: linear-gradient(135deg, #ff4444, #ff8800);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,68,68,0.4);
  }
  .btn-play:active {
    transform: scale(0.95);
    box-shadow: 0 2px 10px rgba(255,68,68,0.6);
  }
  .btn-restart {
    background: linear-gradient(135deg, #4444ff, #8844ff);
    color: #fff;
    box-shadow: 0 4px 20px rgba(68,68,255,0.4);
    margin-top: 16px;
  }
  .btn-restart:active {
    transform: scale(0.95);
  }
  .go-score {
    font-size: 48px; font-weight: 900; color: #ffd700;
    margin: 10px 0 4px;
  }
  .go-high {
    font-size: 14px; color: #00e5ff;
    margin-bottom: 6px;
  }
  .go-label {
    font-size: 13px; color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .go-stats {
    margin: 12px 0 20px;
    text-align: center;
  }
  .go-stats div {
    font-size: 12px; color: rgba(255,255,255,0.5);
    margin: 3px 0;
  }
  .go-stats span { color: #fff; font-weight: 700; }
  .hint-text {
    font-size: 11px; color: rgba(255,255,255,0.3);
    margin-top: 24px;
    text-align: center;
    line-height: 1.6;
  }
  .lives-display {
    position: absolute; top: 60px; left: 14px;
    display: flex; gap: 4px;
    z-index: 20;
  }
  .life-heart {
    font-size: 20px;
    filter: drop-shadow(0 0 4px rgba(255,0,0,0.5));
    transition: all 0.3s;
  }
  .life-heart.lost {
    opacity: 0.2;
    filter: none;
  }
  #combo-display {
    position: absolute;
    top: 100px; left: 50%;
    transform: translateX(-50%);
    font-size: 14px; font-weight: 800;
    color: #ff4444;
    text-shadow: 0 0 10px rgba(255,68,68,0.6);
    opacity: 0;
    pointer-events: none;
    z-index: 25;
  }
  .swipe-hint {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    pointer-events: none;
    z-index: 20;
    display: none;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.6; }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
  <div id="hud">
    <div class="hud-row">
      <div class="hud-score-box">
        <div class="label">Score</div>
        <div class="value score-val" id="score-display">0</div>
      </div>
      <div id="fuel-container">
        <div class="label">⚡ Boost</div>
        <div id="fuel-bar-bg"><div id="fuel-bar"></div></div>
      </div>
      <div class="hud-score-box" style="text-align:right;">
        <div class="label">Best</div>
        <div class="value high-val" id="highscore-display">0</div>
      </div>
    </div>
  </div>

  <div class="lives-display" id="lives-display" style="display:none;">
    <span class="life-heart" id="life1">❤️</span>
    <span class="life-heart" id="life2">❤️</span>
    <span class="life-heart" id="life3">❤️</span>
  </div>

  <div id="speed-indicator">
    <div class="label">Speed</div>
    <div class="value" id="speed-display">0</div>
  </div>

  <div id="near-miss-popup">NEAR MISS!</div>
  <div id="combo-display"></div>
  <div class="swipe-hint" id="swipe-hint">👆 Swipe kiri/kanan untuk pindah jalur</div>

  <!-- Start Screen -->
  <div class="screen-overlay" id="start-screen">
    <div class="game-title">ENDLESS<br>TRAFFIC<br>RACER</div>
    <div class="game-subtitle">Hindari kendaraan • Raih skor tertinggi</div>
    <button class="btn btn-play" id="btn-play">▶ PLAY</button>
    <div class="hint-text">
      👈 Swipe Kiri / Kanan → Pindah Jalur<br>
      👆 Tap & Tahan → Boost ⚡
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="screen-overlay" id="gameover-screen">
    <div class="go-label">GAME OVER</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-high" id="go-high">Best: 0</div>
    <div class="go-stats">
      <div>🚗 Near Miss: <span id="go-nearmiss">0</span></div>
      <div>📏 Distance: <span id="go-distance">0</span>m</div>
      <div>⚡ Max Combo: <span id="go-combo">0</span>x</div>
      <div>🏎️ Top Speed: <span id="go-speed">0</span> km/h</div>
    </div>
    <button class="btn btn-restart" id="btn-restart">🔄 RESTART</button>
  </div>
</div>

<script>
// ==================== GAME ENGINE ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ---- Responsive Canvas ----
let W, H, laneWidth, roadLeft, roadRight, roadWidth;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  roadWidth = Math.min(W * 0.85, 380);
  laneWidth = roadWidth / 5;
  roadLeft = (W - roadWidth) / 2;
  roadRight = roadLeft + roadWidth;
}
resize();
window.addEventListener('resize', resize);

// ---- Audio Engine (Web Audio API) ----
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'sine', volume = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playEngine(speed) {
  if (!audioCtx || !game.running) return;
  const freq = 60 + speed * 3;
  playTone(freq, 0.15, 'sawtooth', 0.03);
}

function playNearMiss() {
  playTone(800, 0.15, 'sine', 0.2);
  playTone(1200, 0.1, 'sine', 0.15);
}

function playBoost() {
  playTone(200, 0.3, 'sawtooth', 0.1);
  playTone(400, 0.2, 'square', 0.08);
}

function playCrash() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.4;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
  playTone(150, 0.3, 'square', 0.2);
}

function playLevelUp() {
  playTone(523, 0.1, 'sine', 0.15);
  setTimeout(() => playTone(659, 0.1, 'sine', 0.15), 80);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 160);
}

function playHorn() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Nada klakson realistis (2 frekuensi sedikit offset)
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'square';
  osc1.frequency.setValueAtTime(420, now);
  
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(490, now);
  
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + 0.25);
  osc2.stop(now + 0.25);
}

// ---- Game State ----
const game = {
  running: false,
  paused: false,
  score: 0,
  highScore: parseInt(localStorage.getItem('etrHighScore') || '0'),
  lives: 3,
  maxLives: 3,
  distance: 0,
  nearMissCount: 0,
  maxCombo: 0,
  topSpeed: 0,
  level: 1,
  speed: 3,
  baseSpeed: 3,
  maxSpeed: 15,
  speedIncrement: 0.003,
  boostActive: false,
  boostFuel: 100,
  boostMaxFuel: 100,
  boostDrain: 0.8,
  boostRecharge: 0.15,
  boostMultiplier: 2,
  nearMissTimer: 0,
  screenShake: 0,
  slowMotion: false,
  slowMotionTimer: 0,
  lastTime: 0,
  engineTimer: 0,
  spawnTimer: 0,
  difficultyTimer: 0,
  invincible: false,
  invincibleTimer: 0,
  hornCooldown: 0,
  gameOver: false
};

// ---- Player ----
const player = {
  lane: 1, // 0=left, 1=center, 2=right
  targetLane: 1,
  x: 0, y: 0,
  width: 40, height: 70,
  laneSwitchSpeed: 12,
  movingLane: false,
  glowIntensity: 0,
  trail: []
};

// ---- Obstacles ----
let obstacles = [];
const obstacleTypes = [
  { name: 'car_slow', w: 38, h: 65, speed: 0.5, colors: ['#4488ff','#44cc88','#ffaa44','#cc44cc','#88cc44'] },
  { name: 'car_fast', w: 36, h: 62, speed: 1.5, colors: ['#ff4444','#ff6644','#ff8800','#ff2266'] },
  { name: 'truck',    w: 44, h: 95, speed: 0.3, colors: ['#666','#888','#555','#777'] },
  { name: 'bus',      w: 46, h: 110, speed: 0.2, colors: ['#2266cc','#ddaa22','#cc3333','#ffffff'] },
  { name: 'van',      w: 42, h: 80, speed: 0.6, colors: ['#eeeeee','#cccccc','#aaaaaa','#556677'] },
  { name: 'sports',   w: 34, h: 58, speed: 2.0, colors: ['#ff0055','#00ffaa','#8800ff','#ffcc00'] },
  { name: 'taxi',     w: 38, h: 64, speed: 0.8, colors: ['#ffcc00','#ffaa00'] },
  { name: 'police',   w: 38, h: 66, speed: 1.2, colors: ['#111111','#ffffff','#0000cc'] }
];

// ---- Road Lines ----
let roadLines = [];
function initRoadLines() {
  roadLines = [];
  const spacing = 60;
  for (let y = -spacing; y < H + spacing; y += spacing) {
    roadLines.push({ y });
  }
}
initRoadLines();

// ---- Particles ----
let particles = [];
function spawnParticles(x, y, count, color, spread = 3, life = 40) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread * 2,
      vy: (Math.random() - 0.5) * spread * 2 - 1,
      life: life + Math.random() * 20,
      maxLife: life + 20,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

function spawnExplosion(x, y) {
  const colors = ['#ff4400', '#ff8800', '#ffcc00', '#ff2200', '#ffffff'];
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 3 + Math.random() * 6
    });
  }
  // Smoke
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 40 + Math.random() * 30,
      maxLife: 70,
      color: 'rgba(100,100,100,0.6)',
      size: 5 + Math.random() * 8
    });
  }
}

// ---- Spawn System ----
function spawnObstacle() {
  const roll = Math.random();
  let typeIndex;
  if (roll < 0.20) typeIndex = 0;
  else if (roll < 0.35) typeIndex = 1;
  else if (roll < 0.45) typeIndex = 2;
  else if (roll < 0.58) typeIndex = 3;
  else if (roll < 0.68) typeIndex = 4;
  else if (roll < 0.80) typeIndex = 5;
  else if (roll < 0.90) typeIndex = 6;
  else typeIndex = 7;

  const type = obstacleTypes[typeIndex];
  const lane = Math.floor(Math.random() * 5); // ✅ 5 Lajur (0-4)
  const laneCenter = getLaneCenter(lane);

  // Cek agar tidak spawn tumpang tindih
  for (const obs of obstacles) {
    if (obs.lane === lane && obs.y < 130) return;
  }

  const color = type.colors[Math.floor(Math.random() * type.colors.length)];
  obstacles.push({
    lane,
    x: laneCenter - type.w / 2, // ✅ FIX: Simpan sebagai TOP-LEFT X (bukan tengah)
    y: -type.h - 20,
    width: type.w,
    height: type.h,
    speed: type.speed,
    type: type.name,
    color,
    nearMissChecked: false,
    passed: false
  });
}

// ---- Lane System ----
function getLaneCenter(lane) {
  return roadLeft + laneWidth * lane + laneWidth / 2;
}

function getLaneX(lane) {
  return getLaneCenter(lane) - player.width / 2;
}

// ---- Touch Controls ----
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let isTouching = false, touchHoldTimer = 0;
let boostHeld = false;

function handleTouchStart(e) {
  e.preventDefault();
  initAudio();
  if (!game.running || game.gameOver) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
  isTouching = true;
  boostHeld = false;
}

function handleTouchMove(e) {
  e.preventDefault();
  if (!isTouching || !game.running || game.gameOver) return;
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (!isTouching || !game.running || game.gameOver) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;

  if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
    // Swipe
    if (dx > 0 && player.targetLane < 4) {
      player.targetLane++;
      player.movingLane = true;
    } else if (dx < 0 && player.targetLane > 0) {
      player.targetLane--;
      player.movingLane = true;
    }
  } else if (dt < 200 && Math.abs(dx) < 30 && Math.abs(dy) < 30) {
    // Tap - brief boost tap
    if (game.boostFuel > 10) {
      game.boostActive = !game.boostActive;
      if (game.boostActive) playBoost();
    }
  }

  isTouching = false;
  boostHeld = false;
}

// Long press for boost
let longPressCheck = null;
function handleTouchStartWithLongPress(e) {
  handleTouchStart(e);
  longPressCheck = setTimeout(() => {
    if (isTouching && game.boostFuel > 10) {
      boostHeld = true;
      game.boostActive = true;
      playBoost();
    }
  }, 200);
}

function handleTouchEndWithLongPress(e) {
  if (longPressCheck) {
    clearTimeout(longPressCheck);
    longPressCheck = null;
  }
  handleTouchEnd(e);
  game.boostActive = false;
  boostHeld = false;
}

canvas.addEventListener('touchstart', handleTouchStartWithLongPress, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEndWithLongPress, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEndWithLongPress, { passive: false });

// Keyboard fallback
document.addEventListener('keydown', (e) => {
  if (!game.running || game.gameOver) return;
    if (e.key === 'ArrowLeft' && player.targetLane > 0) {
    player.targetLane--;
    player.movingLane = true;
  } else if (e.key === 'ArrowRight' && player.targetLane < 4) { // WAS: < 2
    player.targetLane++;
    player.movingLane = true;
  } else if (e.key === 'ArrowRight' && player.targetLane < 2) {
    player.targetLane++;
    player.movingLane = true;
  } else if (e.key === ' ' || e.key === 'ArrowUp') {
    game.boostActive = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === ' ' || e.key === 'ArrowUp') game.boostActive = false;
});

// ---- Collision Detection ----
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  const shrink = 4; // slight forgiveness
  return ax + shrink < bx + bw - shrink &&
         ax + aw - shrink > bx + shrink &&
         ay + shrink < by + bh - shrink &&
         ay + ah - shrink > by + shrink;
}

// ---- Near Miss Detection ----
function checkNearMiss(obs, isStable) {
  if (obs.nearMissChecked || obs.passed) return;

  // Jangan trigger near miss jika player masih dalam proses pindah jalur
  if (!isStable) return;

  const pCx = player.x + player.width / 2;
  const oCx = obs.x + obs.width / 2;
  const distX = Math.abs(pCx - oCx);

  // Threshold hitbox & near miss
  const collisionThreshold = (player.width + obs.width) / 2 - 3;
  const nearMissThreshold = collisionThreshold + 22;

  // Trigger hanya jika jarak X masuk zona near miss (tidak terlalu dekat, tidak terlalu jauh)
  if (distX >= collisionThreshold && distX <= nearMissThreshold) {
    obs.nearMissChecked = true;
    obs.passed = true;
    game.nearMissCount++;
    game.score += 50 * (game.boostActive ? game.boostMultiplier : 1);

    // Combo tracking
    if (game.nearMissCount > game.maxCombo) game.maxCombo = game.nearMissCount;

    // Efek visual & audio
    showNearMissPopup();
    player.glowIntensity = 1;
    game.screenShake = 4;
    game.slowMotion = true;
    game.slowMotionTimer = 12;

    const midX = (pCx + oCx) / 2;
    spawnParticles(midX, player.y, 6, '#ffd700', 2, 18);
    playNearMiss();

    // Update combo UI
    const comboEl = document.getElementById('combo-display');
    comboEl.textContent = `🔥 ${game.nearMissCount}x COMBO`;
    comboEl.style.opacity = '1';
    setTimeout(() => { comboEl.style.opacity = '0'; }, 1200);
  }

  // Tandai passed jika obstacle sudah sepenuhnya melewati player
  if (obs.y > player.y + player.height + 15) {
    obs.passed = true;
  }
}

function showNearMissPopup() {
  const el = document.getElementById('near-miss-popup');
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, -50%) scale(1.2)';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -50%) scale(1)';
  }, 600);
}

// ---- Drawing Functions ----
function drawRoad() {
  // Road background
  const roadGrad = ctx.createLinearGradient(roadLeft, 0, roadRight, 0);
  roadGrad.addColorStop(0, '#2a2a2a');
  roadGrad.addColorStop(0.05, '#333');
  roadGrad.addColorStop(0.5, '#3a3a3a');
  roadGrad.addColorStop(0.95, '#333');
  roadGrad.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadLeft, 0, roadWidth, H);

  // Road edges
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(roadLeft - 4, 0, 4, H);
  ctx.fillRect(roadRight, 0, 4, H);

  // Lane dividers (dashed)
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([30, 25]);

  for (let i = 1; i < 5; i++) { // WAS: i < 3
    const x = roadLeft + laneWidth * i;
    ctx.lineDashOffset = -(game.distance * 3) % 55;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawCar(x, y, w, h, color, isPlayer = false, glow = 0) {
  ctx.save();
  if (glow > 0) {
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = glow * 20;
  }

  // Body mobil
  const r = 6;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();

  // Kaca Depan (DEPAN - Atas)
  ctx.fillStyle = isPlayer ? 'rgba(100,200,255,0.8)' : 'rgba(150,200,255,0.6)';
  ctx.fillRect(x + 5, y + h * 0.12, w - 10, h * 0.18);

  // Kaca Belakang (BELAKANG - Bawah)
  ctx.fillStyle = 'rgba(80,120,180,0.4)';
  ctx.fillRect(x + 7, y + h * 0.7, w - 14, h * 0.12);

  // Lampu Depan (HEADLIGHTS - Atas)
  ctx.fillStyle = '#ffffaa';
  ctx.shadowColor = '#ffffaa';
  ctx.shadowBlur = 6;
  ctx.fillRect(x + 4, y + 2, 8, 5);
  ctx.fillRect(x + w - 12, y + 2, 8, 5);
  ctx.shadowBlur = 0;

  // Lampu Belakang (TAILLIGHTS - Bawah)
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(x + 3, y + h - 6, 8, 4);
  ctx.fillRect(x + w - 11, y + h - 6, 8, 4);

  // Garis samping khusus player
  if (isPlayer) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 2, y + h * 0.3, 3, h * 0.3);
    ctx.fillRect(x + w - 5, y + h * 0.3, 3, h * 0.3);
  }

  ctx.restore();
}

function drawTruck(x, y, w, h, color) {
  ctx.save();

  // Body truk
  const r = 4;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();

  // Kabin (DEPAN - Atas)
  ctx.fillStyle = shadeColor(color, 20);
  ctx.fillRect(x + 3, y + 3, w - 6, h * 0.3);

  // Kaca Depan (DEPAN - Atas)
  ctx.fillStyle = 'rgba(150,200,255,0.6)';
  ctx.fillRect(x + 6, y + h * 0.08, w - 12, h * 0.18);

  // Lampu Belakang (BELAKANG - Bawah)
  ctx.fillStyle = '#ff3300';
  ctx.shadowColor = '#ff3300';
  ctx.shadowBlur = 4;
  ctx.fillRect(x + 3, y + h - 5, 8, 4);
  ctx.fillRect(x + w - 11, y + h - 5, 8, 4);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
  const b = Math.min(255, (num & 0x0000FF) + percent);
  return `rgb(${r},${g},${b})`;
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBoostEffect() {
  if (!game.boostActive) return;

  // Boost flames from player
  const px = player.x + player.width / 2;
  const py = player.y + player.height;

  for (let i = 0; i < 3; i++) {
    const fx = px + (Math.random() - 0.5) * 20;
    const fy = py + Math.random() * 20;
    const size = 3 + Math.random() * 8;
    const colors = ['#ff4400', '#ff8800', '#ffcc00', '#ffffff'];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.globalAlpha = 0.6 + Math.random() * 0.4;
    ctx.beginPath();
    ctx.arc(fx, fy, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Boost glow on player
  player.glowIntensity = Math.min(1, player.glowIntensity + 0.1);
}

function drawSpeedLines() {
  if (game.speed < 6) return;
  const intensity = (game.speed - 6) / (game.maxSpeed - 6);
  ctx.globalAlpha = intensity * 0.3;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;

  const count = Math.floor(intensity * 8);
  for (let i = 0; i < count; i++) {
    const x = roadLeft + Math.random() * roadWidth;
    const y = Math.random() * H;
    const len = 20 + intensity * 40;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y + len);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ---- UI Updates ----
function updateHUD() {
  document.getElementById('score-display').textContent = Math.floor(game.score);
  document.getElementById('highscore-display').textContent = Math.floor(game.highScore);
  document.getElementById('fuel-bar').style.width = game.boostFuel + '%';

  const speedKmh = Math.floor(game.speed * 20);
  document.getElementById('speed-display').textContent = speedKmh;

  // Lives
  for (let i = 1; i <= game.maxLives; i++) {
    const el = document.getElementById('life' + i);
    if (i <= game.lives) el.classList.remove('lost');
    else el.classList.add('lost');
  }

  // Fuel bar color
  const fuelBar = document.getElementById('fuel-bar');
  if (game.boostFuel > 60) {
    fuelBar.style.background = 'linear-gradient(90deg, #00ff88, #44ff44)';
  } else if (game.boostFuel > 30) {
    fuelBar.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc00)';
  } else {
    fuelBar.style.background = 'linear-gradient(90deg, #ff4400, #ff6600)';
  }
}

// ---- Game Functions ----
function startGame() {
  initAudio();
  game.hornCooldown = 0; // Tambahkan baris ini
  game.running = true;
  game.gameOver = false;
  game.score = 0;
  game.lives = game.maxLives;
  game.distance = 0;
  game.nearMissCount = 0;
  game.maxCombo = 0;
  game.topSpeed = 0;
  game.level = 1;
  game.speed = game.baseSpeed;
  game.boostActive = false;
  game.boostFuel = game.boostMaxFuel;
  game.nearMissTimer = 0;
  game.screenShake = 0;
  game.slowMotion = false;
  game.slowMotionTimer = 0;
  game.lastTime = performance.now();
  game.engineTimer = 0;
  game.spawnTimer = 0;
  game.difficultyTimer = 0;
  game.invincible = false;
  game.invincibleTimer = 0;

  player.lane = 2;
  player.targetLane = 2;
  player.x = getLaneX(2);
  player.y = H - player.height - 60;
  player.movingLane = false;
  player.glowIntensity = 0;
  player.trail = [];

  obstacles = [];
  particles = [];
  initRoadLines();

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('lives-display').style.display = 'flex';
  document.getElementById('speed-indicator').style.display = 'block';

  gameLoop(performance.now());
}

function gameOver() {
  game.running = false;
  game.gameOver = true;

  // Save high score
  if (game.score > game.highScore) {
    game.highScore = Math.floor(game.score);
    localStorage.setItem('etrHighScore', game.highScore);
  }

  // Explosion effect
  spawnExplosion(player.x + player.width / 2, player.y + player.height / 2);
  playCrash();

  // Show game over after a brief delay
  setTimeout(() => {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('lives-display').style.display = 'none';
    document.getElementById('speed-indicator').style.display = 'none';
    document.getElementById('gameover-screen').style.display = 'flex';
    document.getElementById('go-score').textContent = Math.floor(game.score);
    document.getElementById('go-high').textContent = 'Best: ' + Math.floor(game.highScore);
    document.getElementById('go-nearmiss').textContent = game.nearMissCount;
    document.getElementById('go-distance').textContent = Math.floor(game.distance);
    document.getElementById('go-combo').textContent = game.maxCombo;
    document.getElementById('go-speed').textContent = (game.topSpeed * 20).toFixed(1);
  }, 800);
}

function hitPlayer() {
  if (game.invincible) return;

  game.lives--;
  game.screenShake = 10;
  playCrash();

  // Invincibility frames
  game.invincible = true;
  game.invincibleTimer = 60;

  spawnParticles(
    player.x + player.width / 2,
    player.y + player.height / 2,
    15, '#ff4444', 4, 25
  );

  if (game.lives <= 0) {
    gameOver();
  }
}

function drawHeadlights() {
  const cx = player.x + player.width / 2;
  const topY = player.y;
  
  // Ukuran lebih proporsional & tidak menutupi jalan
  const beamLen = game.boostActive ? 140 : 100;
  const halfWStart = player.width * 0.25; // Lebar di dasar
  const halfWEnd = player.width * 0.8;    // Lebar di ujung

  ctx.save();
  ctx.globalCompositeOperation = 'lighter'; // Blend mode khusus cahaya

  // 🔦 Gradien utama dengan fade bertahap di ujung
  const grad = ctx.createLinearGradient(cx, topY, cx, topY - beamLen);
  grad.addColorStop(0, 'rgba(255, 250, 200, 0.18)');   // Dekat mobil (terang)
  grad.addColorStop(0.3, 'rgba(255, 250, 180, 0.08)'); // Tengah
  grad.addColorStop(0.7, 'rgba(255, 250, 150, 0.02)'); // Mulai memudar
  grad.addColorStop(1, 'rgba(255, 250, 150, 0)');      // Ujung (transparan total)

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - halfWStart, topY);
  ctx.lineTo(cx - halfWEnd, topY - beamLen);
  ctx.lineTo(cx + halfWEnd, topY - beamLen);
  ctx.lineTo(cx + halfWStart, topY);
  ctx.closePath();
  ctx.fill();

  // 💡 Inti cahaya (core beam) - lebih pendek, fade cepat ke atas
  const coreLen = beamLen * 0.55;
  const coreGrad = ctx.createLinearGradient(cx, topY, cx, topY - coreLen);
  coreGrad.addColorStop(0, 'rgba(255, 255, 255, 0.12)');
  coreGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');

  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.moveTo(cx - halfWStart * 0.6, topY);
  ctx.lineTo(cx - halfWEnd * 0.35, topY - coreLen);
  ctx.lineTo(cx + halfWEnd * 0.35, topY - coreLen);
  ctx.lineTo(cx + halfWStart * 0.6, topY);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ---- Main Game Loop ----
function gameLoop(timestamp) {
  if (!game.running && !game.gameOver) return;

  let dt = (timestamp - game.lastTime) / 16.67; // normalize to ~60fps
  game.lastTime = timestamp;

  // Cap dt to avoid huge jumps
  dt = Math.min(dt, 3);

  // Slow motion
  if (game.slowMotion) {
    game.slowMotionTimer -= dt;
    if (game.slowMotionTimer <= 0) game.slowMotion = false;
    dt *= 0.3;
  }

  // Update
  update(dt);

  // Draw
  draw();

  // Continue loop
  if (game.running || particles.length > 0) {
    requestAnimationFrame(gameLoop);
  }
}

function update(dt) {
  if (game.gameOver) {
    // Only update particles
    updateParticles(dt);
    return;
  }

  // Increase speed over time
  game.difficultyTimer += dt;
  game.speed = Math.min(game.maxSpeed, game.speed + game.speedIncrement * dt);
  game.topSpeed = Math.max(game.topSpeed, game.speed);

  // Level up
  const newLevel = Math.floor(game.difficultyTimer / 600) + 1;
  if (newLevel > game.level) {
    game.level = newLevel;
    playLevelUp();
  }

  // Distance & Score
  const moveSpeed = game.boostActive ? game.speed * game.boostMultiplier : game.speed;
  game.distance += moveSpeed * dt;
  game.score += moveSpeed * 0.5 * (game.boostActive ? game.boostMultiplier : 1) * dt;

  // Boost
  if (game.boostActive && game.boostFuel > 0) {
    game.boostFuel -= game.boostDrain * dt;
    if (game.boostFuel <= 0) {
      game.boostFuel = 0;
      game.boostActive = false;
    }
    // Boost particles
    if (Math.random() < 0.3) {
      spawnParticles(
        player.x + player.width / 2 + (Math.random() - 0.5) * 10,
        player.y + player.height,
        1,
        Math.random() < 0.5 ? '#ff4400' : '#ffcc00',
        1, 15
      );
    }
  } else {
    game.boostActive = false;
    game.boostFuel = Math.min(game.boostMaxFuel, game.boostFuel + game.boostRecharge * dt);
  }

  // Engine sound
  game.engineTimer += dt;
  if (game.engineTimer > 8) {
    game.engineTimer = 0;
    playEngine(game.speed);
  }

  // Player lane switching
      // ✅ SMOOTH LANE SWITCHING (LERP) - Menghilangkan getar/jitter
    if (player.movingLane) {
      const targetX = getLaneX(player.targetLane);
      const dx = targetX - player.x;
      
      // Exponential smoothing: konvergen halus tanpa overshoot
      player.x += dx * 0.18 * dt;

      // Clamp agar tidak keluar jalan
      player.x = Math.max(roadLeft + 4, Math.min(roadRight - player.width - 4, player.x));

      // Snap ke target saat sangat dekat
      if (Math.abs(dx) < 0.5) {
        player.x = targetX;
        player.lane = player.targetLane;
        player.movingLane = false;
      }
    }

  // Player Y position
  player.y = H - player.height - 60;

  // Glow decay
  if (player.glowIntensity > 0) {
    player.glowIntensity -= 0.02 * dt;
    if (player.glowIntensity < 0) player.glowIntensity = 0;
  }

  // Invincibility
  if (game.invincible) {
    game.invincibleTimer -= dt;
    if (game.invincibleTimer <= 0) game.invincible = false;
  }

  // Spawn obstacles
  const spawnInterval = Math.max(25, 80 - game.level * 5);
  game.spawnTimer += dt;
  if (game.spawnTimer > spawnInterval) {
    game.spawnTimer = 0;
    spawnObstacle();
    // Extra obstacle at higher levels
    if (game.level > 3 && Math.random() < 0.3) {
      setTimeout(() => { if (game.running) spawnObstacle(); }, 200);
    }
    if (game.level > 6 && Math.random() < 0.3) {
      setTimeout(() => { if (game.running) spawnObstacle(); }, 400);
    }
  }

    // 🚨 LOGIKA KLAKSON PERINGATAN
  if (game.hornCooldown > 0) game.hornCooldown -= dt;
  const warningDist = 130; // Jarak peringatan (pixel)
  let inDanger = false;
  for (const obs of obstacles) {
    // Hanya cek obstacle di jalur yang sama & masih di depan player
    if (obs.lane === player.targetLane && obs.y > player.y - warningDist && obs.y < player.y) {
      inDanger = true;
      break;
    }
  }
  if (inDanger && game.hornCooldown <= 0) {
    playHorn();
    game.hornCooldown = 35; // ~0.6 detik cooldown (mencegah spam)
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    const relativeSpeed = moveSpeed - obs.speed;
    obs.y += relativeSpeed * dt;

    const isStable = !player.movingLane;

    // Collision check
    if (isStable && !game.invincible) {
      if (rectsOverlap(player.x, player.y, player.width, player.height,
                        obs.x, obs.y, obs.width, obs.height)) {
        hitPlayer();
        obstacles.splice(i, 1);
        continue;
      }
    }

    // Near Miss check (hanya saat vertikal overlap & posisi stabil)
    if (obs.y > player.y - 30 && obs.y < player.y + player.height + 30) {
      checkNearMiss(obs, isStable);
    }

    // Remove off-screen
    if (obs.y > H + 100) {
      obstacles.splice(i, 1);
    }
  }

  // Update road lines
  for (const line of roadLines) {
    line.y += moveSpeed * dt;
    if (line.y > H + 60) line.y -= H + 120;
  }

  // Update particles
  updateParticles(dt);

  // Screen shake decay
  if (game.screenShake > 0) game.screenShake *= 0.9;
  if (game.screenShake < 0.1) game.screenShake = 0;

  // Update HUD
  updateHUD();
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.save();

  // Screen shake
  if (game.screenShake > 0) {
    const sx = (Math.random() - 0.5) * game.screenShake * 2;
    const sy = (Math.random() - 0.5) * game.screenShake * 2;
    ctx.translate(sx, sy);
  }

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Road
  drawRoad();

  if (!game.gameOver) drawHeadlights();

  // Speed lines
  drawSpeedLines();

  // Road lines animation handled in drawRoad

  // Obstacles
  for (const obs of obstacles) {
    // Kendaraan besar (truck, bus, van) pakai drawTruck, sisanya drawCar
    if (obs.type === 'truck' || obs.type === 'bus' || obs.type === 'van') {
      drawTruck(obs.x, obs.y, obs.width, obs.height, obs.color);
    } else {
      drawCar(obs.x, obs.y, obs.width, obs.height, obs.color, false);
    }
  }

  // Player
  if (!game.gameOver) {
    // Invincibility blink
    if (game.invincible && Math.floor(game.invincibleTimer) % 4 < 2) {
      // skip drawing
    } else {
      drawBoostEffect();
      drawCar(player.x, player.y, player.width, player.height, '#ff2244', true, player.glowIntensity);

      // Boost glow ring
      if (game.boostActive) {
        ctx.strokeStyle = `rgba(255,170,0,${0.3 + Math.sin(Date.now() / 100) * 0.2})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(
          player.x + player.width / 2,
          player.y + player.height / 2,
          player.width / 2 + 8,
          player.height / 2 + 8,
          0, 0, Math.PI * 2
        );
        ctx.stroke();
      }
    }
  }

  // Particles
  drawParticles();

  // Motion blur overlay at high speed
  if (game.speed > 8) {
    const blurAlpha = (game.speed - 8) / (game.maxSpeed - 8) * 0.05;
    ctx.fillStyle = `rgba(0,0,0,${blurAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

// ---- Button Handlers ----
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-play').addEventListener('touchend', (e) => {
  e.preventDefault();
  startGame();
});

document.getElementById('btn-restart').addEventListener('touchend', (e) => {
  e.preventDefault();
  startGame();
});

document.getElementById('highscore-display').textContent = Math.floor(game.highScore);

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
