<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Endless Traffic Racer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
  <div id="hud">
    <div class="hud-row">
      <div class="hud-score-box">
        <div class="label">Score</div>
        <div class="value score-val" id="score-display">0</div>
      </div>
      <div id="fuel-container">
        <div class="label">⚡ Boost</div>
        <div id="fuel-bar-bg"><div id="fuel-bar"></div></div>
      </div>
      <div class="hud-score-box" style="text-align:right;">
        <div class="label">Best</div>
        <div class="value high-val" id="highscore-display">0</div>
      </div>
    </div>
  </div>

  <div class="lives-display" id="lives-display" style="display:none;">
    <span class="life-heart" id="life1">❤️</span>
    <span class="life-heart" id="life2">❤️</span>
    <span class="life-heart" id="life3">❤️</span>
  </div>

  <div id="speed-indicator">
    <div class="label">Speed</div>
    <div class="value" id="speed-display">0</div>
  </div>

  <div id="near-miss-popup">NEAR MISS!</div>
  <div id="combo-display"></div>
  <div class="swipe-hint" id="swipe-hint">👆 Swipe kiri/kanan untuk pindah jalur</div>

  <!-- Start Screen -->
  <div class="screen-overlay" id="start-screen">
    <div class="game-title">ENDLESS<br>TRAFFIC<br>RACER</div>
    <div class="game-subtitle">Hindari kendaraan • Raih skor tertinggi</div>
    <button class="btn btn-play" id="btn-play">▶ PLAY</button>
    <div class="hint-text">
      👈 Swipe Kiri / Kanan → Pindah Jalur<br>
      👆 Tap & Tahan → Boost ⚡
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="screen-overlay" id="gameover-screen">
    <div class="go-label">GAME OVER</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-high" id="go-high">Best: 0</div>
    <div class="go-stats">
      <div>🚗 Near Miss: <span id="go-nearmiss">0</span></div>
      <div>📏 Distance: <span id="go-distance">0</span>m</div>
      <div>⚡ Max Combo: <span id="go-combo">0</span>x</div>
      <div>🏎️ Top Speed: <span id="go-speed">0</span> km/h</div>
    </div>
    <button class="btn btn-restart" id="btn-restart">🔄 RESTART</button>
  </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
