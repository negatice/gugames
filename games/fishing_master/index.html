<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fishing Master</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// FISHING MASTER v6 - Enhanced UI/UX Design
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, SCALE;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  SCALE = Math.min(W / 400, H / 750);
}
window.addEventListener('resize', resize);
resize();

// --- DIFFICULTY LEVELS ---
const LEVELS = [
  { id: 'amateur', name: 'Amatir', time: 30, color: '#4CAF50', icon: '🐟', desc: 'Pemula', gradient: ['#66BB6A', '#43A047'] },
  { id: 'intermediate', name: 'Menengah', time: 60, color: '#FF9800', icon: '🐠', desc: 'Menengah', gradient: ['#FFA726', '#FB8C00'] },
  { id: 'maniac', name: 'Maniak', time: 180, color: '#F44336', icon: '🦈', desc: 'Expert', gradient: ['#EF5350', '#E53935'] }
];

let currentLevel = LEVELS[0];

// --- AUDIO ---
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    switch(type) {
      case 'splash': osc.type='sine'; osc.frequency.setValueAtTime(600,now); osc.frequency.exponentialRampToValueAtTime(200,now+0.25); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
      case 'catch': osc.type='triangle'; osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(900,now+0.15); gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.2); osc.start(now); osc.stop(now+0.2); break;
      case 'rare': osc.type='sine'; osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(1200,now+0.3); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
      case 'hit': osc.type='square'; osc.frequency.setValueAtTime(150,now); osc.frequency.exponentialRampToValueAtTime(50,now+0.15); gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.15); osc.start(now); osc.stop(now+0.15); break;
      case 'reel': osc.type='sawtooth'; osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(500,now+0.08); gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.08); osc.start(now); osc.stop(now+0.08); break;
      case 'struggle': osc.type='triangle'; osc.frequency.setValueAtTime(120,now); osc.frequency.linearRampToValueAtTime(160,now+0.1); gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(now); osc.stop(now+0.1); break;
      case 'snap': osc.type='sawtooth'; osc.frequency.setValueAtTime(800,now); osc.frequency.exponentialRampToValueAtTime(100,now+0.3); gain.gain.setValueAtTime(0.4,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); osc.start(now); osc.stop(now+0.3); break;
      case 'escape': osc.type='sine'; osc.frequency.setValueAtTime(400,now); osc.frequency.exponentialRampToValueAtTime(150,now+0.4); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.4); osc.start(now); osc.stop(now+0.4); break;
      case 'click': osc.type='sine'; osc.frequency.setValueAtTime(800,now); osc.frequency.exponentialRampToValueAtTime(400,now+0.1); gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(now); osc.stop(now+0.1); break;
      case 'win': 
        for(let i=0; i<3; i++) {
          const osc2 = audioCtx.createOscillator();
          const gain2 = audioCtx.createGain();
          osc2.connect(gain2); gain2.connect(audioCtx.destination);
          osc2.type='sine'; osc2.frequency.setValueAtTime(400+i*200,now+i*0.1);
          osc2.frequency.exponentialRampToValueAtTime(800+i*200,now+i*0.1+0.2);
          gain2.gain.setValueAtTime(0.2,now+i*0.1); gain2.gain.exponentialRampToValueAtTime(0.01,now+i*0.1+0.3);
          osc2.start(now+i*0.1); osc2.stop(now+i*0.1+0.3);
        }
        break;
    }
  } catch(e) {}
}
function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

// --- GAME STATE ---
const STATE = { MENU: 0, PLAYING: 1, RESULT: 2 };
let gameState = STATE.MENU;
let totalWeight = 0;
let sessionFish = [];
let combo = 0; let maxCombo = 0; let energy = 100;
let gameTimer = 0;
let resultAnim = { progress: 0, revealed: 0, fishIndex: 0, particles: [] };
let menuParticles = [];
let buttonHover = { level: -1, start: false };

// Preload semua gambar ikan
const FISH_IMAGES = {};
const FISH_IMAGE_SOURCES = {
  'ikan-normal1': '../../assets/images/fish/normal_fish.png',
  'ikan-normal2': '../../assets/images/fish/normal_fish_2.png',
  'ikan-dori':    '../../assets/images/fish/dory_fish.png',
  'ikan-buntal':  '../../assets/images/fish/puffer-fish.png',
  'ikan-nemo':    '../../assets/images/fish/clown-fish.png',
  'hiu':          '../../assets/images/fish/shark.png',
  'paus':         '../../assets/images/fish/aquatic.png',
  'tuna':         '../../assets/images/fish/tuna.png',
};

// SESUDAH — dengan error handler dan flag imagesReady:
let imagesReady = false;

Promise.all(
  Object.entries(FISH_IMAGE_SOURCES).map(([key, src]) =>
    new Promise(resolve => {
      const img = new Image();
      img.onload  = () => { FISH_IMAGES[key] = img; resolve(); };
      img.onerror = () => {
        console.warn('Gagal load gambar:', src);
        FISH_IMAGES[key] = null;
        resolve();
      };
      img.src = src;
    })
  )
).then(() => {
  imagesReady = true;
  console.log('Gambar siap:', Object.keys(FISH_IMAGES).filter(k => FISH_IMAGES[k]));
});

// --- FISH DEFINITIONS ---
const FISH_TYPES = [
  { name:'Ikan Normal',  imgKey:'ikan-normal1', emoji:'🐟', weight:50,   size:12, res:0.3, hp:8,  speed:40, pattern:'straight', minD:0,   color:'#B3E5FC' },
  { name:'Ikan Kecil',   imgKey:'ikan-normal2', emoji:'🐠', weight:100,  size:12, res:0.5, hp:14, speed:55, pattern:'zigzag',   minD:10,  color:'#4FC3F7' },
  { name:'Ikan Dori',    imgKey:'ikan-dori',    emoji:'🐟', weight:250,  size:14, res:0.8, hp:22, speed:45, pattern:'circle',   minD:40,  color:'#9C27B0' },
  { name:'Ikan Buntal',  imgKey:'ikan-buntal',  emoji:'🐡', weight:500,  size:14, res:1.0, hp:30, speed:35, pattern:'straight', minD:80,  color:'#FF9800' },
  { name:'Ikan Nemo',    imgKey:'ikan-nemo',    emoji:'🐠', weight:1000, size:14, res:1.3, hp:40, speed:70, pattern:'erratic',  minD:130, color:'#FF5722' },
  { name:'Hiu',          imgKey:'hiu',          emoji:'🦈', weight:2000, size:40, res:1.7, hp:55, speed:60, pattern:'zigzag',   minD:180, color:'#607D8B' },
  { name:'Paus',         imgKey:'paus',         emoji:'🐋', weight:5000, size:45, res:2.2, hp:75, speed:25, pattern:'straight', minD:260, color:'#1565C0' },
  { name:'Ikan Tuna',    imgKey:'tuna',         emoji:'🐟', weight:3000, size:22, res:1.5, hp:50, speed:80, pattern:'erratic',  minD:300, color:'#FFD700', glow:true },
];
const OBSTACLE_TYPES = [
  { name: 'Sampah', emoji: '🗑️', effect: 'fail' },
  { name: 'Ubur-ubur', emoji: '🪼', effect: 'stun' },
  { name: 'Bom', emoji: '💣', effect: 'fail' },
];

// --- ENTITIES ---
let fishes = [], obstacles = [], particles = [], bubbles = [], ripples = [], floatingTexts = [];
let hook = {
  x: 0, y: 0, vx: 0, vy: 0,
  state: 'surface', depth: 0, maxDepth: 0, lineLen: 0, tension: 0, caughtFish: null, hookTime: 0
};

// --- INPUT ---
let joystick = { active: false, dx: 0, dy: 0, baseX: 0, baseY: 0, touchId: null };
let castBtn = { pressed: false, touchId: null };
let reelBtn = { pressed: false, touchId: null };

function getBtnPos() {
  const s = 55*SCALE, p = 15*SCALE;
  return {
    cast: { x: W-s-p, y: H-s*2.2-p, w: s, h: s },
    reel: { x: W-s-p, y: H-s-p, w: s, h: s },
    joy: { x: 65*SCALE, y: H-95*SCALE, r: 42*SCALE }
  };
}

function fmtWeight(grams) {
  if (grams >= 1000) return (grams/1000).toFixed(2) + ' kg';
  return grams + ' g';
}

function getHighScore(levelId) {
  return parseInt(localStorage.getItem('fishHigh_' + levelId) || '0');
}
function setHighScore(levelId, val) {
  localStorage.setItem('fishHigh_' + levelId, val.toString());
}

// --- INIT & SPAWN ---
function initGame() {
  totalWeight = 0; combo = 0; maxCombo = 0; energy = 100; gameTimer = currentLevel.time;
  sessionFish = []; resultAnim = { progress: 0, revealed: 0, fishIndex: 0, particles: [] };
  hook = { x:W/2, y:65*SCALE, vx:0, vy:0, state:'surface', depth:0, maxDepth:0, lineLen:0, tension:0, caughtFish:null, hookTime:0 };
  fishes = []; obstacles = []; particles = []; bubbles = []; ripples = []; floatingTexts = [];
  spawnEntities();
  gameState = STATE.PLAYING;
  playSound('splash');
}

function spawnEntities() {
  fishes = [];
  for(let i=0; i<8; i++) spawnFish();
  obstacles = [];
  for(let i=0; i<4; i++) {
    obstacles.push({
      x: 20+Math.random()*(W-40), y: 100*SCALE+Math.random()*(H-220*SCALE),
      type: OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)],
      alive: true, phase: Math.random()*Math.PI*2
    });
  }
}

function spawnFish() {
  const pool = FISH_TYPES;
  const curDepth = hook.maxDepth / SCALE;
  const weights = pool.map(f => curDepth >= f.minD ? 2.5 : 0.4);
  const totalW = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*totalW, type = pool[0];
  for(let i=0; i<pool.length; i++) { r -= weights[i]; if(r<=0) { type=pool[i]; break; } }
  const fromRight = Math.random() < 0.5;
  fishes.push({
    x: fromRight ? W+30 : -30, y: 90*SCALE+Math.random()*(H-200*SCALE),
    vx: fromRight ? -type.speed : type.speed,
    vy: 0, type, alive: true,
    time: Math.random()*100, phase: Math.random()*Math.PI*2, turnT: 0, currentHP: type.hp
  });
}

// --- UPDATE ---
function update(dt) {
  if(gameState === STATE.MENU) {
    // Update menu particles
    if(menuParticles.length < 20 && Math.random() < 0.1) {
      menuParticles.push({
        x: Math.random() * W,
        y: H + 10,
        vx: (Math.random() - 0.5) * 20,
        vy: -30 - Math.random() * 30,
        life: 3 + Math.random() * 2,
        size: 2 + Math.random() * 4,
        color: ['rgba(255,215,0,0.6)', 'rgba(76,175,80,0.5)', 'rgba(33,150,243,0.5)', 'rgba(255,255,255,0.4)'][Math.floor(Math.random()*4)]
      });
    }
    for(let i=menuParticles.length-1; i>=0; i--) {
      let p = menuParticles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if(p.life <= 0) menuParticles.splice(i, 1);
    }
    return;
  }

  if (gameState === STATE.RESULT) {
  resultAnim.progress += dt * 0.6;
  if (resultAnim.progress > 1) resultAnim.progress = 1;

  // Update + spawn bubbles agar background tetap hidup
  updateArr(bubbles, b => {
    b.y -= 35 * dt;
    b.phase += dt * 3;
    b.x += Math.sin(b.phase) * 10 * dt;
    return b.y > -10;
  });
  if (Math.random() < 0.12) {
    bubbles.push({
      x: Math.random() * W,
      y: H + 5,
      phase: Math.random() * Math.PI * 2,
      size: 2 + Math.random() * 3,
      alpha: 0.3
    });
  }

  // Update celebration particles
  for (let i = resultAnim.particles.length - 1; i >= 0; i--) {
    let p = resultAnim.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 30 * dt;
    p.life -= dt;
    if (p.life <= 0) resultAnim.particles.splice(i, 1);
  }
  if (resultAnim.particles.length < 60 && Math.random() < 0.4) {
    resultAnim.particles.push({
      x: W / 2 + (Math.random() - 0.5) * 300 * SCALE,
      y: H / 2 + (Math.random() - 0.5) * 200 * SCALE,
      vx: (Math.random() - 0.5) * 120,
      vy: (Math.random() - 0.5) * 120 - 60,
      life: 2 + Math.random(),
      size: 4 + Math.random() * 6 * SCALE,
      color: ['#FFD700','#FF5722','#4CAF50',
              '#2196F3','#E91E63','#FFC107'][Math.floor(Math.random() * 6)]
    });
  }

  return;
}

  if (gameState !== STATE.PLAYING) return;
  gameTimer -= dt;
  if(gameTimer <= 0) { gameTimer = 0; finishGame(); return; }

  if(hook.state !== 'HOOKED') energy = Math.min(100, energy + 8*dt);

  switch(hook.state) {
    case 'surface':
      hook.x = W/2; hook.y = 65*SCALE; hook.depth = 0; hook.hookTime = 0;
      break;

    case 'drop':
      hook.vy += 180*dt; hook.vy = Math.min(hook.vy, 180);
      hook.y += hook.vy*dt; hook.depth = hook.y - 65*SCALE; hook.lineLen = hook.depth; hook.maxDepth = Math.max(hook.maxDepth, hook.depth);
      if(joystick.active) { hook.vx += joystick.dx*300*dt; hook.vy += joystick.dy*100*dt; }
      hook.vx *= 0.92; hook.vy *= 0.95;
      hook.x += hook.vx*dt; hook.y += hook.vy*dt;
      hook.x = Math.max(15, Math.min(W-15, hook.x)); hook.y = Math.min(H-50*SCALE, hook.y);
      if(hook.depth >= 450*SCALE || castBtn.pressed) {
        hook.state = 'active'; hook.vy = 0; hook.vx = 0;
        playSound('splash'); createRipple(hook.x, hook.y); vibrate(20);
      }
      break;

    case 'active':
      if(joystick.active) { hook.vx += joystick.dx*350*dt; hook.vy += joystick.dy*200*dt; }
      hook.vx *= 0.90; hook.vy *= 0.90;
      hook.x += hook.vx*dt; hook.y += hook.vy*dt;
      hook.x = Math.max(15, Math.min(W-15, hook.x)); hook.y = Math.max(75*SCALE, Math.min(H-50*SCALE, hook.y));
      hook.depth = hook.y - 65*SCALE; hook.maxDepth = Math.max(hook.maxDepth, hook.depth);

      if(reelBtn.pressed && energy > 0) { hook.vy -= 250*dt; energy -= 12*dt; if(energy<=0){ energy=0; hook.state='reel'; } playSound('reel'); }

      for(let f of fishes) { if(!f.alive) continue; let d = Math.hypot(hook.x-f.x, hook.y-f.y); if(d < f.type.size*SCALE + 12*SCALE) { catchFish(f); break; } }
      for(let o of obstacles) { if(!o.alive) continue; let d = Math.hypot(hook.x-o.x, hook.y-o.y); if(d < 16*SCALE + 12*SCALE) { hitObstacle(o); break; } }
      if(fishes.filter(f=>f.alive).length < 3) spawnFish();
      break;

    case 'HOOKED': {
    const f = hook.caughtFish;
    if (!f) { hook.state = 'reel'; break; }

    hook.hookTime += dt;

    // Ikan selalu berusaha kabur → tension naik pelan
    const fishPull = f.type.res * 0.045;
    hook.tension += fishPull * dt;

    // Gerak ikan yang ditangkap
    hook.x += Math.sin(Date.now() * 0.005 * f.type.res) * 30 * f.type.res * dt * SCALE;
    hook.x = Math.max(15, Math.min(W - 15, hook.x));

    if (reelBtn.pressed && energy > 0) {
    // damage dinaikkan, tension naik lebih pelan
        energy -= (8 + f.type.res * 3) * dt;
        hook.tension += f.type.res * 0.18 * dt;  // sebelumnya 0.25
        f.currentHP -= (25 + f.type.res * 5) * dt; // sebelumnya 15+res*2
        hook.y -= 55 * dt;
        if (Math.random() < 0.12) playSound('struggle');
    } else {
        // slack tetap sama
        hook.tension -= 0.18 * dt;
    }

    // Ikan berenang ke bawah terus jika tidak direel
    if (!reelBtn.pressed) {
      hook.y += f.type.res * 25 * dt;
    }

    hook.y = Math.max(75 * SCALE, Math.min(H - 40, hook.y));
    hook.depth = hook.y - 65 * SCALE;
    hook.maxDepth = Math.max(hook.maxDepth, hook.depth);

    // Clamp tension 0–1
    hook.tension = Math.max(0, Math.min(1, hook.tension));
    f.currentHP = Math.max(0, Math.min(f.type.hp, f.currentHP));

    // Terlalu kendor → ikan lepas
    if (hook.tension < 0.15) {
      escapeFish();
      return;
    }

    // Terlalu tegang → tali putus
    if (hook.tension >= 0.92) {
      snapLine();
      return;
    }

    // HP habis → ikan berhasil ditangkap
    if (f.currentHP <= 0) {
      landFish(f);
    }

    // Timeout jika terlalu lama tidak progress
    if (hook.hookTime > 20) {
      escapeFish();
    }
    break;
  }


    case 'reel':
      if(hook.caughtFish) hook.y -= 160*dt; else hook.y -= 200*dt;
      hook.depth = Math.max(0, hook.y - 65*SCALE); hook.lineLen = hook.depth;
      hook.x += Math.sin(Date.now()*0.008)*2*SCALE;
      if(hook.y <= 65*SCALE) {
        hook.y = 65*SCALE; hook.state = 'surface';
        if(hook.caughtFish) landFish(hook.caughtFish);
        hook.caughtFish = null; hook.tension = 0; hook.hookTime = 0;
      }
      break;
  }

  for(let f of fishes) {
    if(!f.alive || f === hook.caughtFish) continue;
    f.time += dt;
    switch(f.type.pattern) {
      case 'zigzag': f.vy = Math.sin(f.time*2.5+f.phase)*30; break;
      case 'circle': f.vx=Math.cos(f.time*1.8+f.phase)*f.type.speed; f.vy=Math.sin(f.time*1.8+f.phase)*25; break;
      case 'erratic': f.turnT+=dt; if(f.turnT>0.6){f.turnT=0; f.vx+=(Math.random()-0.5)*80; f.vy+=(Math.random()-0.5)*50;} break;
      default: f.vy = Math.sin(f.time+f.phase)*20;
    }
    f.x += f.vx*dt; f.y += f.vy*dt;
    if(f.x < -40) f.x=W+40; if(f.x>W+40) f.x=-40;
    f.y = Math.max(75*SCALE, Math.min(H-50*SCALE, f.y));
  }
  for(let o of obstacles) { if(!o.alive) continue; o.phase+=dt*1.5; o.y+=Math.sin(o.phase)*15*dt; }

  updateArr(particles, p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; return p.life>0; });
  updateArr(bubbles, b => { b.y-=35*dt; b.phase+=dt*3; b.x+=Math.sin(b.phase)*10*dt; return b.y>-10; });
  updateArr(ripples, r => { r.radius+=40*dt; r.alpha-=dt*1.5; return r.alpha>0; });
  updateArr(floatingTexts, t => { t.y-=50*dt; t.life-=dt; t.alpha=t.life/t.max; return t.life>0; });
  if(Math.random()<0.12) bubbles.push({ x:Math.random()*W, y:H+5, phase:Math.random()*Math.PI*2, size:2+Math.random()*3, alpha:0.3 });
}

function updateArr(arr, cond) { for(let i=arr.length-1; i>=0; i--) if(!cond(arr[i])) arr.splice(i,1); }

function catchFish(f) {
  f.alive = false;
  hook.caughtFish = f;
  hook.state = 'HOOKED';
  hook.tension = 0.45;
  hook.hookTime = 0;

  // Simpan referensi type yang benar untuk renderResult
  sessionFish.push({
    name: f.type.name,
    emoji: f.type.emoji,
    weight: f.type.weight,   // ← langsung di root, bukan nested
    color: f.type.color || '#4FC3F7'
  });

  combo++;
  maxCombo = Math.max(maxCombo, combo);
  playSound('splash');
  vibrate(30);
  addFloatingText('⚡ STRIKE!', W / 2, 110 * SCALE, '#FF5722');
}

function landFish(f) {
  if (!f) return;
  totalWeight += f.type.weight;
  playSound('catch');
  vibrate([30, 20, 30]);
  addFloatingText(`✅ +${fmtWeight(f.type.weight)}`, W / 2, 100 * SCALE, '#4CAF50');
  hook.state = 'reel';
  hook.caughtFish = null;
  hook.tension = 0;
  hook.hookTime = 0;
}

function snapLine() {
  playSound('snap'); vibrate([50,30,80]); combo = 0;
  addFloatingText('💔 TALI PUTUS!', W/2, 110*SCALE, '#F44336');
  if(hook.caughtFish) hook.caughtFish.alive = true;
  hook.caughtFish = null; hook.tension = 0; hook.hookTime = 0; hook.state = 'reel';
}

function escapeFish() {
  playSound('escape'); vibrate(40); combo = 0;
  addFloatingText('💨 LEPAS!', W/2, 110*SCALE, '#FF9800');
  if(hook.caughtFish) hook.caughtFish.alive = true;
  hook.caughtFish = null; hook.tension = 0; hook.hookTime = 0; hook.state = 'reel';
}

function hitObstacle(o) {
  o.alive = false; vibrate(60);
  if(o.type.effect==='stun') { hook.vx=(Math.random()-0.5)*200; addFloatingText('⚡ STUN',hook.x,hook.y-30,'#E040FB'); playSound('hit'); combo=0; }
  else { addFloatingText('💥 BOOM!',hook.x,hook.y-30,'#FF0000'); playSound('snap'); combo=0; hook.state='reel'; hook.caughtFish=null; hook.tension=0; hook.hookTime=0; }
  for(let i=0;i<8;i++) particles.push({x:o.x,y:o.y,vx:(Math.random()-0.5)*100,vy:(Math.random()-0.5)*100,life:0.4,color:'#795548',size:3});
}

function finishGame() {
  // Hitung ikan yang sedang di-reel / masih di hook saat timer habis
  if (hook.caughtFish) {
    totalWeight += hook.caughtFish.type.weight;
    hook.caughtFish = null;
  }

  gameState = STATE.RESULT;
  resultAnim = { progress: 0, revealed: 0, fishIndex: 0, particles: [] };

  const hs = getHighScore(currentLevel.id);
  if (totalWeight > hs) {
    setHighScore(currentLevel.id, totalWeight);
    playSound('win');
  }
}

function addFloatingText(txt,x,y,c) { floatingTexts.push({text:txt,x,y,c,life:1.5,max:1.5,alpha:1}); }
function createRipple(x,y) { for(let i=0;i<3;i++) ripples.push({x,y,radius:5+i*5,alpha:0.8-i*0.2}); }

// --- RENDER ---
function render() {
  ctx.clearRect(0,0,W,H);
  if(gameState===STATE.MENU) renderMenu();
  else if(gameState===STATE.PLAYING) renderGame();
  else renderResult();
}

function renderMenu() {

  g.addColorStop(0, `hsl(${200 + Math.sin(time)*20}, 70%, ${20 + Math.sin(time*0.7)*5}%)`);
  g.addColorStop(0.5, `hsl(${190 + Math.cos(time)*15}, 65%, ${15 + Math.cos(time*0.5)*3}%)`);
  g.addColorStop(1, `hsl(${180 + Math.sin(time*0.8)*10}, 60%, ${8 + Math.sin(time*0.6)*2}%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Animated bubbles/particles
  for(let p of menuParticles) {
    ctx.globalAlpha = p.life / 5 * 0.6;

  ctx.globalAlpha = 1;

  // Decorative waves
  for(let w=0; w<3; w++) {

    for(let x=0; x<W; x+=20) {
      ctx.lineTo(x, H*0.4 + w*20*SCALE + Math.sin(x*0.01 + time*2 + w)*15*SCALE);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.fill();
  }

  // Title with glow effect
  ctx.save();
  ctx.shadowColor = 'rgba(255,215,0,0.8)';
  ctx.shadowBlur = 30 + Math.sin(time*3)*10;
  ctx.shadowOffsetY = 5;
  ctx.font = `bold ${48*SCALE}px Arial`;
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText('🎣', W/2, H*0.12);
  ctx.restore();

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 4;
  ctx.font = `bold ${40*SCALE}px Arial`;
  const titleGrad = ctx.createLinearGradient(W/2-100*SCALE, H*0.2, W/2+100*SCALE, H*0.25);
  titleGrad.addColorStop(0, '#FFF');
  titleGrad.addColorStop(0.5, '#FFD700');
  titleGrad.addColorStop(1, '#FFF');
  ctx.fillStyle = titleGrad;
  ctx.fillText('FISHING', W/2, H*0.22);
  ctx.fillText('MASTER', W/2, H*0.28);
  ctx.restore();

  // Subtitle
  ctx.font = `italic ${14*SCALE}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('🌊 Tangkap Ikan Terberat! 🌊', W/2, H*0.34);

  // Level selection cards
  // Sesudah — card lebih lebar, tinggi lebih longgar, gap antar card lebih besar
  const cardW = 260*SCALE;
  const cardH = 62*SCALE;
  const cardX = (W - cardW)/2;
  const startY = H*0.40;

  for(let i=0; i<LEVELS.length; i++) {
    const lv = LEVELS[i];
    const by = startY + i * (cardH + 26*SCALE);
    const hs = getHighScore(lv.id);
    const isSelected = currentLevel === lv;
    const hoverAnim = buttonHover.level === i ? Math.sin(Date.now()*0.01)*0.05 : 0;

    // Card background with gradient
    const cardGrad = ctx.createLinearGradient(cardX, by, cardX, by+cardH);
    cardGrad.addColorStop(0, isSelected ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)');
    cardGrad.addColorStop(1, isSelected ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)');
    
    ctx.save();
    ctx.translate(0, hoverAnim*SCALE);
    
    // Card shadow
    ctx.shadowColor = isSelected ? `rgba(${hexToRgb(lv.color)}, 0.6)` : 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = isSelected ? 25 : 15;
    ctx.shadowOffsetY = 8;
    
    // Card body
    ctx.fillStyle = cardGrad;
    roundRect(cardX-5, by-5, cardW+10, cardH+10, 15*SCALE);
    ctx.fill();
    
    // Border glow for selected
    if(isSelected) {
      ctx.strokeStyle = lv.color;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Level icon and name
    ctx.font = `bold ${20*SCALE}px Arial`;
    ctx.fillStyle = lv.color;
    ctx.textAlign = 'left';
    ctx.fillText(lv.icon, cardX + 16*SCALE, by + 28*SCALE);
    ctx.fillStyle = '#FFF';
    ctx.fillText(lv.name, cardX + 48*SCALE, by + 28*SCALE);

    // Time badge

  ctx.shadowBlur = 30;
  ctx.shadowOffsetY = 10;
  
  // Button gradient
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);

  ctx.fillStyle = btnGrad;

  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Button text
  ctx.font = `bold ${18*SCALE}px Arial`;
  ctx.fillStyle = '#FFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`▶ MULAI ${currentLevel.name.toUpperCase()}`, W/2, btnY + btnH/2);
  ctx.restore();

  // Instructions
  ctx.font = `${10*SCALE}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Tap level untuk memilih • Tap START untuk bermain', W/2, btnY + 75*SCALE);
}

function renderGame() {
  const depthR = hook.depth/(450*SCALE);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#87CEEB'); g.addColorStop(0.18,'#4FC3F7'); g.addColorStop(0.2+depthR*0.25,'#01579B'); g.addColorStop(1,'#001A33');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.beginPath(); ctx.moveTo(0,65*SCALE);
  for(let x=0;x<W;x+=15) ctx.lineTo(x, 65*SCALE+Math.sin(x*0.02+Date.now()*0.004)*5*SCALE);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();

  for(let i=0;i<4;i++){ let x=W/2+Math.sin(Date.now()*0.001+i)*100; ctx.fillStyle=`rgba(255,255,200,${0.04-depthR*0.02})`; ctx.beginPath(); ctx.moveTo(x-20,0); ctx.lineTo(x+20,0); ctx.lineTo(x+80,H); ctx.lineTo(x-80,H); ctx.fill(); }
  for(let b of bubbles){ ctx.globalAlpha=b.alpha; ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
  for(let r of ripples){ ctx.strokeStyle=`rgba(255,255,255,${r.alpha})`; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(r.x,r.y,r.radius,r.radius*0.3,0,0,Math.PI*2); ctx.stroke(); }

  for(let o of obstacles) { if(!o.alive) continue; ctx.font=`${16*SCALE}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(o.type.emoji,o.x,o.y); }

  // SESUDAH — pakai PNG:
for(let f of fishes) {
  if(!f.alive) continue;
  ctx.save();
  ctx.translate(f.x, f.y);
  if(f.vx < 0) ctx.scale(-1, 1);
  
  const img = FISH_IMAGES[f.type.imgKey];
  const drawSize = f.type.size * SCALE * 2.5;
  
  if(f.type.glow) { ctx.shadowColor = f.type.color; ctx.shadowBlur = 12; }
  
 if(imagesReady && img) {
    ctx.drawImage(img, -drawSize/2, -drawSize/2, drawSize, drawSize);
  } else {
    ctx.font = `${f.type.size*SCALE}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.type.emoji, 0, 0);
  }
  ctx.shadowBlur = 0;
  ctx.restore();

  // HP bar — tidak berubah
  const barW=26*SCALE, barH=3.5*SCALE, bx=f.x-barW/2, by=f.y-f.type.size*SCALE-10, hpPct=f.currentHP/f.type.hp;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-1,by-1,barW+2,barH+2);
  ctx.fillStyle=hpPct>0.6?'#4CAF50':hpPct>0.3?'#FFC107':'#F44336';
  ctx.fillRect(bx, by, barW*hpPct, barH);
}

  drawBoat(W/2, 40*SCALE);

  if(hook.state!=='surface') {
    const tc = hook.state==='HOOKED'?(hook.tension>0.7?'#F44336':hook.tension>0.4?'#FFC107':'#4CAF50'):'rgba(255,255,255,0.4)';
    ctx.strokeStyle=tc; ctx.lineWidth=hook.state==='HOOKED'?2.5*SCALE:1.5*SCALE; ctx.beginPath(); ctx.moveTo(W/2,50*SCALE);
    ctx.quadraticCurveTo((W/2+hook.x)/2+Math.sin(Date.now()*0.005)*5*SCALE,(50*SCALE+hook.y)/2,hook.x,hook.y); ctx.stroke();
    ctx.fillStyle='#FF5722'; ctx.beginPath(); ctx.arc(W/2,48*SCALE,3,0,Math.PI*2); ctx.fill();
  }

  ctx.font=`${20*SCALE}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha=hook.state==='stun'?0.6+Math.sin(Date.now()*0.02)*0.3:1;
  ctx.fillText('🪝', hook.x, hook.y); ctx.globalAlpha=1; ctx.textBaseline='alphabetic';
  // SESUDAH:
  // SESUDAH — ukuran sama persis dengan render ikan normal:
  if(hook.caughtFish) {
    const cf = hook.caughtFish;
    const img = FISH_IMAGES[cf.type.imgKey];
    const sz = cf.type.size * SCALE * 2.5; // ← sama dengan render ikan di fishes loop
    if(imagesReady && img) {
      ctx.save();
      ctx.translate(hook.x, hook.y + sz * 0.4);
      ctx.drawImage(img, -sz/2, -sz/2, sz, sz);
      ctx.restore();
    } else {
      ctx.font = `${cf.type.size * SCALE}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cf.type.emoji, hook.x, hook.y + 22*SCALE);
    }
  }

  for(let p of particles){ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
  for(let t of floatingTexts){ ctx.globalAlpha=t.alpha; ctx.font=`bold ${13*SCALE}px Arial`; ctx.fillStyle=t.c; ctx.textAlign='center'; ctx.fillText(t.text,t.x,t.y); } ctx.globalAlpha=1;

  renderUI();
}

function renderUI() {
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,55*SCALE);

  const tColor = gameTimer<=5?'#F44336':gameTimer<=10?'#FFC107':'#FFF';
  ctx.font=`bold ${16*SCALE}px Arial`; ctx.fillStyle=tColor; ctx.textAlign='center';
  ctx.fillText(`⏱️ ${Math.floor(gameTimer)}s`, W/2, 18*SCALE);

  ctx.textAlign='left'; ctx.font=`bold ${15*SCALE}px Arial`; ctx.fillStyle='#FFD700';
  ctx.fillText(`⚖️ ${fmtWeight(totalWeight)}`, 10*SCALE, 18*SCALE);
  if(combo>1){ ctx.font=`bold ${11*SCALE}px Arial`; ctx.fillStyle='#FF5722'; ctx.fillText(`🔥x${combo}`,10*SCALE,34*SCALE); }

  ctx.textAlign='center'; ctx.font=`${11*SCALE}px Arial`; ctx.fillStyle='#B3E5FC'; ctx.fillText(`🌊 ${Math.floor(hook.depth/SCALE)}m`,W/2,36*SCALE);

  if (hook.state === 'HOOKED' && hook.caughtFish) {
  const barH = 14 * SCALE;
  const barW = 240 * SCALE;
  const barX = (W - barW) / 2;
  const barY = 42 * SCALE;
  const tension = hook.tension;

  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  roundRect(barX - 3, barY - 2, barW + 6, barH + 4, 6 * SCALE);
  ctx.fill();

  // Zona warna: biru=kendor, hijau=aman, kuning=hati2, merah=putus
  const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  grad.addColorStop(0,    '#1565C0'); // terlalu kendor
  grad.addColorStop(0.15, '#2196F3'); // batas lepas
  grad.addColorStop(0.20, '#4CAF50'); // zona aman mulai
  grad.addColorStop(0.65, '#8BC34A'); // zona aman
  grad.addColorStop(0.75, '#FFC107'); // mulai bahaya
  grad.addColorStop(0.88, '#F44336'); // sangat tegang
  grad.addColorStop(1.0,  '#B71C1C'); // putus
  ctx.fillStyle = grad;
  roundRect(barX, barY, barW, barH, 4 * SCALE);
  ctx.fill();

  // Overlay gelap untuk bagian yang belum dicapai
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(barX + barW * tension, barY,
            barW * (1 - tension), barH, 4 * SCALE);
  ctx.fill();

  // Marker posisi saat ini
  const mx = barX + barW * tension;
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(mx, barY + barH / 2, 6 * SCALE, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Garis batas "akan lepas" (kiri)
  ctx.strokeStyle = 'rgba(33,150,243,0.9)';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(barX + barW * 0.15, barY - 4);
  ctx.lineTo(barX + barW * 0.15, barY + barH + 4);
  ctx.stroke();

  // Garis batas "akan putus" (kanan)
  ctx.strokeStyle = 'rgba(244,67,54,0.9)';
  ctx.beginPath();
  ctx.moveTo(barX + barW * 0.88, barY - 4);
  ctx.lineTo(barX + barW * 0.88, barY + barH + 4);
  ctx.stroke();
  ctx.setLineDash([]);

  // Label
  ctx.font = `bold ${9 * SCALE}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#90CAF9';
  ctx.fillText('LEPAS', barX + barW * 0.075, barY - 4 * SCALE);
  ctx.fillStyle = '#A5D6A7';
  ctx.fillText('ZONA AMAN', barX + barW * 0.50, barY - 4 * SCALE);
  ctx.fillStyle = '#EF9A9A';
  ctx.fillText('PUTUS', barX + barW * 0.94, barY - 4 * SCALE);

  // Peringatan tegang
  if (tension > 0.80) {
    ctx.fillStyle = `rgba(244,67,54,${0.15 + Math.sin(Date.now() * 0.015) * 0.1})`;
    ctx.fillRect(0, 0, W, H);
    ctx.font = `bold ${11 * SCALE}px Arial`;
    ctx.fillStyle = '#F44336';
    ctx.fillText('⚠️ KENDURKAN REEL!', W / 2, 65 * SCALE);
  }

  // Peringatan kendor
  if (tension < 0.25) {
    ctx.font = `bold ${11 * SCALE}px Arial`;
    ctx.fillStyle = '#2196F3';
    ctx.textAlign = 'center';
    ctx.fillText('⬆️ TARIK REEL!', W / 2, 65 * SCALE);
  }
}

  ctx.textAlign='right'; ctx.font=`${11*SCALE}px Arial`; ctx.fillStyle='#B3E5FC'; ctx.fillText(`⚡${Math.floor(energy)}%`,W-10*SCALE,18*SCALE);
  const ebW=60*SCALE, ebX=W-10*SCALE-ebW, ebY=30*SCALE;
  ctx.fillStyle='rgba(255,255,255,0.2)'; roundRect(ebX,ebY,ebW,4*SCALE,2*SCALE); ctx.fill();
  ctx.fillStyle=energy>30?'#4CAF50':'#F44336'; roundRect(ebX,ebY,ebW*(energy/100),4*SCALE,2*SCALE); ctx.fill();

  ctx.textAlign='left'; ctx.font=`${10*SCALE}px Arial`; ctx.fillStyle='#B3E5FC'; ctx.fillText(`🐟 ${sessionFish.length}`, 10*SCALE+(combo>1?50*SCALE:0), 46*SCALE);

  const b=getBtnPos();
  ctx.globalAlpha=0.25; ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(b.joy.x,b.joy.y,b.joy.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=0.6; ctx.strokeStyle='#FFF'; ctx.lineWidth=2; ctx.stroke(); ctx.globalAlpha=0.8; ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(b.joy.x+joystick.dx*b.joy.r, b.joy.y+joystick.dy*b.joy.r, 16*SCALE, 0, Math.PI*2); ctx.fill(); ctx.stroke(); ctx.globalAlpha=1;
  drawButton(b.cast.x,b.cast.y,b.cast.w,b.cast.h, hook.state==='surface'?'🎣 CAST':'⏸ HOLD','#4CAF50','#2E7D32',hook.state==='surface');
  drawButton(b.reel.x,b.reel.y,b.reel.w,b.reel.h, '⚡ REEL','#FF9800','#E65100', hook.state==='active'||hook.state==='HOOKED');
}

function drawButton(x,y,w,h,txt,col,dark,en=true) {
  ctx.globalAlpha=en?0.9:0.4; const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,col); g.addColorStop(1,dark);
  ctx.fillStyle=g; roundRect(x,y,w,h,10*SCALE); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();

  ctx.fillText(txt,x+w/2,y+h/2); ctx.textBaseline='alphabetic'; ctx.globalAlpha=1;

function drawBoat(x, y) {
  const s = SCALE;
  const bobY = y + Math.sin(Date.now()*0.002)*2*s;
  ctx.fillStyle='#8D6E63'; ctx.beginPath(); ctx.moveTo(x-45*s,bobY); ctx.lineTo(x+45*s,bobY); ctx.lineTo(x+35*s,bobY+15*s); ctx.lineTo(x-35*s,bobY+15*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5D4037'; ctx.fillRect(x-45*s,bobY-3*s,90*s,3*s);
  ctx.strokeStyle='#4E342E'; ctx.lineWidth=3*s; ctx.beginPath(); ctx.moveTo(x,bobY); ctx.lineTo(x,bobY-35*s); ctx.stroke();
  ctx.fillStyle='#F44336'; ctx.beginPath(); ctx.moveTo(x,bobY-35*s); ctx.lineTo(x+14*s,bobY-28*s); ctx.lineTo(x,bobY-21*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#D32F2F'; ctx.fillRect(x-18*s,bobY-18*s,36*s,10*s);
  ctx.fillStyle='#B71C1C'; ctx.fillRect(x-14*s,bobY-16*s,12*s,8*s);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5*s;
  for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(x-50*s,bobY+18*s+i*5*s); for(let bx=0;bx<=60*s;bx+=10*s) ctx.quadraticCurveTo(x-45*s+bx,bobY+15*s+i*5*s,x-40*s+bx,bobY+18*s+i*5*s); ctx.stroke(); }
}

function renderResult() {
  const animP = Math.min(1, resultAnim.progress);
  const hs = getHighScore(currentLevel.id);
  const isNewRecord = totalWeight >= hs && totalWeight > 0;

  // Animated background
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0D47A1');
  g.addColorStop(0.5, '#1A237E');
  g.addColorStop(1, '#000B1E');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  for (let b of bubbles) {
    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Celebration particles
  for(let p of resultAnim.particles) {
    ctx.globalAlpha = p.life / 3 * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Floating fish decorations
  const fishEmojis = ['🐟', '🐠', '🐡', '🦈', '🐋'];
  for(let i=0; i<5; i++) {
    const fx = (W/2) + Math.sin(Date.now()*0.002 + i*1.3)*200*SCALE;
    const fy = 120*SCALE + Math.cos(Date.now()*0.003 + i*0.8)*60*SCALE;
    ctx.globalAlpha = 0.15 + Math.sin(Date.now()*0.004 + i)*0.1;
    ctx.font = `${30*SCALE}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(fishEmojis[i], fx, fy);
  }
  ctx.globalAlpha = 1;

  const cardY = 40*SCALE;
  const cardH = 420*SCALE;
  const cardX = 20*SCALE;
  const cardW = W - 40*SCALE;

  // Main card background with glass effect
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 20;
  
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(cardX, cardY, cardW, cardH, 20*SCALE);
  ctx.fill();
  
  // Card border
  ctx.strokeStyle = isNewRecord ? 'rgba(255,215,0,0.5)' : 'rgba(255,255,255,0.15)';
  ctx.lineWidth = isNewRecord ? 3 : 2;
  ctx.stroke();
  ctx.restore();

  // Header
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 5;
  
  ctx.font = `bold ${28*SCALE}px Arial`;
  ctx.fillStyle = '#FFF';
  ctx.textAlign = 'center';
  ctx.fillText('⏱️ WAKTU HABIS!', W/2, cardY + 45*SCALE);
  
  ctx.font = `${13*SCALE}px Arial`;
  ctx.fillStyle = currentLevel.color;
  ctx.fillText(`${currentLevel.icon} Level ${currentLevel.name} (${currentLevel.time}s)`, W/2, cardY + 72*SCALE);
  ctx.restore();

  // Total weight with animation
  const weightY = cardY + 130*SCALE;
  const displayWeight = fmtWeight(Math.floor(totalWeight * easeOut(animP)));
  
  ctx.save();
  if(isNewRecord) {
    ctx.shadowColor = 'rgba(255,215,0,0.8)';
    ctx.shadowBlur = 30 + Math.sin(Date.now()*0.005)*10;
  }
  ctx.font = `bold ${50*SCALE}px Arial`;
  ctx.fillStyle = isNewRecord ? '#FFD700' : '#FFF';
  ctx.textAlign = 'center';
  ctx.fillText(displayWeight, W/2, weightY);
  ctx.restore();

  ctx.font = `${14*SCALE}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('TOTAL BERAT TANGKAPAN', W/2, weightY + 30*SCALE);

  // Record badge
  if(isNewRecord) {
    ctx.save();
    ctx.shadowColor = 'rgba(76,175,80,0.6)';
    ctx.shadowBlur = 20;
    ctx.font = `bold ${16*SCALE}px Arial`;
    ctx.fillStyle = '#4CAF50';
    ctx.fillText('🎉 REKOR BARU! 🎉', W/2, weightY + 60*SCALE);
    ctx.restore();
  } else {
    ctx.font = `${12*SCALE}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`Rekor: ${fmtWeight(hs)}`, W/2, weightY + 60*SCALE);
  }

  // Stats row
  const statsY = cardY + 220*SCALE;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(cardX + 30*SCALE, statsY, cardW - 60*SCALE, 60*SCALE, 12*SCALE);
  ctx.fill();

  ctx.font = `bold ${13*SCALE}px Arial`;
  ctx.fillStyle = '#FFF';
  ctx.textAlign = 'center';
  ctx.fillText(`🐟 ${sessionFish.length} ekor`, W*0.25, statsY + 28*SCALE);
  ctx.fillText(`🔥 Max ${maxCombo}x`, W*0.5, statsY + 28*SCALE);
  ctx.fillText(`🌊 ${Math.floor(hook.maxDepth/SCALE)}m`, W*0.75, statsY + 28*SCALE);

  // Fish list header
  const listY = cardY + 300*SCALE;
  ctx.font = `bold ${15*SCALE}px Arial`;
  ctx.fillStyle = '#FFF';
  ctx.textAlign = 'center';
  ctx.fillText('📋 Detail Tangkapan', W/2, listY);

  const grouped = {};
  for (let f of sessionFish) {
    if (!grouped[f.name]) {
      grouped[f.name] = {
        count: 0,
        total: 0,
        emoji: f.emoji,
        color: f.color
      };
    }
    grouped[f.name].count++;
    grouped[f.name].total += f.weight;  // ← f.weight bukan f.type.weight
  }
  const sorted = Object.entries(grouped)
    .sort((a, b) => b[1].total - a[1].total);
  
  let ly = listY + 30*SCALE;
  const maxVisible = 5;
  const visible = sorted.slice(0, maxVisible);
  
  for(let i=0; i<visible.length; i++) {
    const [name, d] = visible[i];
    const itemAlpha = animP > (i*0.15) ? 1 : 0;
    ctx.globalAlpha = itemAlpha;
    
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(cardX + 35*SCALE, ly, cardW - 70*SCALE, 26*SCALE, 6*SCALE);
    ctx.fill();

    ctx.font = `${12*SCALE}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillStyle = d.color;
    ctx.fillText(`${d.emoji} ${name}`, cardX + 45*SCALE, ly + 17*SCALE);
    
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFF';
    ctx.fillText(`${d.count}x • ${fmtWeight(d.total)}`, W - 45*SCALE, ly + 17*SCALE);
    
    ly += 32*SCALE;
    ctx.globalAlpha = 1;
  }

  if(sorted.length > maxVisible) {
    ctx.font = `${11*SCALE}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText(`+${sorted.length - maxVisible} ikan lainnya...`, W/2, ly + 10*SCALE);
  }

  // Buttons
  const btnY = H - 130*SCALE;
  const btnW = 160*SCALE;
  const btnH = 50*SCALE;
  const btnX = (W - btnW)/2;

  drawButton(btnX, btnY, btnW, btnH, '🔄 MAIN LAGI', currentLevel.color, darkenColor(currentLevel.color, 0.3));
  drawButton(btnX, btnY + 60*SCALE, btnW, btnH, 'MENU', '#607D8B', '#37474F');
}

// --- HELPERS ---
function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
}

function darkenColor(hex, amount) {
  let c = hex.replace('#','');
  let r = Math.max(0, parseInt(c.substr(0,2),16) * (1-amount));
  let g = Math.max(0, parseInt(c.substr(2,2),16) * (1-amount));
  let b = Math.max(0, parseInt(c.substr(4,2),16) * (1-amount));
  return '#' + [r,g,b].map(x => Math.round(x).toString(16).padStart(2,'0')).join('');
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// --- INPUT ---
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  for(let t of e.changedTouches) {
    const tx=t.clientX, ty=t.clientY, id=t.identifier;
    if(gameState===STATE.MENU) {
      const cardW = 260*SCALE, cardH = 82*SCALE, cardX = (W-cardW)/2, startY = H*0.40;
      for(let i=0; i<LEVELS.length; i++) {
        const by = startY + i*(cardH + 18*SCALE); 
        if(tx>=cardX && tx<=cardX+cardW && ty>=by && ty<=by+cardH) {
          currentLevel = LEVELS[i];
          buttonHover.level = i;
          playSound('click');
          return;
        }
      }
      const btnY = H*0.82, btnW = 200*SCALE, btnH = 55*SCALE, btnX = (W-btnW)/2;
      if(tx>=btnX && tx<=btnX+btnW && ty>=btnY && ty<=btnY+btnH) {
        playSound('click');
        initGame();
      }
      return;
    }
    if(gameState===STATE.RESULT) {
      const btnY = H-130*SCALE, btnW = 160*SCALE, btnH = 50*SCALE, btnX = (W-btnW)/2;
      if(tx>=btnX && tx<=btnX+btnW && ty>=btnY && ty<=btnY+btnH) {
        playSound('click');
        initGame();
      }
      if(tx>=btnX && tx<=btnX+btnW && ty>=btnY+60*SCALE && ty<=btnY+60*SCALE+btnH) {
        playSound('click');
        gameState = STATE.MENU;
      }
      return;
    }
    const b=getBtnPos();
    if(tx>=b.cast.x && tx<=b.cast.x+b.cast.w && ty>=b.cast.y && ty<=b.cast.y+b.cast.h) {
      castBtn.pressed=true; castBtn.touchId=id; if(hook.state==='surface'){hook.state='drop';hook.vy=0;hook.maxDepth=0;}
    } else if(tx>=b.reel.x && tx<=b.reel.x+b.reel.w && ty>=b.reel.y && ty<=b.reel.y+b.reel.h) {
      reelBtn.pressed=true; reelBtn.touchId=id;
    } else {
      const dx=tx-b.joy.x, dy=ty-b.joy.y;
      if(Math.hypot(dx,dy)<b.joy.r*1.8){ joystick.active=true; joystick.touchId=id; joystick.baseX=tx; joystick.baseY=ty; updateJoy(tx,ty); }
    }
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for(let t of e.changedTouches) {
    if(gameState===STATE.MENU) {
      const cardW = 220*SCALE, cardH = 90*SCALE, cardX = (W-cardW)/2, startY = H*0.42;
      let hovered = -1;
      for(let i=0; i<LEVELS.length; i++) {
        const by = startY + i*(cardH+12*SCALE);
        if(t.clientX>=cardX && t.clientX<=cardX+cardW && t.clientY>=by && t.clientY<=by+cardH) {
          hovered = i;
        }
      }
      buttonHover.level = hovered;
    }
    if(joystick.active && t.identifier===joystick.touchId) updateJoy(t.clientX,t.clientY);
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for(let t of e.changedTouches) {
    const id=t.identifier;
    if(id===castBtn.touchId) castBtn.pressed=false;
    if(id===reelBtn.touchId) reelBtn.pressed=false;
    if(id===joystick.touchId){joystick.active=false;joystick.dx=0;joystick.dy=0;joystick.baseX=0;joystick.baseY=0;}
  }
}, {passive:false});

function updateJoy(tx,ty) {
  let dx=tx-joystick.baseX, dy=ty-joystick.baseY;
  const m=42*SCALE, d=Math.hypot(dx,dy); if(d>m){dx=(dx/d)*m;dy=(dy/d)*m;}
  joystick.dx=dx/m; joystick.dy=dy/m;
}

// --- LOOP ---
let last=0; function loop(ts) { const dt=Math.min((ts-last)/1000,0.05); last=ts; update(dt); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop); document.body.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
</script>
