<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flip Card Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== MENU PAGE ===== -->
<div id="menuPage" class="page active">
  <div class="menu-content" style="display:flex; flex-direction:column; align-items:center; gap:16px; width:100%;">
    <div class="menu-logo">
      <h1>Flip Card</h1>
      <p>Temukan semua pasangan kartu!</p>
    </div>
    <div class="level-list">
      <button class="menu-level-btn" data-level="easy">
        <span class="level-icon">🌱</span>
        <div class="level-info">
          <span class="level-name">Easy</span>
          <span class="level-desc">4 × 4 Grid • 8 Pairs</span>
        </div>
      </button>
      <button class="menu-level-btn" data-level="medium">
        <span class="level-icon">🌿</span>
        <div class="level-info">
          <span class="level-name">Medium</span>
          <span class="level-desc">5 × 4 Grid • 10 Pairs</span>
        </div>
      </button>
      <button class="menu-level-btn" data-level="hard">
        <span class="level-icon">🌳</span>
        <div class="level-info">
          <span class="level-name">Hard</span>
          <span class="level-desc">6 × 6 Grid • 18 Pairs</span>
        </div>
      </button>
    </div>
    <div class="menu-best-scores" id="menuBestScores"></div>
  </div>
</div>

<!-- ===== GAME PAGE ===== -->
<div id="gamePage" class="page">
  <div class="header">
    <button class="btn-icon" id="btnBack" title="Back to Menu">←</button>
    <div class="timer" id="timer">⏱️ 00:00</div>
    <button class="btn-icon" id="btnPause" title="Pause">⏸️</button>
  </div>

  <div class="game-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    <div class="score-bar">
      <div class="score-item">
        <div class="label">Moves</div>
        <div class="value" id="movesDisplay">0</div>
      </div>
      <div class="score-item">
        <div class="label">Score</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="score-item">
        <div class="label">Combo</div>
        <div class="value combo" id="comboDisplay">-</div>
      </div>
      <div class="score-item">
        <div class="label">Best</div>
        <div class="value" id="bestDisplay">0</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== WIN MODAL ===== -->
<div class="modal-overlay" id="winModal">
  <div class="modal">
    <h2 id="winTitle">🎉 Level Complete!</h2>
    <div class="subtitle" id="winSubtitle">Great job!</div>
    <div class="stats">
      <div class="stat-box"><div class="stat-label">Time</div><div class="stat-value" id="winTime">00:00</div></div>
      <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-value" id="winMoves">0</div></div>
      <div class="stat-box"><div class="stat-label">Score</div><div class="stat-value" id="winScore">0</div></div>
      <div class="stat-box"><div class="stat-label">Best</div><div class="stat-value" id="winBest">0</div></div>
    </div>
    <div class="new-record" id="winNewRecord" style="display:none">⭐ New Record! ⭐</div>
    <button class="modal-btn primary" id="btnReplay">Play Again</button>
    <button class="modal-btn secondary" id="btnMainMenu">Main Menu</button>
  </div>
</div>

<!-- ===== PAUSE OVERLAY ===== -->
<div class="pause-overlay" id="pauseOverlay">
  <h2>⏸️ Paused</h2>
  <br>
  <button class="pause-btn resume" id="btnResume">Resume</button>
  <br>
  <button class="pause-btn restart" id="btnPauseRestart">Restart Level</button>
  <br>
  <button class="pause-btn back" id="btnPauseMenu">Main Menu</button>
</div>
<script src="script.js" defer></script>
</body>
</html>
