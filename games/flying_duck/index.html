<!DOCTYPE html>
<html lang="id">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLYING DUCK SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
//  FLYING DUCK SHOOTER — Complete Single-File Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
//  AUDIO ENGINE (Web Audio API — no external files)
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);

  if (type === 'shoot') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(800, now);
    o.frequency.exponentialRampToValueAtTime(200, now + 0.08);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    o.connect(g); o.start(now); o.stop(now + 0.08);
    // noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
    const n = audioCtx.createBufferSource();
    n.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.2, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    n.connect(ng); ng.connect(audioCtx.destination);
    n.start(now); n.stop(now + 0.05);
  } else if (type === 'hit') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, now);
    o.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.connect(g); o.start(now); o.stop(now + 0.15);
  } else if (type === 'golden') {
    [0, 0.06, 0.12].forEach((dt, i) => {
      const o = audioCtx.createOscillator();
      const gg = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime([1000, 1400, 1800][i], now + dt);
      gg.gain.setValueAtTime(0.15, now + dt);
      gg.gain.exponentialRampToValueAtTime(0.001, now + dt + 0.1);
      o.connect(gg); gg.connect(audioCtx.destination);
      o.start(now + dt); o.stop(now + dt + 0.1);
    });
  } else if (type === 'error') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(150, now);
    o.frequency.linearRampToValueAtTime(100, now + 0.3);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    o.connect(g); o.start(now); o.stop(now + 0.3);
  } else if (type === 'drone_alarm') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(800, now);
    o.frequency.setValueAtTime(600, now + 0.15);
    o.frequency.setValueAtTime(800, now + 0.3);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o.connect(g); o.start(now); o.stop(now + 0.4);
  } else if (type === 'gameover') {
    [0, 0.15, 0.3].forEach((dt, i) => {
      const o = audioCtx.createOscillator();
      const gg = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime([500, 400, 300][i], now + dt);
      gg.gain.setValueAtTime(0.15, now + dt);
      gg.gain.exponentialRampToValueAtTime(0.001, now + dt + 0.2);
      o.connect(gg); gg.connect(audioCtx.destination);
      o.start(now + dt); o.stop(now + dt + 0.2);
    });
  } else if (type === 'menu_click') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, now);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    o.connect(g); o.start(now); o.stop(now + 0.05);
  }
}

// Vibration helper
function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// ============================================================
//  CONSTANTS & GAME CONFIG
// ============================================================
const STATE = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };
const TARGET_TYPE = { DUCK: 0, PROTECTED: 1, GOLDEN: 2, DRONE: 3 };

const CROSSHAIR_RADIUS = 18;
const JOYSTICK_BASE_R = 60;
const JOYSTICK_THUMB_R = 28;
const SHOOT_BTN_R = 45;

let state = STATE.MENU;
let score = 0;
let lives = 5;
let maxLives = 5;
let combo = 0;
let maxCombo = 0;
let gameTime = 0;
let highScore = parseInt(localStorage.getItem('fds_highscore') || '0');

// ============================================================
//  ENTITIES
// ============================================================
let targets = [];
let particles = [];
let fallingBirds = [];
let screenFlash = 0;
let screenFlashColor = 'white';
let slowMotion = false;
let slowMotionTimer = 0;
let droneWarning = null;
let shakeX = 0, shakeY = 0;
let shakeTimer = 0;

// Crosshair
let aimX = 0, aimY = 0;
let crosshairX = 0, crosshairY = 0;
let recoilTimer = 0;

// Joystick
let joystickActive = false;
let joystickTouchId = null;
let joystickBaseX = 0, joystickBaseY = 0;
let joystickThumbX = 0, joystickThumbY = 0;
let joystickDX = 0, joystickDY = 0;

// Shoot button
let shootActive = false;
let shootTouchId = null;
let shootBtnX = 0, shootBtnY = 0;
let shootCooldown = 0;

// Menu button
let menuBtnBounds = null;

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function spawnFeathers(x, y, baseColor) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      size: 3 + Math.random() * 5,
      color: baseColor,
      feather: true,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

// ============================================================
//  TARGET SPAWNING
// ============================================================
let spawnTimer = 0;
let spawnInterval = 1.5;

function getDifficulty() {
  const t = gameTime;
  if (t < 15) return 1;
  if (t < 30) return 1.3;
  if (t < 60) return 1.6;
  if (t < 120) return 2;
  return 2.5;
}

function spawnTarget() {
  const diff = getDifficulty();
  const h = canvas.height;
  const w = canvas.width;
  const fromLeft = Math.random() > 0.5;
  const yMin = 80;
  const yMax = h * 0.55;
  const y = yMin + Math.random() * (yMax - yMin);
  const speed = (80 + Math.random() * 60) * diff;

  const rand = Math.random();
  let type, color, bodyColor, wingColor, size, points;

  if (rand < 0.12) {
    // Golden Duck
    type = TARGET_TYPE.GOLDEN;
    color = '#FFD700';
    bodyColor = '#FFD700';
    wingColor = '#FFA500';
    size = 35;
    points = 5;
  } else if (rand < 0.22) {
    // Drone
    type = TARGET_TYPE.DRONE;
    color = '#888';
    size = 40;
    points = 10;
  } else if (rand < 0.38) {
    // Protected
    type = TARGET_TYPE.PROTECTED;
    color = '#FF3333';
    bodyColor = '#CC0000';
    wingColor = '#990000';
    size = 32;
    points = -2;
  } else {
    // Normal Duck
    type = TARGET_TYPE.DUCK;
    color = '#4CAF50';
    bodyColor = '#66BB6A';
    wingColor = '#388E3C';
    size = 30;
    points = 1;
  }

  const x = fromLeft ? -size : w + size;
  const direction = fromLeft ? 1 : -1;

  const target = {
    type, x, y, direction, speed, size, points, color,
    bodyColor: bodyColor || color,
    wingColor: wingColor || color,
    wingPhase: Math.random() * Math.PI * 2,
    wingSpeed: 5 + Math.random() * 3,
    bobPhase: Math.random() * Math.PI * 2,
    alive: true,
    // Drone specific
    droneTimer: type === TARGET_TYPE.DRONE ? (5 / diff) : 0,
    droneTimerMax: type === TARGET_TYPE.DRONE ? (5 / diff) : 0,
    droneSpawnTime: type === TARGET_TYPE.DRONE ? Date.now() : 0,
    // Golden specific
    goldenGlow: type === TARGET_TYPE.GOLDEN ? 0 : 0,
    goldenActive: type === TARGET_TYPE.GOLDEN
  };

  if (type === TARGET_TYPE.GOLDEN) {
    target.speed *= 1.4;
    slowMotion = true;
    slowMotionTimer = 3;
  }

  targets.push(target);
}

// ============================================================
//  DRAWING HELPERS
// ============================================================
function drawDuck(x, y, size, bodyColor, wingColor, wingPhase, direction, type, droneTimer) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(direction, 1);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.7, size * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wings
  const wingAngle = Math.sin(wingPhase) * 0.6;
  ctx.fillStyle = wingColor;
  // Left wing
  ctx.save();
  ctx.translate(-size * 0.1, -size * 0.2);
  ctx.rotate(-wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.3, size * 0.15, size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // Right wing
  ctx.save();
  ctx.translate(size * 0.1, -size * 0.2);
  ctx.rotate(wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.3, size * 0.15, size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(size * 0.55, -size * 0.25, size * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(size * 0.65, -size * 0.3, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(size * 0.68, -size * 0.3, size * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FF9800';
  ctx.beginPath();
  ctx.moveTo(size * 0.8, -size * 0.25);
  ctx.lineTo(size * 1.05, -size * 0.15);
  ctx.lineTo(size * 0.8, -size * 0.05);
  ctx.closePath();
  ctx.fill();

  // Tail
  ctx.fillStyle = wingColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.6, -size * 0.1);
  ctx.lineTo(-size * 0.95, -size * 0.35);
  ctx.lineTo(-size * 0.85, size * 0.05);
  ctx.closePath();
  ctx.fill();

  // Protected: X mark
  if (type === TARGET_TYPE.PROTECTED) {
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 3;
    const s = size * 0.2;
    ctx.beginPath();
    ctx.moveTo(-s, -s); ctx.lineTo(s, s);
    ctx.moveTo(s, -s); ctx.lineTo(-s, s);
    ctx.stroke();
    // Red circle
    ctx.strokeStyle = 'rgba(255,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Golden glow
  if (type === TARGET_TYPE.GOLDEN) {
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = 'rgba(255,215,0,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.65, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Sparkle
    const sparkle = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,255,255,${sparkle * 0.8})`;
    ctx.beginPath();
    ctx.arc(size * 0.3, -size * 0.35, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawDrone(x, y, size, timer, timerMax) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.roundRect(-size * 0.5, -size * 0.2, size, size * 0.4, 5);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Arms
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-size * 0.3, 0); ctx.lineTo(-size * 0.7, -size * 0.35);
  ctx.moveTo(size * 0.3, 0); ctx.lineTo(size * 0.7, -size * 0.35);
  ctx.moveTo(-size * 0.3, 0); ctx.lineTo(-size * 0.7, size * 0.35);
  ctx.moveTo(size * 0.3, 0); ctx.lineTo(size * 0.7, size * 0.35);
  ctx.stroke();

  // Propellers
  const propAngle = Date.now() * 0.02;
  for (let px of [-1, 1]) {
    for (let py of [-1, 1]) {
      ctx.save();
      ctx.translate(px * size * 0.65, py * size * 0.3);
      ctx.fillStyle = 'rgba(200,200,200,0.6)';
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.25, size * 0.06, propAngle, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.25, size * 0.06, propAngle + Math.PI, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Red eye
  ctx.fillStyle = '#FF0000';
  ctx.shadowColor = '#FF0000';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Timer bar
  const pct = timer / timerMax;
  const barW = size * 1.2;
  const barH = 5;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(-barW / 2, -size * 0.55, barW, barH);
  ctx.fillStyle = pct > 0.3 ? '#FF9800' : '#FF0000';
  ctx.fillRect(-barW / 2, -size * 0.55, barW * pct, barH);

  // Warning flash
  if (pct < 0.3) {
    const flash = Math.sin(Date.now() * 0.015) > 0;
    if (flash) {
      ctx.strokeStyle = 'rgba(255,0,0,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawCrosshair(x, y) {
  const r = CROSSHAIR_RADIUS;
  const recoil = recoilTimer > 0 ? recoilTimer * 5 : 0;

  ctx.save();
  ctx.translate(x, y);

  // Outer circle
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r + recoil, 0, Math.PI * 2);
  ctx.stroke();

  // Inner dot
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI * 2);
  ctx.fill();

  // Cross lines
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  const gap = 6 + recoil;
  const len = r - 2;
  ctx.beginPath();
  ctx.moveTo(-len, 0); ctx.lineTo(-gap, 0);
  ctx.moveTo(gap, 0); ctx.lineTo(len, 0);
  ctx.moveTo(0, -len); ctx.lineTo(0, -gap);
  ctx.moveTo(0, gap); ctx.lineTo(0, len);
  ctx.stroke();

  ctx.restore();
}

function drawJoystick() {
  // Base
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(joystickBaseX, joystickBaseY, JOYSTICK_BASE_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Thumb
  const tx = joystickBaseX + joystickDX;
  const ty = joystickBaseY + joystickDY;
  ctx.fillStyle = joystickActive ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(tx, ty, JOYSTICK_THUMB_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.stroke();

  // Direction arrows hint
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('▲', joystickBaseX, joystickBaseY - JOYSTICK_BASE_R + 18);
  ctx.fillText('▼', joystickBaseX, joystickBaseY + JOYSTICK_BASE_R - 8);
  ctx.fillText('◄', joystickBaseX - JOYSTICK_BASE_R + 14, joystickBaseY + 5);
  ctx.fillText('►', joystickBaseX + JOYSTICK_BASE_R - 14, joystickBaseY + 5);
}

function drawShootButton() {
  const r = SHOOT_BTN_R;
  const pressed = shootActive;

  ctx.fillStyle = pressed ? 'rgba(255,60,60,0.6)' : 'rgba(255,60,60,0.3)';
  ctx.strokeStyle = pressed ? 'rgba(255,100,100,0.8)' : 'rgba(255,60,60,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(shootBtnX, shootBtnY, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Fire icon
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔥', shootBtnX, shootBtnY);
}

// ============================================================
//  BACKGROUND
// ============================================================
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(0.5, '#B0E0E6');
  skyGrad.addColorStop(0.75, '#E0F7FA');
  skyGrad.addColorStop(1, '#8BC34A');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  const t = Date.now() * 0.0003;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 300 + t * (30 + i * 10)) % (canvas.width + 200)) - 100;
    const cy = 40 + i * 50;
    drawCloud(cx, cy, 40 + i * 10);
  }

  // Ground
  const groundY = canvas.height * 0.75;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
  groundGrad.addColorStop(0, '#66BB6A');
  groundGrad.addColorStop(1, '#2E7D32');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

  // Trees
  for (let i = 0; i < 6; i++) {
    drawTree(i * (canvas.width / 5) + 50, groundY);
  }
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y + size * 0.1, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawTree(x, groundY) {
  // Trunk
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(x - 5, groundY - 40, 10, 40);
  // Leaves
  ctx.fillStyle = '#43A047';
  ctx.beginPath();
  ctx.arc(x, groundY - 55, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#66BB6A';
  ctx.beginPath();
  ctx.arc(x + 10, groundY - 45, 18, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
//  HUD
// ============================================================
function drawHUD() {
  const w = canvas.width;
  const scale = Math.min(w / 375, 1.6); // Scale responsif (base: lebar HP standar)
  const pad = 12 * scale;
  const barH = 42 * scale;
  const fontSize = Math.max(15, 18 * scale);
  const smallFont = Math.max(12, 14 * scale);

  // Background bar atas
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(0, 0, w, barH + pad * 2, 12 * scale);
  ctx.fill();

  const midY = pad + barH / 2;

  // --- SCORE (Kiri) ---
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${fontSize}px system-ui, -apple-system, sans-serif`;
  ctx.fillText(`🦆 ${score}`, pad * 2, midY);

  // --- COMBO (Kiri, di bawah score agar tidak overlap) ---
  if (combo > 1) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${smallFont}px system-ui, sans-serif`;
    ctx.fillText(`🔥 x${combo}`, pad * 2, midY + fontSize / 2 + 5 * scale);
  }

  // --- TIMER (Tengah) ---
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${fontSize}px system-ui, sans-serif`;
  ctx.fillText(`${Math.floor(gameTime)}s`, w / 2, midY);

  // --- LIVES (Kanan) ---
  ctx.textAlign = 'right';
  const heartSize = 18 * scale;
  const heartGap = heartSize * 1.4;
  for (let i = 0; i < lives; i++) {
    ctx.font = `${heartSize}px system-ui, sans-serif`;
    ctx.fillText('❤️', w - pad * 2 - i * heartGap, midY);
  }

  // --- STATUS INDICATORS (Stack vertikal di bawah HUD) ---
  const statusY = barH + pad * 3.5;
  let statusOffset = 0;

  if (slowMotion) {
    ctx.fillStyle = 'rgba(255,215,0,0.9)';
    ctx.font = `bold ${smallFont + 1}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('⚡ SLOW MOTION ⚡', w / 2, statusY + statusOffset);
    statusOffset += 22 * scale;
  }

  if (droneWarning) {
    const flash = Math.sin(Date.now() * 0.012) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,50,50,0.95)';
      ctx.font = `bold ${smallFont + 1}px system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('🚨 DRONE INCOMING! 🚨', w / 2, statusY + statusOffset);
    }
  }
}

// ============================================================
//  MENU SCREEN
// ============================================================
function drawMenu() {
  drawBackground();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${Math.min(48, canvas.width * 0.08)}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 10;
  ctx.fillText('🦆 FLYING DUCK', cx, cy - 100);
  ctx.fillText('SHOOTER 🎯', cx, cy - 50);
  ctx.shadowBlur = 0;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#FFF';
    ctx.font = '18px Arial';
    ctx.fillText(`🏆 High Score: ${highScore}`, cx, cy);
  }

  // Start button
  const btnW = 200, btnH = 55;
  const btnX = cx - btnW / 2, btnY = cy + 50;
  ctx.fillStyle = '#4CAF50';
  ctx.strokeStyle = '#66BB6A';
  ctx.lineWidth = 3;
  ctx.roundRect(btnX, btnY, btnW, btnH, 15);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 22px Arial';
  ctx.fillText('▶  START', cx, btnY + btnH / 2);

  menuBtnBounds = { x: btnX, y: btnY, w: btnW, h: btnH };

  // Controls info
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '13px Arial';
  ctx.fillText('🕹️ Joystick kiri untuk aim', cx, cy + 150);
  ctx.fillText('🔥 Tombol kanan untuk tembak', cx, cy + 170);
  ctx.fillText('🎯 Tembak bebek hijau, hindari yang merah!', cx, cy + 195);

  // Animated duck
  const duckX = cx + Math.sin(Date.now() * 0.003) * 100;
  const duckY = cy - 160 + Math.cos(Date.now() * 0.005) * 15;
  drawDuck(duckX, duckY, 25, '#66BB6A', '#388E3C', Date.now() * 0.008, 1, TARGET_TYPE.DUCK, 0);
}

// ============================================================
//  GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Title
  ctx.fillStyle = '#FF5252';
  ctx.font = `bold ${Math.min(44, canvas.width * 0.075)}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 8;
  ctx.fillText('GAME OVER', cx, cy - 100);
  ctx.shadowBlur = 0;

  // Stats
  ctx.fillStyle = '#FFF';
  ctx.font = '22px Arial';
  ctx.fillText(`⭐ Score: ${score}`, cx, cy - 40);
  ctx.fillText(`🔥 Max Combo: ${maxCombo}`, cx, cy - 5);
  ctx.fillText(`⏱️ Time: ${Math.floor(gameTime)}s`, cx, cy + 30);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('🏆 NEW HIGH SCORE! 🏆', cx, cy + 70);
  } else {
    ctx.fillStyle = '#AAA';
    ctx.font = '16px Arial';
    ctx.fillText(`High Score: ${highScore}`, cx, cy + 70);
  }

  // Restart button
  const btnW = 200, btnH = 55;
  const btnX = cx - btnW / 2, btnY = cy + 110;
  ctx.fillStyle = '#4CAF50';
  ctx.strokeStyle = '#66BB6A';
  ctx.lineWidth = 3;
  ctx.roundRect(btnX, btnY, btnW, btnH, 15);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 22px Arial';
  ctx.fillText('🔄  PLAY AGAIN', cx, btnY + btnH / 2);

  menuBtnBounds = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// ============================================================
//  COLLISION DETECTION
// ============================================================
function checkHit(tx, ty, tSize) {
  const dx = crosshairX - tx;
  const dy = crosshairY - ty;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < (tSize + CROSSHAIR_RADIUS) * 0.8;
}

// ============================================================
//  SHOOT
// ============================================================
function shoot() {
  if (shootCooldown > 0) return;
  shootCooldown = 0.15;
  recoilTimer = 1;
  playSound('shoot');
  vibrate(30);

  let hitSomething = false;

  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    if (!t.alive) continue;
    if (checkHit(t.x, t.y, t.size)) {
      hitSomething = true;

      if (t.type === TARGET_TYPE.DUCK) {
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const comboBonus = Math.min(combo, 5);
        score += t.points + (comboBonus - 1);
        playSound('hit');
        vibrate([20, 30, 20]);
        spawnParticles(t.x, t.y, '#FFD700', 12, 4);
        spawnFeathers(t.x, t.y, t.bodyColor);
        fallingBirds.push({
          x: t.x, y: t.y, vx: t.direction * 2, vy: -3,
          rotation: 0, rotSpeed: 0.1, size: t.size,
          bodyColor: t.bodyColor, wingColor: t.wingColor,
          type: t.type, life: 1
        });
      } else if (t.type === TARGET_TYPE.GOLDEN) {
        combo += 2;
        if (combo > maxCombo) maxCombo = combo;
        score += t.points + combo;
        playSound('golden');
        vibrate([50, 30, 50, 30, 50]);
        spawnParticles(t.x, t.y, '#FFD700', 25, 6);
        spawnFeathers(t.x, t.y, '#FFD700');
        screenFlash = 0.3;
        screenFlashColor = 'rgba(255,215,0,0.3)';
        fallingBirds.push({
          x: t.x, y: t.y, vx: t.direction * 3, vy: -4,
          rotation: 0, rotSpeed: 0.15, size: t.size,
          bodyColor: '#FFD700', wingColor: '#FFA500',
          type: t.type, life: 1
        });
      } else if (t.type === TARGET_TYPE.PROTECTED) {
        combo = 0;
        score = Math.max(0, score + t.points);
        lives -= 1;
        playSound('error');
        vibrate(150);
        spawnParticles(t.x, t.y, '#FF0000', 15, 5);
        screenFlash = 0.2;
        screenFlashColor = 'rgba(255,0,0,0.3)';
        shakeTimer = 0.3;
        fallingBirds.push({
          x: t.x, y: t.y, vx: t.direction * 2, vy: -2,
          rotation: 0, rotSpeed: 0.1, size: t.size,
          bodyColor: '#CC0000', wingColor: '#990000',
          type: t.type, life: 1
        });
      } else if (t.type === TARGET_TYPE.DRONE) {
        combo += 3;
        if (combo > maxCombo) maxCombo = combo;
        score += t.points + combo;
        playSound('golden');
        vibrate([50, 50, 50]);
        spawnParticles(t.x, t.y, '#FF5722', 20, 6);
        spawnParticles(t.x, t.y, '#FFC107', 15, 4);
        screenFlash = 0.2;
        screenFlashColor = 'rgba(255,87,34,0.3)';
        droneWarning = null;
      }

      t.alive = false;
      break;
    }
  }

  if (!hitSomething) {
    // Miss - small penalty if combo
    if (combo > 0) combo = Math.max(0, combo - 1);
    spawnParticles(crosshairX, crosshairY, 'rgba(255,255,255,0.5)', 5, 2);
  }
}

// ============================================================
//  GAME INIT / RESET
// ============================================================
function startGame() {
  state = STATE.PLAYING;
  score = 0;
  lives = maxLives;
  combo = 0;
  maxCombo = 0;
  gameTime = 0;
  targets = [];
  particles = [];
  fallingBirds = [];
  spawnTimer = 0;
  spawnInterval = 1.5;
  slowMotion = false;
  slowMotionTimer = 0;
  droneWarning = null;
  screenFlash = 0;
  shakeTimer = 0;
  crosshairX = canvas.width / 2;
  crosshairY = canvas.height / 2;
  aimX = 0;
  aimY = 0;
  joystickDX = 0;
  joystickDY = 0;
  playSound('menu_click');
  vibrate(30);
}

function gameOver() {
  state = STATE.GAME_OVER;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('fds_highscore', highScore.toString());
  }
  playSound('gameover');
  vibrate([100, 50, 100, 50, 200]);
}

// ============================================================
//  INPUT HANDLING
// ============================================================
function getTouchPos(touch) {
  return { x: touch.clientX, y: touch.clientY };
}

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// Mouse fallback for desktop testing
let mouseDown = false;
canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  handleTouchStart({ preventDefault: () => {}, touches: [{ clientX: e.clientX, clientY: e.clientY, identifier: -1 }] });
});
canvas.addEventListener('mousemove', (e) => {
  if (mouseDown) handleTouchMove({ preventDefault: () => {}, touches: [{ clientX: e.clientX, clientY: e.clientY, identifier: -1 }] });
});
canvas.addEventListener('mouseup', (e) => {
  mouseDown = false;
  handleTouchEnd({ preventDefault: () => {}, changedTouches: [{ identifier: -1 }] });
});

function handleTouchStart(e) {
  e.preventDefault();
  ensureAudio();

  for (const touch of e.touches) {
    const pos = getTouchPos(touch);

    if (state === STATE.MENU || state === STATE.GAME_OVER) {
      if (menuBtnBounds && pos.x >= menuBtnBounds.x && pos.x <= menuBtnBounds.x + menuBtnBounds.w &&
          pos.y >= menuBtnBounds.y && pos.y <= menuBtnBounds.y + menuBtnBounds.h) {
        if (state === STATE.MENU) startGame();
        else startGame();
        return;
      }
      continue;
    }

    // Check joystick area (left half, bottom)
    if (!joystickActive && pos.x < canvas.width * 0.5 && pos.y > canvas.height * 0.5) {
      joystickActive = true;
      joystickTouchId = touch.identifier;
      joystickBaseX = pos.x;
      joystickBaseY = pos.y;
      joystickThumbX = pos.x;
      joystickThumbY = pos.y;
      joystickDX = 0;
      joystickDY = 0;
      continue;
    }

    // Check shoot button area (right half, bottom)
    if (!shootActive && pos.x > canvas.width * 0.5 && pos.y > canvas.height * 0.65) {
      shootActive = true;
      shootTouchId = touch.identifier;
      shoot();
      continue;
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  if (state !== STATE.PLAYING) return;

  for (const touch of e.touches) {
    if (touch.identifier === joystickTouchId && joystickActive) {
      const pos = getTouchPos(touch);
      let dx = pos.x - joystickBaseX;
      let dy = pos.y - joystickBaseY;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > JOYSTICK_BASE_R) {
        dx = (dx / d) * JOYSTICK_BASE_R;
        dy = (dy / d) * JOYSTICK_BASE_R;
      }
      joystickDX = dx;
      joystickDY = dy;
      joystickThumbX = joystickBaseX + dx;
      joystickThumbY = joystickBaseY + dy;

      // Calculate aim direction
      const maxAimSpeed = 8;
      aimX = (dx / JOYSTICK_BASE_R) * maxAimSpeed;
      aimY = (dy / JOYSTICK_BASE_R) * maxAimSpeed;
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.identifier === joystickTouchId) {
      joystickActive = false;
      joystickTouchId = null;
      aimX = 0;
      aimY = 0;
    }
    if (touch.identifier === shootTouchId) {
      shootActive = false;
      shootTouchId = null;
    }
  }
}

// Keyboard support for desktop
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ' && state === STATE.PLAYING) shoot();
  if (e.key === 'Enter') {
    if (state === STATE.MENU || state === STATE.GAME_OVER) startGame();
  }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// ============================================================
//  MAIN GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const rawDt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Slow motion factor
  const timeScale = slowMotion ? 0.4 : 1;
  const dt = rawDt * timeScale;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Update positions for UI elements
  joystickBaseX = Math.max(JOYSTICK_BASE_R + 20, Math.min(canvas.width * 0.35, joystickBaseX || canvas.width * 0.15));
  joystickBaseY = Math.max(JOYSTICK_BASE_R + 20, Math.min(canvas.height - JOYSTICK_BASE_R - 20, joystickBaseY || canvas.height - JOYSTICK_BASE_R - 40));
  shootBtnX = canvas.width - SHOOT_BTN_R - 30;
  shootBtnY = canvas.height - SHOOT_BTN_R - 40;

  // Keyboard input
  if (state === STATE.PLAYING) {
    let kAimX = 0, kAimY = 0;
    if (keys['ArrowLeft'] || keys['a']) kAimX = -1;
    if (keys['ArrowRight'] || keys['d']) kAimX = 1;
    if (keys['ArrowUp'] || keys['w']) kAimY = -1;
    if (keys['ArrowDown'] || keys['s']) kAimY = 1;
    if (!joystickActive && (kAimX || kAimY)) {
      const maxAimSpeed = 8;
      aimX = kAimX * maxAimSpeed;
      aimY = kAimY * maxAimSpeed;
    }
  }

  if (state === STATE.MENU) {
    drawMenu();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (state === STATE.GAME_OVER) {
    drawGameOver();
    requestAnimationFrame(gameLoop);
    return;
  }

  // === PLAYING STATE ===
  gameTime += dt;

  // Crosshair movement with smoothing
  crosshairX += aimX;
  crosshairY += aimY;

  // Clamp crosshair to screen (avoid HUD and buttons)
  crosshairX = Math.max(CROSSHAIR_RADIUS, Math.min(canvas.width - CROSSHAIR_RADIUS, crosshairX));
  const hudTopLimit = (42 * Math.min(canvas.width / 375, 1.6)) + (12 * Math.min(canvas.width / 375, 1.6)) * 2 + 15;
  crosshairY = Math.max(CROSSHAIR_RADIUS + hudTopLimit, Math.min(canvas.height - CROSSHAIR_RADIUS - 80, crosshairY));

  // Recoil decay
  if (recoilTimer > 0) recoilTimer = Math.max(0, recoilTimer - dt * 5);

  // Shoot cooldown
  if (shootCooldown > 0) shootCooldown = Math.max(0, shootCooldown - dt);

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer = Math.max(0, shakeTimer - dt);
    shakeX = (Math.random() - 0.5) * 8;
    shakeY = (Math.random() - 0.5) * 8;
  } else {
    shakeX = 0;
    shakeY = 0;
  }

  // Screen flash
  if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - dt * 2);

  // Slow motion timer
  if (slowMotionTimer > 0) {
    slowMotionTimer = Math.max(0, slowMotionTimer - dt);
    if (slowMotionTimer <= 0) slowMotion = false;
  }

  // Spawn targets
  spawnTimer += dt;
  const currentInterval = Math.max(0.4, spawnInterval - gameTime * 0.005);
  if (spawnTimer >= currentInterval) {
    spawnTimer = 0;
    spawnTarget();
    // Sometimes spawn extra
    if (gameTime > 30 && Math.random() < 0.3) spawnTarget();
    if (gameTime > 60 && Math.random() < 0.2) spawnTarget();
  }

  // Check drone warning
  droneWarning = targets.some(t => t.type === TARGET_TYPE.DRONE && t.alive && t.droneTimer < t.droneTimerMax * 0.4);

  // Update targets
  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    if (!t.alive) {
      targets.splice(i, 1);
      continue;
    }

    t.x += t.speed * t.direction * dt;
    t.wingPhase += t.wingSpeed * dt;
    t.bobPhase += 2 * dt;
    t.y += Math.sin(t.bobPhase) * 0.5;

    // Drone timer
    if (t.type === TARGET_TYPE.DRONE) {
      t.droneTimer -= dt;
      if (t.droneTimer <= 0) {
        t.alive = false;
        lives -= 1;
        playSound('drone_alarm');
        vibrate(200);
        screenFlash = 0.3;
        screenFlashColor = 'rgba(255,0,0,0.4)';
        shakeTimer = 0.5;
        combo = 0;
        spawnParticles(t.x, t.y, '#FF0000', 20, 5);
      }
    }

    // Remove if off screen
    if (t.direction > 0 && t.x > canvas.width + t.size * 2) {
      targets.splice(i, 1);
    } else if (t.direction < 0 && t.x < -t.size * 2) {
      targets.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life -= p.decay;
    if (p.feather) p.rotation += p.rotSpeed;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update falling birds
  for (let i = fallingBirds.length - 1; i >= 0; i--) {
    const b = fallingBirds[i];
    b.x += b.vx;
    b.vy += 0.3;
    b.y += b.vy;
    b.rotation += b.rotSpeed;
    b.life -= 0.015;
    if (b.life <= 0) fallingBirds.splice(i, 1);
  }

  // Check game over
  if (lives <= 0) {
    lives = 0;
    gameOver();
  }

  // === RENDER ===
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();

  // Draw targets
  for (const t of targets) {
    if (t.type === TARGET_TYPE.DRONE) {
      drawDrone(t.x, t.y, t.size, t.droneTimer, t.droneTimerMax);
    } else {
      drawDuck(t.x, t.y, t.size, t.bodyColor, t.wingColor, t.wingPhase, t.direction, t.type, 0);
    }
  }

  // Draw falling birds
  for (const b of fallingBirds) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rotation);
    ctx.globalAlpha = b.life;
    drawDuck(0, 0, b.size, b.bodyColor, b.wingColor, Date.now() * 0.005, 1, b.type, 0);
    ctx.restore();
  }

  // Draw particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.feather) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Draw crosshair
  drawCrosshair(crosshairX, crosshairY);

  // Screen flash overlay
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlash;
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Draw HUD and controls (not affected by shake)
  drawHUD();
  drawJoystick();
  drawShootButton();

  requestAnimationFrame(gameLoop);
}

// ============================================================
//  POLYFILL for roundRect
// ============================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// ============================================================
//  START
// ============================================================
// Initialize joystick position
joystickBaseX = canvas.width * 0.15;
joystickBaseY = canvas.height - JOYSTICK_BASE_R - 40;
crosshairX = canvas.width / 2;
crosshairY = canvas.height / 2;

requestAnimationFrame(gameLoop);
</script>
