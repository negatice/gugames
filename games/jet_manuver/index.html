<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jet Manuver</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
  <div id="score-display">SCORE: 0</div>
  <div id="fuel-container">
    <div id="fuel-bar"></div>
    <div id="fuel-label">TURBO</div>
  </div>
  <div id="cooldown-indicator">⚡ COOLDOWN</div>
</div>

<div id="turbo-btn">🔥<br>TURBO</div>

<div id="start-screen" class="screen-overlay">
  <h1>JET MANEUVER</h1>
  <div class="subtitle">Hindari rudal! Bertahan hidup!</div>
  <button id="start-btn">MULAI</button>
  <div class="controls-hint">
    👈 Geser layar kiri: Arah jet<br>
    👉 Tekan tombol kanan: Turbo boost
  </div>
</div>

<div id="game-over-screen" class="screen-overlay hide">
  <h1>GAME OVER</h1>
  <div class="final-score" id="final-score">SCORE: 0</div>
  <button id="restart-btn">MAIN LAGI</button>
</div>
<div class="home-return-btn" id="homeReturnBtn">
        <div class="home-return-progress"></div>
        <span class="home-return-icon">❌</span>
    </div>
<script src="script.js"></script>
</body>
</html>
