<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💣 Minesweeper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>💣 Minesweeper</h1>
  <div class="stats">
    <div class="stat">
      <span class="icon">💣</span>
      <span id="bomb-count">10</span>
    </div>
    <div class="stat">
      <span class="icon">⏱️</span>
      <span id="timer">0:00</span>
    </div>
  </div>
</div>

<!-- LEVEL BAR -->
<div class="level-bar">
  <button class="level-btn active" data-level="easy">😊 Easy<br><small>8×8 · 5</small></button>
  <button class="level-btn" data-level="medium">😐 Medium<br><small>12×12 · 10</small></button>
  <button class="level-btn" data-level="hard">😈 Hard<br><small>16×16 · 20</small></button>
</div>

<div class="hint">Tap buka · Tekan lama 🚩 flag</div>

<!-- GRID -->
<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="action-btn" id="btn-flag-mode">🚩 Flag Mode: OFF</button>
  <button class="action-btn primary" id="btn-restart">🔄 Restart</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <span class="emoji" id="overlay-emoji">🎉</span>
    <h2 id="overlay-title">You Win!</h2>
    <p id="overlay-msg">Waktu: 0:00</p>
    <button class="play-btn" id="overlay-btn">🔄 Main Lagi</button>
  </div>
</div>

<!-- CONFETTI -->
<canvas id="confetti-canvas"></canvas>

<script src="script.js" defer></script>
</body>
</html>
