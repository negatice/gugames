<!DOCTYPE html>
<html lang="id">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💣 Minesweeper</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --tile-closed: #2a2a4a;
    --tile-closed-hover: #3a3a5a;
    --tile-open: #1e1e36;
    --tile-border: #333366;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --danger: #e74c3c;
    --success: #2ecc71;
    --gold: #f1c40f;
    --text: #e0e0e0;
    --text-dim: #888;
    --n1: #3498db;
    --n2: #2ecc71;
    --n3: #e74c3c;
    --n4: #9b59b6;
    --n5: #e67e22;
    --n6: #1abc9c;
    --n7: #34495e;
    --n8: #95a5a6;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* ===== HEADER ===== */
  .header {
    width: 100%;
    max-width: 480px;
    padding: 12px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 1.05rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    background: var(--surface);
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid var(--tile-border);
  }

  .stat .icon { font-size: 1.1rem; }

  /* ===== LEVEL SELECTOR ===== */
  .level-bar {
    width: 100%;
    max-width: 480px;
    padding: 4px 16px 8px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .level-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--tile-border);
    background: var(--surface);
    color: var(--text-dim);
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .level-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(108,92,231,0.4);
  }

  .level-btn:active { transform: scale(0.95); }

  /* ===== GAME GRID ===== */
  .grid-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 480px;
    padding: 8px;
    overflow: hidden;
  }

  .grid {
    display: grid;
    gap: 2px;
    width: 100%;
    max-width: 440px;
    aspect-ratio: 1;
  }

  .tile {
    position: relative;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(10px, 3.5vw, 18px);
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    background: var(--tile-closed);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 4px rgba(0,0,0,0.3);
  }

  .tile:active:not(.open):not(.flagged) {
    transform: scale(0.9);
    background: var(--tile-closed-hover);
  }

  .tile.open {
    background: var(--tile-open);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    border-color: transparent;
    animation: tileOpen 0.25s ease-out;
  }

  .tile.flagged {
    background: var(--tile-closed);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(241,196,15,0.3);
  }

  .tile.flagged::after {
    content: '🚩';
    font-size: clamp(12px, 4vw, 22px);
    animation: flagPop 0.3s ease-out;
  }

  .tile.mine-exploded {
    background: var(--danger) !important;
    animation: explode 0.5s ease-out;
  }

  .tile.mine-revealed {
    background: rgba(231,76,60,0.2);
    border-color: rgba(231,76,60,0.3);
  }

  .tile.wrong-flag {
    background: rgba(231,76,60,0.15);
    border-color: rgba(231,76,60,0.4);
  }

  .tile .num { animation: numPop 0.2s ease-out; }

  .tile .n1 { color: var(--n1); }
  .tile .n2 { color: var(--n2); }
  .tile .n3 { color: var(--n3); }
  .tile .n4 { color: var(--n4); }
  .tile .n5 { color: var(--n5); }
  .tile .n6 { color: var(--n6); }
  .tile .n7 { color: var(--n7); }
  .tile .n8 { color: var(--n8); }

  @keyframes tileOpen {
    0% { transform: scale(0.8); opacity: 0.5; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes flagPop {
    0% { transform: scale(0) rotate(-20deg); }
    60% { transform: scale(1.3) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  @keyframes numPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes explode {
    0% { transform: scale(1); }
    15% { transform: scale(1.4); background: #fff; }
    40% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    width: 100%;
    max-width: 480px;
    padding: 8px 16px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .action-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--tile-border);
    background: var(--surface);
    color: var(--text);
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-btn:active { transform: scale(0.95); }

  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .action-btn.primary:active {
    background: #5b4bd6;
  }

  /* ===== OVERLAY ===== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--tile-border);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 85%;
    transform: scale(0.8);
    transition: transform 0.3s ease-out;
  }

  .overlay.show .overlay-card {
    transform: scale(1);
  }

  .overlay-card .emoji {
    font-size: 3.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .overlay-card h2 {
    font-size: 1.5rem;
    margin-bottom: 6px;
  }

  .overlay-card p {
    color: var(--text-dim);
    margin-bottom: 20px;
    font-size: 0.95rem;
  }

  .overlay-card .play-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .overlay-card .play-btn:active { background: #5b4bd6; }

  /* ===== CONFETTI CANVAS ===== */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* ===== RED FLASH ===== */
  .red-flash {
    position: fixed;
    inset: 0;
    background: rgba(231,76,60,0.3);
    pointer-events: none;
    z-index: 50;
    animation: flashOut 0.6s ease-out forwards;
  }

  @keyframes flashOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== HINT TEXT ===== */
  .hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    padding: 2px 16px 0;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>💣 Minesweeper</h1>
  <div class="stats">
    <div class="stat">
      <span class="icon">💣</span>
      <span id="bomb-count">10</span>
    </div>
    <div class="stat">
      <span class="icon">⏱️</span>
      <span id="timer">0:00</span>
    </div>
  </div>
</div>

<!-- LEVEL BAR -->
<div class="level-bar">
  <button class="level-btn active" data-level="easy">😊 Easy<br><small>8×8 · 5</small></button>
  <button class="level-btn" data-level="medium">😐 Medium<br><small>12×12 · 10</small></button>
  <button class="level-btn" data-level="hard">😈 Hard<br><small>16×16 · 20</small></button>
</div>

<div class="hint">Tap buka · Tekan lama 🚩 flag</div>

<!-- GRID -->
<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="action-btn" id="btn-flag-mode">🚩 Flag Mode: OFF</button>
  <button class="action-btn primary" id="btn-restart">🔄 Restart</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <span class="emoji" id="overlay-emoji">🎉</span>
    <h2 id="overlay-title">You Win!</h2>
    <p id="overlay-msg">Waktu: 0:00</p>
    <button class="play-btn" id="overlay-btn">🔄 Main Lagi</button>
  </div>
</div>

<!-- CONFETTI -->
<canvas id="confetti-canvas"></canvas>

<script>
// ===== AUDIO ENGINE =====
const AudioEngine = (() => {
  let ctx;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  };

  const playTone = (freq, duration, type = 'square', vol = 0.1) => {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(vol, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      osc.connect(gain);
      gain.connect(c.destination);
      osc.start();
      osc.stop(c.currentTime + duration);
    } catch(e) {}
  };

  return {
    click: () => playTone(800, 0.06, 'sine', 0.08),
    open: () => { playTone(600, 0.08, 'sine', 0.06); playTone(900, 0.06, 'sine', 0.04); },
    flag: () => { playTone(500, 0.1, 'triangle', 0.08); playTone(700, 0.1, 'triangle', 0.06); },
    unflag: () => playTone(400, 0.12, 'triangle', 0.07),
    explode: () => {
      try {
        const c = getCtx();
        const bufferSize = c.sampleRate * 0.4;
        const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const source = c.createBufferSource();
        source.buffer = buffer;
        const gain = c.createGain();
        gain.gain.setValueAtTime(0.25, c.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.4);
        const filter = c.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, c.currentTime);
        filter.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.4);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(c.destination);
        source.start();
      } catch(e) {}
    },
    win: () => {
      const notes = [523, 659, 784, 1047];
      notes.forEach((n, i) => {
        setTimeout(() => playTone(n, 0.3, 'sine', 0.1), i * 120);
      });
    }
  };
})();

// ===== VIBRATION =====
const Vibrate = {
  light: () => { try { navigator.vibrate && navigator.vibrate(15); } catch(e) {} },
  strong: () => { try { navigator.vibrate && navigator.vibrate([100, 50, 100, 50, 200]); } catch(e) {} },
  win: () => { try { navigator.vibrate && navigator.vibrate([50, 30, 50, 30, 100]); } catch(e) {} }
};

// ===== CONFETTI =====
const Confetti = (() => {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId;

  const resize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  };
  window.addEventListener('resize', resize);
  resize();

  const colors = ['#6c5ce7','#a29bfe','#fd79a8','#fdcb6e','#00cec9','#e17055','#2ecc71','#3498db'];

  const create = () => {
    particles = [];
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 100,
        y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 16,
        vy: Math.random() * -18 - 4,
        w: Math.random() * 8 + 4,
        h: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12,
        gravity: 0.35 + Math.random() * 0.15,
        opacity: 1,
        decay: 0.005 + Math.random() * 0.008
      });
    }
    animate();
  };

  const animate = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.99;
      p.rotation += p.rotSpeed;
      p.opacity -= p.decay;
      if (p.opacity > 0) {
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
    });
    if (alive) {
      animId = requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  };

  const stop = () => {
    cancelAnimationFrame(animId);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = [];
  };

  return { create, stop };
})();

// ===== GAME =====
const LEVELS = {
  easy:   { rows: 8,  cols: 8,  mines: 5 },
  medium: { rows: 12, cols: 12, mines: 10 },
  hard:   { rows: 16, cols: 16, mines: 20 }
};

let currentLevel = 'easy';
let board = [];       // 2D: { mine, open, flagged, adjacent }
let rows, cols, totalMines;
let gameOver = false;
let gameStarted = false;
let firstClick = true;
let flagCount = 0;
let openedCount = 0;
let timerInterval = null;
let seconds = 0;
let flagMode = false;
let longPressTimer = null;
let isLongPress = false;

const gridEl = document.getElementById('grid');
const bombCountEl = document.getElementById('bomb-count');
const timerEl = document.getElementById('timer');
const overlayEl = document.getElementById('overlay');
const overlayEmoji = document.getElementById('overlay-emoji');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg = document.getElementById('overlay-msg');
const overlayBtn = document.getElementById('overlay-btn');
const btnRestart = document.getElementById('btn-restart');
const btnFlagMode = document.getElementById('btn-flag-mode');
const levelBtns = document.querySelectorAll('.level-btn');

// ===== INIT =====
function initGame(level) {
  currentLevel = level;
  const cfg = LEVELS[level];
  rows = cfg.rows;
  cols = cfg.cols;
  totalMines = cfg.mines;

  board = [];
  for (let r = 0; r < rows; r++) {
    board[r] = [];
    for (let c = 0; c < cols; c++) {
      board[r][c] = { mine: false, open: false, flagged: false, adjacent: 0 };
    }
  }

  gameOver = false;
  gameStarted = false;
  firstClick = true;
  flagCount = 0;
  openedCount = 0;
  seconds = 0;
  stopTimer();
  updateTimer();
  updateBombCount();
  overlayEl.classList.remove('show');
  Confetti.stop();

  // Remove red flash
  document.querySelectorAll('.red-flash').forEach(el => el.remove());

  buildGrid();
}

function buildGrid() {
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gridEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.r = r;
      tile.dataset.c = c;

      // Touch events
      tile.addEventListener('touchstart', handleTouchStart, { passive: false });
      tile.addEventListener('touchend', handleTouchEnd, { passive: false });
      tile.addEventListener('touchmove', handleTouchMove, { passive: false });
      tile.addEventListener('touchcancel', handleTouchCancel, { passive: false });

      // Mouse fallback
      tile.addEventListener('mousedown', handleMouseDown);
      tile.addEventListener('mouseup', handleMouseUp);
      tile.addEventListener('contextmenu', e => e.preventDefault());

      gridEl.appendChild(tile);
    }
  }
}

function placeMines(safeR, safeC) {
  // Create safe zone around first click
  const safeZone = new Set();
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        safeZone.add(nr * cols + nc);
      }
    }
  }

  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const idx = r * cols + c;
    if (!board[r][c].mine && !safeZone.has(idx)) {
      board[r][c].mine = true;
      placed++;
    }
  }

  // Calculate adjacents
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].mine) {
            count++;
          }
        }
      }
      board[r][c].adjacent = count;
    }
  }
}

// ===== TOUCH HANDLING =====
function handleTouchStart(e) {
  if (gameOver) return;
  e.preventDefault();
  isLongPress = false;
  const tile = e.currentTarget;
  const r = +tile.dataset.r, c = +tile.dataset.c;

  longPressTimer = setTimeout(() => {
    isLongPress = true;
    Vibrate.light();
    toggleFlag(r, c);
  }, 400);
}

function handleTouchEnd(e) {
  if (gameOver) return;
  e.preventDefault();
  clearTimeout(longPressTimer);
  if (!isLongPress) {
    const tile = e.currentTarget;
    const r = +tile.dataset.r, c = +tile.dataset.c;
    handleTap(r, c);
  }
}

function handleTouchMove(e) {
  clearTimeout(longPressTimer);
}

function handleTouchCancel(e) {
  clearTimeout(longPressTimer);
}

// Mouse fallback
let mouseDownPos = null;
function handleMouseDown(e) {
  if (gameOver) return;
  mouseDownPos = { x: e.clientX, y: e.clientY };
  longPressTimer = setTimeout(() => {
    isLongPress = true;
    Vibrate.light();
    const tile = e.currentTarget;
    const r = +tile.dataset.r, c = +tile.dataset.c;
    toggleFlag(r, c);
  }, 400);
}

function handleMouseUp(e) {
  if (gameOver) return;
  clearTimeout(longPressTimer);
  if (isLongPress) {
    isLongPress = false;
    return;
  }
  if (e.button === 2) {
    const tile = e.currentTarget;
    const r = +tile.dataset.r, c = +tile.dataset.c;
    toggleFlag(r, c);
    return;
  }
  if (!isLongPress) {
    const tile = e.currentTarget;
    const r = +tile.dataset.r, c = +tile.dataset.c;
    handleTap(r, c);
  }
}

function handleTap(r, c) {
  const cell = board[r][c];
  if (cell.open || cell.flagged) return;

  if (flagMode) {
    toggleFlag(r, c);
    return;
  }

  if (firstClick) {
    firstClick = false;
    gameStarted = true;
    placeMines(r, c);
    startTimer();
  }

  if (cell.mine) {
    revealMine(r, c);
    return;
  }

  Vibrate.light();
  AudioEngine.click();
  openCell(r, c);
}

// ===== GAME LOGIC =====
function openCell(r, c) {
  const cell = board[r][c];
  if (cell.open || cell.flagged || cell.mine) return;

  cell.open = true;
  openedCount++;
  renderTile(r, c);

  if (cell.adjacent === 0) {
    // Flood fill
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          setTimeout(() => openCell(nr, nc), 15);
        }
      }
    }
  }

  checkWin();
}

function toggleFlag(r, c) {
  const cell = board[r][c];
  if (cell.open) return;

  cell.flagged = !cell.flagged;
  flagCount += cell.flagged ? 1 : -1;
  updateBombCount();
  renderTile(r, c);

  if (cell.flagged) {
    AudioEngine.flag();
  } else {
    AudioEngine.unflag();
  }
}

function revealMine(r, c) {
  board[r][c].open = true;
  gameOver = true;
  stopTimer();

  // Show exploded mine
  const tile = getTileEl(r, c);
  tile.classList.add('mine-exploded');
  tile.innerHTML = '<span class="num">💥</span>';

  AudioEngine.explode();
  Vibrate.strong();

  // Red flash
  const flash = document.createElement('div');
  flash.className = 'red-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);

  // Reveal all mines and wrong flags
  setTimeout(() => {
    for (let rr = 0; rr < rows; rr++) {
      for (let cc = 0; cc < cols; cc++) {
        const cell = board[rr][cc];
        if (cell.mine && !cell.flagged && !(rr === r && cc === c)) {
          const t = getTileEl(rr, cc);
          t.classList.add('mine-revealed');
          t.innerHTML = '<span class="num">💣</span>';
        }
        if (cell.flagged && !cell.mine) {
          const t = getTileEl(rr, cc);
          t.classList.add('wrong-flag');
          t.innerHTML = '<span class="num">❌</span>';
        }
      }
    }

    setTimeout(() => showOverlay(false), 400);
  }, 500);
}

function checkWin() {
  const totalSafe = rows * cols - totalMines;
  if (openedCount >= totalSafe) {
    gameOver = true;
    stopTimer();
    AudioEngine.win();
    Vibrate.win();

    // Auto-flag remaining mines
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c].mine && !board[r][c].flagged) {
          board[r][c].flagged = true;
          flagCount++;
          renderTile(r, c);
        }
      }
    }
    updateBombCount();

    setTimeout(() => {
      Confetti.create();
      showOverlay(true);
    }, 300);
  }
}

// ===== RENDER =====
function getTileEl(r, c) {
  return gridEl.children[r * cols + c];
}

function renderTile(r, c) {
  const cell = board[r][c];
  const tile = getTileEl(r, c);

  if (cell.open) {
    tile.classList.add('open');
    tile.classList.remove('flagged');
    if (cell.adjacent > 0) {
      tile.innerHTML = `<span class="num n${cell.adjacent}">${cell.adjacent}</span>`;
    } else {
      tile.innerHTML = '';
    }
  } else if (cell.flagged) {
    tile.classList.add('flagged');
    tile.innerHTML = '';
  } else {
    tile.classList.remove('open', 'flagged', 'mine-exploded', 'mine-revealed', 'wrong-flag');
    tile.innerHTML = '';
  }
}

function updateBombCount() {
  const remaining = totalMines - flagCount;
  bombCountEl.textContent = remaining;
}

// ===== TIMER =====
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    seconds++;
    updateTimer();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimer() {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// ===== OVERLAY =====
function showOverlay(win) {
  if (win) {
    overlayEmoji.textContent = '🎉';
    overlayTitle.textContent = 'You Win!';
    overlayMsg.textContent = `Selesai dalam ${timerEl.textContent}`;
    overlayTitle.style.color = 'var(--success)';
  } else {
    overlayEmoji.textContent = '💥';
    overlayTitle.textContent = 'Game Over';
    overlayMsg.textContent = `Bom meledak! Waktu: ${timerEl.textContent}`;
    overlayTitle.style.color = 'var(--danger)';
  }
  overlayEl.classList.add('show');
}

// ===== EVENT LISTENERS =====
btnRestart.addEventListener('click', () => initGame(currentLevel));
overlayBtn.addEventListener('click', () => initGame(currentLevel));

levelBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    levelBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initGame(btn.dataset.level);
  });
});

btnFlagMode.addEventListener('click', () => {
  flagMode = !flagMode;
  btnFlagMode.textContent = `🚩 Flag Mode: ${flagMode ? 'ON' : 'OFF'}`;
  btnFlagMode.style.background = flagMode ? 'var(--gold)' : '';
  btnFlagMode.style.color = flagMode ? '#000' : '';
  btnFlagMode.style.borderColor = flagMode ? 'var(--gold)' : '';
  Vibrate.light();
});

// Prevent context menu globally
document.addEventListener('contextmenu', e => e.preventDefault());

// ===== START =====
initGame('easy');
</script>
