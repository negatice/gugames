<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neon Pinball</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div class="combo-toast" id="comboToast"></div>

<div class="ov" id="menuOv">
  <div class="ov-bg"></div>
  <div class="ov-c">
    <div class="ov-title">PINBALL</div>
    <div class="ov-sub">TAP ANYWHERE TO START</div>
    <button class="ov-btn" id="playBtn">▶ PLAY</button>
    <div class="ov-best" id="menuBest">BEST: 0</div>
  </div>
</div>

<div class="ov" id="goOv" style="display:none">
  <div class="ov-bg"></div>
  <div class="ov-c">
    <div class="go-label">GAME OVER</div>
    <div class="go-score" id="goScore">0</div>
    <button class="ov-btn" id="retryBtn">↺ RETRY</button>
    <div class="ov-best" id="goBest">BEST: 0</div>
  </div>
</div>
<script src="script.js" defer></script>
</body>
</html>
