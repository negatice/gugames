<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FreeCell Solitaire</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <div class="stats">
    <span><span class="icon">⏱</span><span id="timer">00:00</span></span>
    <span><span class="icon">👆</span><span id="moves">0</span></span>
    <span><span class="icon">⭐</span><span id="score">0</span></span>
  </div>
  <span class="title">FREECELL</span>
  <div class="btns">
    <button id="btn-hint" title="Hint">💡</button>
    <button id="btn-undo" title="Undo">↩</button>
    <button id="btn-restart" title="Restart">🔄</button>
  </div>
</div>

<div id="game">
  <div class="upper-row">
    <div class="free-cells" id="free-cells"></div>
    <div class="foundations" id="foundations"></div>
  </div>
  <div id="tableau"></div>
</div>

<div id="win-overlay">
  <h1>🎉 YOU WIN!</h1>
  <p id="win-stats"></p>
  <button id="btn-play-again">Play Again</button>
</div>

<div class="modal-bg" id="confirm-modal">
  <div class="modal-box">
    <h2 id="modal-title">Restart?</h2>
    <p id="modal-msg">Are you sure you want to restart?</p>
    <button id="modal-yes">Yes</button>
    <button id="modal-no">No</button>
  </div>
</div>

<div id="toast"></div>
<div id="confetti-container"></div>
<script src="script.js" defer></script>
</body>
</html>
