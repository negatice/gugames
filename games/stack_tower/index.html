<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>STACK TOWER</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    position: fixed;
    top: 0; left: 0;
  }

  /* Prevent pull-to-refresh & overscroll */
  body { overscroll-behavior: none; }

  canvas {
    display: block;
    width: 100%; height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  /* ---- UI OVERLAY ---- */
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: absolute;
    top: max(8px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 56px;
    font-weight: 900;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    letter-spacing: 3px;
    transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0.88;
    line-height: 1;
  }
  #score-display.bump {
    transform: translateX(-50%) scale(1.3);
  }

  #highscore-display {
    position: absolute;
    top: calc(max(8px, env(safe-area-inset-top)) + 54px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.28);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #combo-display {
    position: absolute;
    top: calc(max(8px, env(safe-area-inset-top)) + 74px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    color: #FFD700;
    font-size: 13px;
    font-weight: 800;
    text-shadow: 0 0 12px rgba(255,215,0,0.5);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  #combo-display.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #perfect-text {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 40px;
    font-weight: 900;
    text-shadow: 0 0 35px rgba(255,215,0,0.8), 0 0 70px rgba(255,215,0,0.4);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 6px;
  }
  #perfect-text.pop {
    animation: perfectPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes perfectPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.25); }
    40% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
  }

  /* ---- FLASH ---- */
  #flash {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.06s;
  }

  /* ---- MENU SCREEN ---- */
  #menu-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: max(80px, env(safe-area-inset-top));
    pointer-events: auto;
    z-index: 20;
    background: radial-gradient(ellipse at 50% 30%, rgba(35, 55, 110, 0.35) 0%, rgba(10, 10, 26, 0.96) 70%);
    -webkit-backdrop-filter: blur(25px);
    backdrop-filter: blur(25px);
    transition: opacity 0.35s, transform 0.35s;
  }
  #menu-screen.hide {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }

  .menu-logo {
    text-align: center;
    margin-bottom: 35px;
  }
  .menu-logo h1 {
    font-size: 44px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #FFFFFF 0%, #6BCB77 40%, #4D96FF 80%, #FF6B6B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 15px rgba(75,150,255,0.25));
  }
  .menu-logo .tag {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .btn {
    width: 80%;
    max-width: 280px;
    padding: 16px 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 5px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    pointer-events: auto;
    background: linear-gradient(135deg, #6BCB77 0%, #4D96FF 100%);
    color: #fff;
    box-shadow: 0 6px 25px rgba(75,150,255,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
  }
  .btn:active {
    transform: scale(0.96);
    box-shadow: 0 3px 15px rgba(75,150,255,0.25);
  }
  .btn:active::after { left: 100%; }

  .menu-best {
    margin-top: 20px;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  .menu-tap {
    margin-top: 45px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    letter-spacing: 2px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.18} 50%{opacity:0.45} }

  /* ---- GAME OVER SCREEN ---- */
  #go-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    pointer-events: auto;
    z-index: 20;
    background: radial-gradient(ellipse at 50% 40%, rgba(100,30,30,0.25) 0%, rgba(10,10,26,0.93) 70%);
    -webkit-backdrop-filter: blur(30px);
    backdrop-filter: blur(30px);
    opacity: 0;
    transition: opacity 0.35s;
  }
  #go-screen.show {
    display: flex;
    opacity: 1;
  }

  .go-title {
    font-size: 32px;
    font-weight: 900;
    color: #FF4757;
    letter-spacing: 6px;
    text-shadow: 0 0 25px rgba(255,71,87,0.4);
    margin-bottom: 12px;
  }

  .go-label { color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
  .go-val { font-size: 72px; font-weight: 900; color: #fff; line-height: 1.1; margin: 2px 0; }
  .go-best-val { color: rgba(255,255,255,0.45); font-size: 16px; font-weight: 700; margin-bottom: 6px; }

  .new-best {
    color: #FFD700;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 22px;
    opacity: 0;
  }
  .new-best.show { opacity: 1; animation: bpulse 1s infinite; }
  @keyframes bpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

  .go-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 25px;
  }
  .go-stat { text-align: center; }
  .go-stat .v { font-size: 22px; font-weight: 800; color: #fff; }
  .go-stat .l { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  /* ---- SHAKE ---- */
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    15% { transform: translate(-8px, 4px); }
    30% { transform: translate(7px, -3px); }
    45% { transform: translate(-6px, 3px); }
    60% { transform: translate(5px, -2px); }
    75% { transform: translate(-3px, 2px); }
  }
  .shake { animation: shake 0.45s ease-out; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui-overlay">
  <div id="score-display">0</div>
  <div id="highscore-display">BEST 0</div>
  <div id="combo-display"></div>
  <div id="perfect-text">PERFECT!</div>
</div>

<div id="flash"></div>

<div id="menu-screen">
  <div class="menu-logo">
    <h1>STACK<br>TOWER</h1>
    <div class="tag">Tap to Build</div>
  </div>
  <button class="btn" id="btn-start">START</button>
  <div class="menu-best" id="menu-best"></div>
  <div class="menu-tap">TAP ANYWHERE TO STACK</div>
</div>

<div id="go-screen">
  <div class="go-title">GAME OVER</div>
  <div class="go-label">SCORE</div>
  <div class="go-val" id="go-score">0</div>
  <br>
  <div class="go-label">BEST SCORE</div>
  <div class="go-best-val" id="go-best">0</div>
  <div class="new-best" id="go-newbest">⭐ NEW BEST ⭐</div>
  <div class="go-stats">
    <div class="go-stat"><div class="v" id="go-combo">0</div><div class="l">MAX COMBO</div></div>
    <div class="go-stat"><div class="v" id="go-perf">0</div><div class="l">PERFECTS</div></div>
  </div>
  <button class="btn" id="btn-retry">RETRY</button>
</div>

<script>
/* ============================================
   STACK TOWER — Mobile Optimized
   ============================================ */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

// UI refs
const $score = document.getElementById('score-display');
const $best = document.getElementById('highscore-display');
const $combo = document.getElementById('combo-display');
const $perf = document.getElementById('perfect-text');
const $flash = document.getElementById('flash');
const $menu = document.getElementById('menu-screen');
const $go = document.getElementById('go-screen');

// ---- MOBILE DETECTION & SETUP ----
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 1.5); // cap DPR for performance

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = W * dpr;
  cvs.height = H * dpr;
  cvs.style.width = W + 'px';
  cvs.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---- AUDIO (Web Audio API — lightweight) ----
let aCtx = null;
function initAudio() {
  if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (aCtx.state === 'suspended') aCtx.resume();
}

function tone(freq, dur, type, vol, delay) {
  if (!aCtx) return;
  const t = aCtx.currentTime + (delay || 0);
  const o = aCtx.createOscillator();
  const g = aCtx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol || 0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(aCtx.destination);
  o.start(t); o.stop(t + dur);
}

const SFX = {
  drop: () => tone(260, 0.05, 'square', 0.05),
  slice: () => { if(!aCtx)return; const t=aCtx.currentTime, o=aCtx.createOscillator(), g=aCtx.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(700,t); o.frequency.exponentialRampToValueAtTime(150,t+0.1); g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1); o.connect(g); g.connect(aCtx.destination); o.start(t); o.stop(t+0.1); },
  perfect: () => { tone(523,0.1,'sine',0.12,0); tone(659,0.1,'sine',0.12,0.07); tone(784,0.18,'sine',0.14,0.14); tone(1047,0.25,'sine',0.08,0.22); },
  combo: (n) => { tone(580+n*35,0.08,'sine',0.09,0); tone(730+n*35,0.1,'sine',0.09,0.05); },
  over: () => { [320,280,230,160].forEach((f,i)=>tone(f,0.18,'sawtooth',0.08,i*0.11)); }
};

function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ---- COLORS ----
const PAL = [
  ['#FF6B6B','#FFA07A','#FFD93D','#6BCB77','#4D96FF'],
  ['#9B59B6','#FF6B9D','#C44569','#574B90','#F8B500'],
  ['#0ABDE3','#10AC84','#EE5A24','#F79F1F','#A3CB38'],
  ['#D980FA','#B53471','#009432','#0652DD','#1B1464'],
];
function getCol(i) { const p=PAL[Math.floor(i/5)%PAL.length]; return p[i%p.length]; }
function rgb(c) { return { r:parseInt(c.slice(1,3),16), g:parseInt(c.slice(3,5),16), b:parseInt(c.slice(5,7),16) }; }
function lighter(c,n) { const {r,g,b}=rgb(c); return '#'+[r+n,g+n,b+n].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join(''); }
function darker(c,n) { const {r,g,b}=rgb(c); return '#'+[r-n,g-n,b-n].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join(''); }

// ---- CONSTANTS (tuned for mobile) ----
const BH = Math.round(H * 0.038);          // block height ~3.8% of screen
const PERFECT = 6;                           // px threshold
const BASE_SPD = 3;
const SPD_INC = 0.12;
const MAX_SPD = 10;
const INIT_W = Math.round(W * 0.42);
const MIN_W = 14;

// ---- STATE ----
const ST = { MENU:0, PLAY:1, OVER:2 };
let state = ST.MENU;
let score = 0, hi = parseInt(localStorage.getItem('stkHi')||'0');
let combo = 0, maxCombo = 0, nPerfect = 0;

let blocks = [], mov = null, falls = [], parts = [];
let camY = 0, tgtCam = 0;
let shakeX = 0, shakeY = 0, shakeV = 0;
let hue = 220, tgtHue = 220;
let flashAlpha = 0;
let stars = [];
let t = 0;

// ---- STARS (lightweight) ----
function mkStars() {
  stars = [];
  for (let i = 0; i < 45; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H*2.5, s: Math.random()*1.3+0.4, p: Math.random()*6.28 });
  }
}
mkStars(); window.addEventListener('resize', mkStars);

// ---- BLOCK ----
class Block {
  constructor(x, y, w, c) {
    this.x = x; this.y = y; this.w = w; this.h = BH; this.c = c;
    this.glow = 0;
  }
  draw() {
    const sy = this.y - camY;
    if (sy < -BH-10 || sy > H+10) return;
    const {r,g,b} = rgb(this.c);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.13)';
    ctx.fillRect(this.x+2, sy+2, this.w, this.h);
    // body
    const gr = ctx.createLinearGradient(0, sy, 0, sy+this.h);
    gr.addColorStop(0, lighter(this.c, 35));
    gr.addColorStop(0.5, this.c);
    gr.addColorStop(1, darker(this.c, 30));
    ctx.fillStyle = gr;
    ctx.fillRect(this.x, sy, this.w, this.h);
    // highlights
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(this.x, sy, this.w, 2);
    ctx.fillRect(this.x, sy, 2, this.h);
    // glow
    if (this.glow > 0) {
      const a = this.glow / 35;
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20*a;
      ctx.fillStyle = `rgba(255,215,0,${a*0.15})`;
      ctx.fillRect(this.x-3, sy-3, this.w+6, this.h+6);
      ctx.shadowBlur = 0; this.glow--;
    }
  }
}

// ---- FALL ----
class Fall {
  constructor(x,y,w,h,c) { this.x=x;this.y=y;this.w=w;this.h=h;this.c=c;this.vy=0;this.vx=(Math.random()-0.5)*3;this.r=0;this.vr=(Math.random()-0.5)*0.07;this.a=1; }
  update() { this.vy+=0.5; this.y+=this.vy; this.x+=this.vx; this.r+=this.vr; this.a-=0.016; }
  draw() {
    if(this.a<=0) return;
    const sy=this.y-camY;
    ctx.save(); ctx.globalAlpha=this.a;
    ctx.translate(this.x+this.w/2, sy+this.h/2); ctx.rotate(this.r);
    ctx.fillStyle=this.c; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(-this.w/2,-this.h/2,this.w,2);
    ctx.restore();
  }
}

// ---- PARTICLE ----
class Part {
  constructor(x,y,c) {
    this.x=x; this.y=y; this.c=c;
    const a=Math.random()*6.28, s=Math.random()*4.5+1.5;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-2;
    this.sz=Math.random()*4+1.5; this.a=1; this.life=Math.random()*35+20;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.a-=1/this.life; this.sz*=0.96; }
  draw() {
    if(this.a<=0) return;
    ctx.save(); ctx.globalAlpha=this.a;
    ctx.fillStyle=this.c;
    ctx.beginPath(); ctx.arc(this.x, this.y-camY, this.sz, 0, 6.28); ctx.fill();
    ctx.restore();
  }
}

// ---- INIT ----
function init() {
  score=0; combo=0; maxCombo=0; nPerfect=0;
  blocks=[]; falls=[]; parts=[];
  camY=0; tgtCam=0; shakeV=0; flashAlpha=0; t=0;
  resize();

  const bx = (W - INIT_W) / 2;
  const by = H * 0.68;
  blocks.push(new Block(bx, by, INIT_W, getCol(0)));
  spawn();
  ui();
}

function spawn() {
  const last = blocks[blocks.length-1];
  const spd = Math.min(BASE_SPD + score * SPD_INC, MAX_SPD);
  const dir = score % 2 === 0 ? 1 : -1;
  mov = { x: dir===1 ? -last.w : W, y: last.y - BH, w: last.w, h: BH, spd, dir, c: getCol(score), alive: true };
  tgtCam = mov.y - H * 0.32;
}

// ---- DROP ----
function doDrop() {
  if (!mov || !mov.alive) return;
  initAudio();
  SFX.drop();

  const last = blocks[blocks.length-1];
  const m = mov;
  const os = Math.max(m.x, last.x);
  const oe = Math.min(m.x + m.w, last.x + last.w);
  const ov = oe - os;

  if (ov <= 0) { gameOver(m); return; }

  const isPerf = Math.abs(m.x - last.x) < PERFECT && ov < last.w * 0.08;
  let nw, nx;

  if (isPerf) {
    nw = last.w; nx = last.x;
    combo++; if (combo>maxCombo) maxCombo=combo;
    nPerfect++;
    SFX.perfect();
    flashScreen(0.35);
    burst(nx+nw/2, m.y, '#FFD700', 22);
    burst(nx+nw/2, m.y, '#FFFFFF', 10);
    showPerf();
    if (combo >= 2) { SFX.combo(combo); showCombo(combo); }
    vib(20);
  } else {
    combo = 0; hideCombo();
    SFX.slice();
    if (m.x < last.x) {
      nw = ov; nx = last.x;
      falls.push(new Fall(m.x, m.y, last.x-m.x, BH, m.c));
    } else {
      nw = ov; nx = os;
      falls.push(new Fall(oe, m.y, (m.x+m.w)-oe, BH, m.c));
    }
  }

  if (nw < MIN_W) { gameOver(m); return; }

  const nb = new Block(nx, m.y, nw, m.c);
  if (isPerf) nb.glow = 35;
  blocks.push(nb);
  score++;
  ui();
  tgtHue = (220 + score * 7) % 360;
  spawn();
}

function gameOver(m) {
  state = ST.OVER;
  SFX.over();
  shakeV = 14;
  vib([50,40,50]);
  if (m.alive) falls.push(new Fall(m.x, m.y, m.w, m.h, m.c));

  const isNew = score > hi;
  if (isNew) { hi = score; localStorage.setItem('stkHi',''+hi); }

  setTimeout(() => {
    document.getElementById('go-score').textContent = score;
    document.getElementById('go-best').textContent = hi;
    document.getElementById('go-newbest').className = isNew ? 'new-best show' : 'new-best';
    document.getElementById('go-combo').textContent = maxCombo;
    document.getElementById('go-perf').textContent = nPerfect;
    $go.classList.add('show');
  }, 600);

  m.alive = false; mov = null;
}

// ---- UI ----
function ui() {
  $score.textContent = score;
  $best.textContent = 'BEST ' + hi;
  $score.classList.add('bump');
  setTimeout(() => $score.classList.remove('bump'), 100);
}
function showPerf() {
  $perf.textContent = 'PERFECT!';
  $perf.className = '';
  void $perf.offsetWidth;
  $perf.className = 'pop';
}
function showCombo(n) { $combo.textContent = '🔥 ×'+n; $combo.className = 'show'; }
function hideCombo() { $combo.className = ''; }
function flashScreen(a) {
  $flash.style.background = 'rgba(255,215,0,' + a + ')';
  $flash.style.opacity = 1;
  setTimeout(() => { $flash.style.opacity = 0; }, 70);
}

// ---- DRAW ----
function draw() {
  t++;
  ctx.clearRect(0, 0, W, H);

  // BG
  hue += (tgtHue - hue) * 0.015;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, `hsl(${hue},30%,5%)`);
  bg.addColorStop(1, `hsl(${(hue+25)%360},25%,8%)`);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Stars (parallax)
  for (const s of stars) {
    s.p += 0.018;
    const a = 0.2 + Math.sin(s.p)*0.25;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    let sy = ((s.y - camY*0.15) % (H*2.5) + H*2.5) % (H*2.5);
    if (sy > H) sy -= H;
    ctx.beginPath(); ctx.arc(s.x, sy, s.s, 0, 6.28); ctx.fill();
  }

  ctx.save();

  // Camera + shake
  camY += (tgtCam - camY) * 0.085;
  if (shakeV > 0) {
    shakeX = (Math.random()-0.5)*shakeV;
    shakeY = (Math.random()-0.5)*shakeV;
    shakeV *= 0.87;
    if (shakeV < 0.4) { shakeV=0; shakeX=0; shakeY=0; }
    ctx.translate(shakeX, shakeY);
  }

  // Blocks
  for (const b of blocks) b.draw();

  // Guide
  if (mov && mov.alive && blocks.length) {
    const last = blocks[blocks.length-1];
    const sy = mov.y - camY;
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(last.x, sy); ctx.lineTo(last.x, sy+BH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(last.x+last.w, sy); ctx.lineTo(last.x+last.w, sy+BH); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Moving block
  if (mov && mov.alive) {
    const sy = mov.y - camY;
    const {r,g,b} = rgb(mov.c);
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    ctx.fillRect(mov.x+3, sy+3, mov.w, mov.h);
    const gr = ctx.createLinearGradient(0,sy,0,sy+mov.h);
    gr.addColorStop(0, lighter(mov.c,35));
    gr.addColorStop(0.5, mov.c);
    gr.addColorStop(1, darker(mov.c,30));
    ctx.fillStyle = gr;
    ctx.fillRect(mov.x, sy, mov.w, mov.h);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(mov.x, sy, mov.w, 2);
    ctx.fillRect(mov.x, sy, 2, mov.h);
    ctx.shadowColor = mov.c; ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(mov.x, sy, mov.w, mov.h);
    ctx.shadowBlur = 0;
  }

  // Falls
  for (let i=falls.length-1; i>=0; i--) {
    falls[i].update();
    falls[i].draw();
    if (falls[i].a<=0 || falls[i].y-camY > H+150) falls.splice(i,1);
  }

  // Particles
  for (let i=parts.length-1; i>=0; i--) {
    parts[i].update();
    parts[i].draw();
    if (parts[i].a<=0) parts.splice(i,1);
  }

  ctx.restore();
}

function burst(cx, cy, c, n) {
  for (let i=0; i<n; i++) parts.push(new Part(cx, cy, c));
}

// ---- LOOP ----
function loop() {
  if (state===ST.PLAY && mov && mov.alive) {
    mov.x += mov.spd * mov.dir;
    if (mov.dir===1 && mov.x > W+mov.w*0.35) mov.dir=-1;
    else if (mov.dir===-1 && mov.x < -mov.w*0.35) mov.dir=1;
  }
  draw();
  requestAnimationFrame(loop);
}

// ---- INPUT ----
function doGameTap(e) {
  if (state === ST.PLAY) doDrop();
}

document.addEventListener('touchstart', e => {
  if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
  e.preventDefault();
  doGameTap(e);
}, { passive: false });

document.addEventListener('pointerdown', e => {
  if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
  e.preventDefault();
  doGameTap(e);
}, { passive: false });

// Cegah scroll tapi biarkan tombol berfungsi
document.addEventListener('touchmove', e => {
  if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    doGameTap(e);
  }
});

// ---- BUTTONS ----
document.getElementById('btn-start').addEventListener('click', () => {
  initAudio(); init(); state = ST.PLAY;
  $menu.classList.add('hide');
  $go.classList.remove('show');
});

document.getElementById('btn-retry').addEventListener('click', () => {
  init(); state = ST.PLAY;
  $go.classList.remove('show');
});

// ---- INIT ----
function boot() {
  resize();
  $best.textContent = 'BEST ' + hi;
  if (hi > 0) document.getElementById('menu-best').textContent = '🏆 ' + hi;
  loop();
}
boot();
</script>
