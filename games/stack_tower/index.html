<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STACK TOWER</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
  <div id="score-display">0</div>
  <div id="highscore-display">BEST 0</div>
  <div id="combo-display"></div>
  <div id="perfect-text">PERFECT!</div>
</div>

<div id="flash-overlay"></div>

<div id="menu-screen">
  <div class="logo-container">
    <h1>STACK<br>TOWER</h1>
    <div class="sub">Precision Stacking</div>
  </div>
  <button class="btn-main" id="startBtn">START</button>
  <div id="menu-highscore"></div>
  <div class="tap-hint">TAP ANYWHERE TO STACK</div>
</div>

<div id="gameover-screen">
  <div class="go-title">GAME OVER</div>
  <div class="go-score-label">SCORE</div>
  <div class="go-score" id="final-score">0</div>
  <div class="go-best-label">BEST</div>
  <div class="go-best" id="final-best">0</div>
  <div class="new-best" id="new-best">⭐ NEW BEST ⭐</div>
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="stat-max-combo">0</div><div class="lbl">MAX COMBO</div></div>
    <div class="stat-box"><div class="val" id="stat-perfects">0</div><div class="lbl">PERFECTS</div></div>
  </div>
  <button class="btn-main" id="retryBtn">RETRY</button>
</div>

<script src="script.js" defer></script>
</body>
</html>
