<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNO Mini</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --red:#e74c3c;--yellow:#f1c40f;--green:#2ecc71;--blue:#3498db;
  --dark:#2c3e50;--light:#ecf0f1;--bg1:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  display:flex;justify-content:center;align-items:center;
}
#game{
  width:100vw;height:100vh;height:100dvh;
  max-width:430px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}

/* === TOP BAR === */
#topBar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);z-index:10;flex-shrink:0;
}
#topBar .title{color:#fff;font-weight:700;font-size:18px;letter-spacing:1px}
#topBar .title span{color:var(--yellow)}

/* === AI AREA === */
#aiArea{
  padding:10px 12px;flex-shrink:0;
  display:flex;flex-direction:column;gap:6px;
}
.ai-row{display:flex;align-items:center;gap:8px}
.ai-label{
  color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;
  min-width:36px;text-align:right;
}
.ai-cards{
  display:flex;gap:0;overflow:hidden;flex:1;
}
.ai-card-back{
  width:28px;height:42px;flex-shrink:0;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  border-radius:5px;margin-left:-8px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:rgba(255,255,255,0.5);font-weight:700;
  border:1px solid rgba(255,255,255,0.2);
  transition:all .3s;
}
.ai-card-back:first-child{margin-left:0}
.ai-count{
  color:rgba(255,255,255,0.6);font-size:16px;min-width:24px;
}

/* === CENTER AREA === */
#centerArea{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  position:relative;padding:10px;
}
#pileArea{
  display:flex;gap:30px;align-items:center;justify-content:center;
}
#drawPile{
  width:80px;height:115px;
  background:linear-gradient(135deg,#2c3e50,#34495e);
  border-radius:12px;border:2px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  transition:transform .15s;
}
#drawPile:active{transform:scale(0.95)}
#drawPile::after{
  content:'🂠';font-size:32px;opacity:0.3;
}
#drawPile .label{
  position:absolute;bottom:6px;font-size:9px;
  color:rgba(255,255,255,0.5);font-weight:600;
}
#discardPile{
  width:80px;height:115px;
  border-radius:12px;position:relative;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
#discardCard{
  width:100%;height:100%;border-radius:12px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-weight:800;color:#fff;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
#discardCard .card-corner{
  position:absolute;font-size:10px;font-weight:700;
}
#discardCard .corner-tl{top:4px;left:6px}
#discardCard .corner-br{bottom:4px;right:6px;transform:rotate(180deg)}
#discardCard .card-center{font-size:28px}
#discardCard.wild-card{
  background:linear-gradient(135deg,#e74c3c,#f1c40f,#2ecc71,#3498db) !important;
}

/* Color indicator */
#colorIndicator{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.5);
  transition:background .3s;
}
#currentColorText{
  color:rgba(255,255,255,0.5);font-size:10px;
}

/* === COLOR PICKER === */
#colorPicker{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9);border-radius:20px;
  padding:20px;z-index:100;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
#colorPicker.show{display:flex;flex-direction:column;align-items:center;gap:12px}
#colorPicker .cp-title{color:#fff;font-size:14px;font-weight:600}
#colorPicker .cp-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
#colorPicker .cp-btn{
  width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);
  cursor:pointer;transition:transform .15s;
}
#colorPicker .cp-btn:active{transform:scale(0.9)}
.cp-btn.red{background:var(--red)}.cp-btn.yellow{background:var(--yellow)}
.cp-btn.green{background:var(--green)}.cp-btn.blue{background:var(--blue)}

/* === MESSAGE OVERLAY === */
#messageOverlay{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:200;
  background:rgba(0,0,0,0.85);border-radius:16px;
  padding:20px 30px;text-align:center;
  animation:popIn .3s ease;
}
#messageOverlay.show{display:block}
#messageOverlay .msg-text{color:#fff;font-size:20px;font-weight:700}
#messageOverlay .msg-sub{color:rgba(255,255,255,0.6);font-size:12px;margin-top:6px}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.5);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* === PLAYER HAND === */
#playerArea{
  flex-shrink:0;padding:8px 0;
  background:linear-gradient(0deg,rgba(0,0,0,0.5),transparent);
}
#handContainer{
  display:flex;gap:0;overflow-x:auto;overflow-y:hidden;
  padding:8px 16px;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#handContainer::-webkit-scrollbar{display:none}
.hand-card{
  width:60px;height:85px;flex-shrink:0;
  border-radius:10px;margin-left:-15px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  transition:all .2s;border:3px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.hand-card:first-child{margin-left:0}
.hand-card.valid{
  border-color:rgba(255,255,255,0.8);
  box-shadow:0 0 12px rgba(255,255,255,0.4);
}
.hand-card.valid:active{transform:translateY(-10px)}
.hand-card.invalid{opacity:0.5}
.hand-card .card-corner{position:absolute;font-size:9px;font-weight:700;color:#fff}
.hand-card .corner-tl{top:3px;left:5px}
.hand-card .corner-br{bottom:3px;right:5px;transform:rotate(180deg)}
.hand-card .card-center{font-size:20px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
.hand-card.wild{
  background:linear-gradient(135deg,#e74c3c,#f1c40f,#2ecc71,#3498db) !important;
}
.hand-card.red{background:var(--red)}.hand-card.yellow{background:var(--yellow)}
.hand-card.green{background:var(--green)}.hand-card.blue{background:var(--blue)}

/* Action Cards - Grey Solid */
.hand-card.action-card{
  background:linear-gradient(135deg,#000000,#000000)!important;
  border:0px solid #ffffff;
}
.gray-card{background:linear-gradient(135deg,#000000,#000000)!important;border:0px solid #ffffff;}

/* Flying Card Animation */
.flying-card{
  position:fixed;
  width:60px;
  height:85px;
  border-radius:10px;
  pointer-events:none;
  z-index:1000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
}

@keyframes bounceIn{
  from{transform:scale(0);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* === ACTION BUTTONS === */
#actionBar{
  display:flex;justify-content:center;gap:12px;
  padding:10px 16px 20px;flex-shrink:0;
  background:linear-gradient(0deg,rgba(0,0,0,0.6),transparent);
}
.action-btn{
  padding:10px 20px;border-radius:25px;border:none;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;letter-spacing:0.5px;
  box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
.action-btn:active{transform:scale(0.95)}
.action-btn:disabled{opacity:0.3;transform:none;cursor:not-allowed}
#btnDraw{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
#btnUno{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;animation:unoPulse 1s infinite}
#btnPass{background:linear-gradient(135deg,#95a5a6,#7f8c8d);color:#fff}
@keyframes unoPulse{0%,100%{box-shadow:0 3px 10px rgba(231,76,60,0.3)}50%{box-shadow:0 3px 20px rgba(231,76,60,0.6)}}

/* === UNO BUTTON (floating) === */
#unoFloating{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#e74c3c,#c0392b);
  color:#fff;font-size:22px;font-weight:900;
  display:none;align-items:center;justify-content:center;
  z-index:150;cursor:pointer;
  box-shadow:0 0 30px rgba(231,76,60,0.6);
  animation:unoFloat .5s ease;
}
#unoFloating.show{display:flex}
@keyframes unoFloat{from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1)}}

/* === SCREENS === */
.screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;background:linear-gradient(135deg,var(--bg1),var(--bg2));
  gap:20px;padding:30px;
}
.screen.hidden{display:none}
.screen h1{color:#fff;font-size:42px;font-weight:900;letter-spacing:2px}
.screen h1 span{color:var(--yellow)}
.screen p{color:rgba(255,255,255,0.6);font-size:14px;text-align:center;line-height:1.6}
.btn-start{
  padding:16px 50px;border-radius:30px;border:none;
  background:linear-gradient(135deg,var(--green),#27ae60);
  color:#fff;font-size:18px;font-weight:700;cursor:pointer;
  box-shadow:0 5px 20px rgba(46,204,113,0.4);
  transition:transform .15s;
}
.btn-start:active{transform:scale(0.95)}
.btn-restart{
  padding:12px 40px;border-radius:25px;border:none;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
}
.ai-select{display:flex;gap:12px;margin:10px 0}
.ai-select button{
  padding:10px 18px;border-radius:15px;border:2px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);color:#fff;font-size:14px;
  font-weight:600;cursor:pointer;transition:all .15s;
}
.ai-select button.selected{border-color:var(--yellow);background:rgba(241,196,15,0.2)}
.ai-select button:active{transform:scale(0.95)}

/* === ANIMATIONS === */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(255,255,255,0.3)}50%{box-shadow:0 0 20px rgba(255,255,255,0.6)}}

/* === SCORE === */
#scoreBar{
  display:flex;justify-content:space-around;
  padding:4px 12px;background:rgba(0,0,0,0.2);flex-shrink:0;
}
#scoreBar span{color:rgba(255,255,255,0.6);font-size:11px;font-weight:600}
#scoreBar .score-val{color:#fff}

/* === DIRECTION INDICATOR === */
#direction{
  position:absolute;top:8px;right:12px;
  color:rgba(255,255,255,0.4);font-size:16px;
}

/* === CENTER TURN INDICATOR === */
#centerTurnIndicator{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:8px 0;
  min-height:40px;
}
.center-turn-text{
  background:linear-gradient(135deg,var(--green),#27ae60);
  color:#fff;
  padding:8px 20px;
  border-radius:20px;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  box-shadow:0 4px 15px rgba(46,204,113,0.4);
  transition:all .3s;
  animation:bounceIn .4s ease;
}
.center-turn-text.ai{
  background:linear-gradient(135deg,#e74c3c,#c0392b);
  box-shadow:0 4px 15px rgba(231,76,60,0.4);
}
@keyframes bounceIn{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
  <h1>UNO <span>MOBILE</span></h1>
  <p>Mainkan kartu, habiskan duluan!<br>Jangan lupa teriak UNO! 🔴</p>
  <div style="margin:8px 0">
    <p style="margin-bottom:8px">Jumlah AI:</p>
    <div class="ai-select">
      <button onclick="selectAI(1)" class="selected">1</button>
      <button onclick="selectAI(2)">2</button>
      <button onclick="selectAI(3)">3</button>
    </div>
  </div>
  <button class="btn-start" onclick="startGame()">MULAI 🚀</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" class="screen hidden">
  <h1 id="resultTitle">🎉 MENANG!</h1>
  <p id="resultText">Kamu menghabiskan semua kartu!</p>
  <p id="resultScore" style="color:var(--yellow);font-weight:600"></p>
  <button class="btn-start" onclick="restartGame()">MAIN LAGI 🔄</button>
</div>

<!-- GAME CONTAINER -->
<div id="game" style="display:none">
  <!-- Top Bar -->
  <div id="topBar">
  <div class="bar-left">
    <div class="title">UNO <span>MOBILE</span></div>
    <div id="direction"></div>
  </div>
</div>

  <!-- Score Bar -->
  <div id="scoreBar">
    <span>Kamu: <span class="score-val" id="scorePlayer">0</span></span>
    <span id="aiScores"></span>
  </div>

  <!-- AI Area -->
  <div id="aiArea"></div>

  <!-- Center -->
  <div id="centerArea">
    <!-- NEW: Turn Indicator (Center Screen) -->
    <div id="centerTurnIndicator">
        <div class="center-turn-text player" id="turnText">Giliranmu!</div>
    </div>
    <div id="pileArea">
      <div id="drawPile" onclick="playerDraw()">
        <span class="label">DRAW</span>
      </div>
      <div id="discardPile">
        <div id="discardCard"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div id="colorIndicator"></div>
      <span id="currentColorText"></span>
    </div>
    <!-- Color Picker -->
    <div id="colorPicker">
      <div class="cp-title">Pilih Warna</div>
      <div class="cp-grid">
        <button class="cp-btn red" onclick="pickColor('red')"></button>
        <button class="cp-btn yellow" onclick="pickColor('yellow')"></button>
        <button class="cp-btn green" onclick="pickColor('green')"></button>
        <button class="cp-btn blue" onclick="pickColor('blue')"></button>
      </div>
    </div>
  </div>

  <!-- Player Hand -->
  <div id="playerArea">
    <div id="handContainer"></div>
  </div>

  <!-- Action Buttons -->
  <div id="actionBar">
    <button class="action-btn" id="btnDraw" onclick="playerDraw()">🎴 Draw</button>
    <button class="action-btn" id="btnUno" onclick="callUno()" disabled>🔴 UNO!</button>
    <button class="action-btn" id="btnPass" onclick="playerPass()" disabled>⏭️ Pass</button>
  </div>

  <!-- UNO Floating -->
  <div id="unoFloating" onclick="callUno()">UNO!</div>
</div>

<!-- Message Overlay -->
<div id="messageOverlay">
  <div class="msg-text" id="msgText"></div>
  <div class="msg-sub" id="msgSub"></div>
</div>

<script>
// ============ GAME STATE ============
let G = {
  deck: [], discard: [], drawPile: [],
  players: [], // [{hand:[], name:'', isAI:false}]
  currentPlayer: 0, direction: 1,
  colorCount: 1, // number of AI opponents
  activeColor: '', activeValue: '',
  phase: 'idle', // idle, playing, drawing, choosing, gameover
  pendingDraw: 0, // cumulative draw from +2/+4
  playerCalledUno: false,
  scores: [0, 0, 0, 0],
  drawOnce: false, // after drawing one card, can play or pass
  turnTimer: null,
  audioEnabled: true
};

const COLORS = ['red','yellow','green','blue'];
const COLOR_EMOJI = {red:'🔴',yellow:'🟡',green:'🟢',blue:'🔵'};
const COLOR_HEX = {red:'#e74c3c',yellow:'#f1c40f',green:'#2ecc71',blue:'#3498db'};

// ============ AUDIO SYSTEM (Web Audio API) ============
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playSound(type) {
  if (!G.audioEnabled) return;
  
  const ctx = initAudio();
  if (!ctx) return;
  
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  
  switch(type) {
    case 'draw':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start();
      osc.stop(ctx.currentTime + 0.1);
      break;
      
    case 'play':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(520, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(700, ctx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
      break;
      
    case 'undo':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start();
      osc.stop(ctx.currentTime + 0.2);
      break;
      
    case 'uno':
      osc.type = 'square';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
      break;
      
    case 'skip':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
      break;
      
    case 'reverse':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.3);
      gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
      break;
      
    case 'draw2':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(350, ctx.currentTime);
      osc.frequency.setValueAtTime(450, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(550, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
      break;
      
    case 'wild':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
      break;
      
    case 'wild4':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.4);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);
      break;
      
    case 'win':
      osc.type = 'square';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(587, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.3);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.45);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
      osc.start();
      osc.stop(ctx.currentTime + 0.6);
      break;
      
    case 'lose':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.4);
      gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
      break;
      
    case 'error':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
      break;
  }
}

// ============ DECK GENERATION ============
function createDeck() {
  let deck = [];
  let id = 0;
  for (let c of COLORS) {
    deck.push({id:id++, color:c, type:'number', value:'0', display:'0'});
    for (let n = 1; n <= 9; n++) {
      deck.push({id:id++, color:c, type:'number', value:String(n), display:String(n)});
      deck.push({id:id++, color:c, type:'number', value:String(n), display:String(n)});
    }
    deck.push({id:id++, color:c, type:'skip', value:'skip', display:'🚫'});
    deck.push({id:id++, color:c, type:'skip', value:'skip', display:'🚫'});
    deck.push({id:id++, color:c, type:'reverse', value:'reverse', display:'🔁'});
    deck.push({id:id++, color:c, type:'reverse', value:'reverse', display:'🔁'});
    deck.push({id:id++, color:c, type:'draw2', value:'draw2', display:'+2'});
    deck.push({id:id++, color:c, type:'draw2', value:'draw2', display:'+2'});
  }
  for (let i = 0; i < 4; i++) {
    deck.push({id:id++, color:'wild', type:'wild', value:'wild', display:'🌈'});
    deck.push({id:id++, color:'wild', type:'wild4', value:'wild4', display:'+4'});
  }
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============ GAME INIT ============
let aiCount = 1;

function selectAI(n) {
  aiCount = n;
  document.querySelectorAll('.ai-select button').forEach((b, i) => {
    b.classList.toggle('selected', i + 1 === n);
  });
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('game').style.display = 'flex';
  document.getElementById('gameOverScreen').classList.add('hidden');
  initGame();
  initAudio();
  setTimeout(() => playSound('undo'), 300);
}

function restartGame() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  initGame();
  playSound('undo');
}

function initGame() {
  G.deck = shuffle(createDeck());
  G.discard = [];
  G.players = [];
  G.currentPlayer = 0;
  G.direction = 1;
  G.pendingDraw = 0;
  G.playerCalledUno = false;
  G.drawOnce = false;
  G.phase = 'idle';
  G.scores = [0, 0, 0, 0];

  G.players.push({hand: [], name: 'Kamu', isAI: false});
  for (let i = 0; i < aiCount; i++) {
    G.players.push({hand: [], name: `AI ${i+1}`, isAI: true});
  }

  for (let p of G.players) {
    p.hand = G.deck.splice(0, 7);
  }

  let firstCard = G.deck.shift();
  while (firstCard.type === 'wild' || firstCard.type === 'wild4') {
    G.deck.push(firstCard);
    shuffle(G.deck);
    firstCard = G.deck.shift();
  }
  G.discard.push(firstCard);
  G.activeColor = firstCard.color;
  G.activeValue = firstCard.value;

  if (firstCard.type === 'skip' || firstCard.type === 'reverse') {
    G.currentPlayer = 0;
  } else if (firstCard.type === 'draw2') {
    G.pendingDraw = 2;
  }

  updateUI();
  showMessage('Game Dimulai! 🎉', 'Habiskan semua kartu!', 1200);

  if (G.players[0].isAI) {
    setTimeout(() => aiTurn(), 800);
  }
}

// ============ GAME LOGIC ============
function canPlay(hand, color, value) {
  return hand.some(c => isValidCard(c, color, value));
}

function isValidCard(card, color, value) {
  if (card.type === 'wild' || card.type === 'wild4') return true;
  if (card.color === color) return true;
  if (card.value === value) return true;
  return false;
}

function getValidCards(hand) {
  return hand.filter(c => isValidCard(c, G.activeColor, G.activeValue));
}

function canPlayAny(playerIdx) {
  if (G.pendingDraw > 0) {
    return G.players[playerIdx].hand.some(c =>
      (c.type === 'draw2' && G.activeValue === 'draw2') ||
      (c.type === 'wild4' && G.activeValue === 'wild4')
    );
  }
  return canPlay(G.players[playerIdx].hand, G.activeColor, G.activeValue);
}

function drawCards(playerIdx, count) {
  for (let i = 0; i < count; i++) {
    if (G.deck.length === 0) {
      if (G.discard.length <= 1) break;
      let top = G.discard.pop();
      G.deck = shuffle(G.discard);
      G.discard = [top];
    }
    if (G.deck.length > 0) {
      G.players[playerIdx].hand.push(G.deck.pop());
    }
  }
}

function nextPlayer() {
  let n = G.players.length;
  G.currentPlayer = (G.currentPlayer + G.direction + n) % n;
}

function playCard(playerIdx, cardIdx, animate = true) {
  let player = G.players[playerIdx];
  let card = player.hand[cardIdx];
  
  if (animate && playerIdx === 0) {
    // Show flying card animation
    showFlyingCardAnimation(cardIdx);
  }

  player.hand.splice(cardIdx, 1);
  G.discard.push(card);
  G.activeValue = card.value;

  if (card.type === 'wild' || card.type === 'wild4') {
    if (card.type === 'wild4') G.pendingDraw += 4;
    if (card.type === 'wild4') playSound('wild4');
    else playSound('wild');
    
    if (player.isAI) {
      let colorCounts = {red:0,yellow:0,green:0,blue:0};
      player.hand.forEach(c => { if(c.color !== 'wild') colorCounts[c.color]++; });
      let best = Object.entries(colorCounts).sort((a,b)=>b[1]-a[1])[0];
      G.activeColor = best[0];
      processAction(playerIdx, card);
    } else {
      G.phase = 'choosing';
      playSound('wild');
      showColorPicker(playerIdx, card);
      return;
    }
  } else {
    G.activeColor = card.color;
    playSound('play');
    processAction(playerIdx, card);
  }
}

function processAction(playerIdx, card) {
  let n = G.players.length;

  if (card.type === 'skip') {
    playSound('skip');
    showMessage('🚫 Skip!', `${G.players[playerIdx].name} skip pemain berikutnya!`, 1000);
    nextPlayer();
    nextPlayer();
  } else if (card.type === 'reverse') {
    playSound('reverse');
    G.direction *= -1;
    showMessage('🔁 Reverse!', `Arah dibalik!`, 800);
    if (n === 2) {
      nextPlayer();
    }
    nextPlayer();
  } else if (card.type === 'draw2') {
    playSound('draw2');
    let next = (G.currentPlayer + G.direction + n) % n;
    showMessage('➕2!', `${G.players[next].name} harus draw 2!`, 1000);
    G.pendingDraw += 2;
    if (!canStack(next)) {
      setTimeout(() => {
        drawCards(next, G.pendingDraw);
        G.pendingDraw = 0;
        nextPlayer();
        afterPlay(playerIdx);
      }, 1100);
      return;
    } else {
      nextPlayer();
      afterPlay(playerIdx);
      return;
    }
  } else {
    nextPlayer();
  }

  afterPlay(playerIdx);
}

function canStack(playerIdx) {
  if (G.pendingDraw > 0) {
    if (G.activeValue === 'draw2') {
      return G.players[playerIdx].hand.some(c => c.type === 'draw2');
    } else if (G.activeValue === 'wild4') {
      return G.players[playerIdx].hand.some(c => c.type === 'wild4');
    }
  }
  return false;
}

function afterPlay(playerIdx) {
  let player = G.players[playerIdx];

  if (player.hand.length === 0) {
    endGame(playerIdx);
    return;
  }

  if (player.hand.length === 1 && !player.isAI) {
    if (!G.playerCalledUno) {
      showMessage('😱 UNO!', 'Kamu lupa teriak UNO! +2 kartu', 1500);
      playSound('error');
      drawCards(playerIdx, 2);
    }
    G.playerCalledUno = false;
  }

  if (player.hand.length === 1 && player.isAI) {
    if (Math.random() < 0.3) {
      showMessage('😱 AI Lupa UNO!', `${player.name} dapat +2!`, 1000);
      setTimeout(() => drawCards(playerIdx, 2), 500);
    }
  }

  G.pendingDraw = 0;
  G.drawOnce = false;
  updateUI();

  setTimeout(() => {
    if (G.phase === 'gameover') return;
    G.phase = 'playing';
    let cp = G.players[G.currentPlayer];
    if (cp.isAI) {
      aiTurn();
    } else {
      updateUI();
      if (!canPlayAny(G.currentPlayer)) {
        if (!G.drawOnce) {
          playerDraw();
        }
      }
    }
  }, 600);
}

function endGame(winnerIdx) {
  G.phase = 'gameover';
  let player = G.players[winnerIdx];
  G.scores[winnerIdx]++;

  if (winnerIdx === 0) {
    document.getElementById('resultTitle').textContent = '🎉 MENANG!';
    document.getElementById('resultText').textContent = 'Kamu menghabakan semua kartu!';
    playSound('win');
  } else {
    document.getElementById('resultTitle').textContent = '😢 KALAH!';
    document.getElementById('resultText').textContent = `${player.name} menang!`;
    playSound('lose');
  }
  document.getElementById('resultScore').textContent = `Skor: Kamu ${G.scores[0]} - ${player.name} ${G.scores[winnerIdx]}`;

  setTimeout(() => {
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }, 800);
}

// ============ FLYING CARD ANIMATION ============
function showFlyingCardAnimation(handIdx) {
  let card = G.players[0].hand[handIdx];
  let cardEl = document.querySelector(`.hand-card[data-idx="${handIdx}"]`);
  if (!cardEl) return;

  let rect = cardEl.getBoundingClientRect();
  let discardRect = document.getElementById('discardCard').getBoundingClientRect();
  
  let flyingCard = document.createElement('div');
  flyingCard.className = 'flying-card';
  flyingCard.innerHTML = `
    <span class="card-corner corner-tl">${card.display}</span>
    <span class="card-center">${card.display}</span>
    <span class="card-corner corner-br">${card.display}</span>
  `;
  
  if (card.type === 'number') {
    flyingCard.style.background = COLOR_HEX[card.color];
  } else if (card.type === 'wild' || card.type === 'wild4') {
    flyingCard.style.background = 'linear-gradient(135deg,#e74c3c,#f1c40f,#2ecc71,#3498db)';
  } else {
    flyingCard.style.background = 'linear-gradient(135deg,#6b7280,#9ca3af)';
  }

  flyingCard.style.left = rect.left + 'px';
  flyingCard.style.top = rect.top + 'px';
  flyingCard.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
  
  document.body.appendChild(flyingCard);

  setTimeout(() => {
    let centerX = discardRect.left + discardRect.width / 2 - 30;
    let centerY = discardRect.top + discardRect.height / 2 - 42.5;
    flyingCard.style.transition = 'all 0.4s cubic-bezier(0.47, 0, 0.745, 0.715)';
    flyingCard.style.transform = `translate(${centerX - rect.left}px, ${centerY - rect.top}px) rotate(180deg)`;
  }, 50);

  setTimeout(() => {
    flyingCard.remove();
  }, 500);
}

// ============ PLAYER ACTIONS ============
function playerDraw() {
  if (G.phase === 'gameover') return;
  if (G.currentPlayer !== 0) return;
  if (G.phase === 'choosing') return;

  playSound('draw');

  if (G.pendingDraw > 0) {
    if (!canStack(0)) {
      showMessage(`➕${G.pendingDraw}`, `Kamu harus ambil ${G.pendingDraw} kartu!`, 1000);
      drawCards(0, G.pendingDraw);
      G.pendingDraw = 0;
      G.drawOnce = false;
      nextPlayer();
      updateUI();
      setTimeout(() => {
        if (G.phase === 'gameover') return;
        G.phase = 'playing';
        if (G.players[G.currentPlayer].isAI) aiTurn();
      }, 600);
      return;
    }
    updateUI();
    return;
  }

  if (!G.drawOnce) {
    drawCards(0, 1);
    G.drawOnce = true;
    updateUI();

    let drawnCard = G.players[0].hand[G.players[0].hand.length - 1];
    if (isValidCard(drawnCard, G.activeColor, G.activeValue)) {
      document.getElementById('btnPass').disabled = false;
    } else {
      G.drawOnce = false;
      nextPlayer();
      updateUI();
      setTimeout(() => {
        if (G.phase === 'gameover') return;
        G.phase = 'playing';
        if (G.players[G.currentPlayer].isAI) aiTurn();
      }, 600);
    }
  }
}

function playerPass() {
  if (!G.drawOnce) return;
  playSound('undo');
  G.drawOnce = false;
  nextPlayer();
  updateUI();
  setTimeout(() => {
    if (G.phase === 'gameover') return;
    G.phase = 'playing';
    if (G.players[G.currentPlayer].isAI) aiTurn();
  }, 600);
}

function playPlayerCard(cardIdx) {
  if (G.phase === 'gameover') return;
  if (G.currentPlayer !== 0) return;
  if (G.phase === 'choosing') return;

  let card = G.players[0].hand[cardIdx];

  if (G.pendingDraw > 0) {
    if (!((card.type === 'draw2' && G.activeValue === 'draw2') ||
          (card.type === 'wild4' && G.activeValue === 'wild4'))) {
      shakeHand();
      playSound('error');
      return;
    }
  } else if (!isValidCard(card, G.activeColor, G.activeValue)) {
    shakeHand();
    playSound('error');
    return;
  }

  G.phase = 'playing';
  G.drawOnce = false;
  document.getElementById('btnPass').disabled = true;

  let cardEl = document.querySelector(`.hand-card[data-idx="${cardIdx}"]`);
  if (cardEl) cardEl.classList.add('playing');

  setTimeout(() => {
    playCard(0, cardIdx);
  }, 300);
}

function callUno() {
  if (G.players[0].hand.length === 2) {
    G.playerCalledUno = true;
    showMessage('🔴 UNO!', 'Siap! Satu kartu lagi!', 800);
    playSound('uno');
    document.getElementById('btnUno').disabled = true;
    document.getElementById('unoFloating').classList.remove('show');
  }
}

function pickColor(color) {
  G.activeColor = color;
  G.phase = 'playing';
  document.getElementById('colorPicker').classList.remove('show');
  let card = G.discard[G.discard.length - 1];
  processAction(0, card);
}

function showColorPicker(playerIdx, card) {
  document.getElementById('colorPicker').classList.add('show');
}

function shakeHand() {
  let hc = document.getElementById('handContainer');
  hc.classList.add('shake');
  setTimeout(() => hc.classList.remove('shake'), 300);
}

// ============ AI LOGIC ============
function aiTurn() {
  if (G.phase === 'gameover') return;
  let ai = G.players[G.currentPlayer];
  if (!ai.isAI) return;

  G.phase = 'ai-thinking';
  updateUI();

  let delay = 600 + Math.random() * 600;

  setTimeout(() => {
    if (G.phase === 'gameover') return;

    if (G.pendingDraw > 0) {
      if (!canStack(G.currentPlayer)) {
        showMessage(`➕${G.pendingDraw}`, `${ai.name} ambil ${G.pendingDraw} kartu!`, 1000);
        drawCards(G.currentPlayer, G.pendingDraw);
        G.pendingDraw = 0;
        G.drawOnce = false;
        nextPlayer();
        updateUI();
        setTimeout(() => {
          if (G.phase === 'gameover') return;
          G.phase = 'playing';
          if (G.players[G.currentPlayer].isAI) aiTurn();
        }, 600);
        return;
      }
    }

    let valid = [];
    for (let i = 0; i < ai.hand.length; i++) {
      let c = ai.hand[i];
      if (G.pendingDraw > 0) {
        if ((c.type === 'draw2' && G.activeValue === 'draw2') ||
            (c.type === 'wild4' && G.activeValue === 'wild4')) {
          valid.push(i);
        }
      } else if (isValidCard(c, G.activeColor, G.activeValue)) {
        valid.push(i);
      }
    }

    if (valid.length === 0) {
      drawCards(G.currentPlayer, 1);
      updateUI();

      let drawn = ai.hand[ai.hand.length - 1];
      if (G.pendingDraw > 0) {
        if (!((drawn.type === 'draw2' && G.activeValue === 'draw2') ||
              (drawn.type === 'wild4' && G.activeValue === 'wild4'))) {
          nextPlayer();
          updateUI();
          setTimeout(() => {
            if (G.phase === 'gameover') return;
            G.phase = 'playing';
            if (G.players[G.currentPlayer].isAI) aiTurn();
          }, 600);
          return;
        }
      } else if (!isValidCard(drawn, G.activeColor, G.activeValue)) {
        nextPlayer();
        updateUI();
        setTimeout(() => {
          if (G.phase === 'gameover') return;
          G.phase = 'playing';
          if (G.players[G.currentPlayer].isAI) aiTurn();
        }, 600);
        return;
      }

      let drawnIdx = ai.hand.length - 1;
      setTimeout(() => {
        playCard(G.currentPlayer, drawnIdx);
      }, 500);
      return;
    }

    let chosenIdx = valid[0];

    let scores = valid.map(i => {
      let c = ai.hand[i];
      let score = 0;
      if (c.type === 'number') score = 1;
      else if (c.type === 'skip') score = 3;
      else if (c.type === 'reverse') score = 3;
      else if (c.type === 'draw2') score = 5;
      else if (c.type === 'wild') score = 2;
      else if (c.type === 'wild4') score = 6;

      if (c.type === 'wild4' && G.players[0].hand.length <= 3) score += 10;
      if (c.type === 'draw2' && G.players[0].hand.length <= 3) score += 5;

      if (c.type === 'wild' || c.type === 'wild4') {
        if (ai.hand.filter(x => x.type !== 'wild' && x.type !== 'wild4').length > 0) {
          score -= 3;
        }
        if (ai.hand.length === 1) score += 20;
      }

      if (c.color === G.activeColor) score += 1;

      return {idx: i, score};
    });

    scores.sort((a, b) => b.score - a.score);
    chosenIdx = scores[0].idx;

    playCard(G.currentPlayer, chosenIdx);
  }, delay);
}

}

function renderDiscard() {

  }
  let card = G.discard[G.discard.length - 1];
  dc.innerHTML = `
    <span class="card-corner corner-tl">${card.display}</span>
    <span class="card-center">${card.display}</span>
    <span class="card-corner corner-br">${card.display}</span>
  `;

               card.type === 'skip' || card.type === 'reverse' || card.type === 'draw2' ? 'gray-card' : '';

  if (card.type === 'number') {
    dc.style.background = COLOR_HEX[card.color];
  } else if (card.type === 'wild' || card.type === 'wild4') {
    dc.style.background = 'linear-gradient(135deg,#e74c3c,#f1c40f,#2ecc71,#3498db)';
  } else if (card.type === 'skip' || card.type === 'reverse' || card.type === 'draw2') {
    dc.style.background = 'linear-gradient(135deg,#6b7280,#9ca3af)';
  } else {
    dc.style.background = '#e5e7eb';
  }
}

function renderHand() {
  let hc = document.getElementById('handContainer');
  hc.innerHTML = '';

  for (let i = 0; i < G.players[0].hand.length; i++) {
    let card = G.players[0].hand[i];
    let el = document.createElement('div');
    el.className = 'hand-card';
    el.dataset.idx = i;

    let isValid = false;
    if (G.currentPlayer === 0 && G.phase !== 'choosing' && G.phase !== 'gameover') {
      if (G.pendingDraw > 0) {
        isValid = (card.type === 'draw2' && G.activeValue === 'draw2') ||
                  (card.type === 'wild4' && G.activeValue === 'wild4');
      } else {
        isValid = isValidCard(card, G.activeColor, G.activeValue);
      }
    }

    if (isValid) {
      el.classList.add('valid');
    } else {
      el.classList.add('invalid');
    }

    if (card.type === 'number') {
      el.classList.add('number-card');
      el.style.background = COLOR_HEX[card.color];
    } else if (card.type === 'wild' || card.type === 'wild4') {
      el.classList.add('wild');
    } else if (card.type === 'skip' || card.type === 'reverse' || card.type === 'draw2') {
      el.classList.add('action-card');
    }

    el.innerHTML = `
      <span class="card-corner corner-tl">${card.display}</span>
      <span class="card-center">${card.display}</span>
      <span class="card-corner corner-br">${card.display}</span>
    `;

    el.addEventListener('click', () => playPlayerCard(i));
    el.addEventListener('touchstart', () => {}, {passive: true});

    hc.appendChild(el);
  }

  setTimeout(() => {
    let validCards = hc.querySelectorAll('.hand-card.valid');
    if (validCards.length > 0 && G.currentPlayer === 0) {
      validCards[0].scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
    }
  }, 100);
}

function showMessage(text, sub, duration) {
  let overlay = document.getElementById('messageOverlay');
  document.getElementById('msgText').textContent = text;
  document.getElementById('msgSub').textContent = sub || '';
  overlay.classList.add('show');
  if (duration) {
    setTimeout(() => overlay.classList.remove('show'), duration);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Preload
});
</script>
